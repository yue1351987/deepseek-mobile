<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DeepSeek - 调试版</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }
        #chat {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            background: #161b22;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .msg {
            margin: 4px 0;
            padding: 6px 12px;
            border-radius: 6px;
        }
        .user { background: #1f2937; }
        .assistant { background: #21262d; }
        .error { background: #3d1a1a; color: #f87171; border-left: 3px solid #ef4444; }
        .input-row {
            display: flex;
            gap: 8px;
        }
        #prompt {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background: #1c2333;
            color: #e6edf3;
            font-size: 14px;
            resize: none;
            outline: none;
        }
        #sendBtn {
            padding: 8px 20px;
            background: #3b82f6;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        #sendBtn:disabled { opacity: 0.5; }
        #status {
            margin-top: 8px;
            font-size: 12px;
            color: #8b949e;
        }
        .settings {
            margin-bottom: 12px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #apiKeyInput {
            flex: 1;
            padding: 6px 12px;
            border: 1px solid #30363d;
            border-radius: 4px;
            background: #1c2333;
            color: #e6edf3;
        }
        #saveKeyBtn {
            padding: 6px 16px;
            background: #2d3748;
            border: none;
            border-radius: 4px;
            color: #e6edf3;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="settings">
        <input type="password" id="apiKeyInput" placeholder="输入 API Key" style="flex:1;">
        <button id="saveKeyBtn">保存 Key</button>
        <span id="keyStatus" style="font-size:12px;color:#8b949e;"></span>
    </div>
    <div id="chat"></div>
    <div class="input-row">
        <textarea id="prompt" rows="1" placeholder="输入消息..."></textarea>
        <button id="sendBtn">发送</button>
    </div>
    <div id="status">就绪</div>

    <script>
        // ============================================================
        // 最简调试版 - 只保留核心发送/接收
        // ============================================================
        const chatEl = document.getElementById('chat');
        const promptEl = document.getElementById('prompt');
        const sendBtn = document.getElementById('sendBtn');
        const statusEl = document.getElementById('status');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const keyStatus = document.getElementById('keyStatus');

        // 存储 Key
        const KEY_STORAGE = 'deepseek_api_key';
        let currentKey = '';

        // 加载已保存的 Key
        function loadKey() {
            const saved = localStorage.getItem(KEY_STORAGE);
            if (saved) {
                currentKey = saved;
                apiKeyInput.value = saved;
                keyStatus.textContent = '✅ Key 已加载';
            } else {
                keyStatus.textContent = '❌ 未找到 Key';
            }
        }
        loadKey();

        // 保存 Key
        saveKeyBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem(KEY_STORAGE, key);
                currentKey = key;
                keyStatus.textContent = '✅ Key 已保存';
                statusEl.textContent = 'Key 已保存';
                console.log('[保存] Key 已保存');
            } else {
                alert('请输入 Key');
            }
        });

        // 在聊天区域添加消息
        function addMessage(role, content, isError = false) {
            const div = document.createElement('div');
            div.className = `msg ${role}${isError ? ' error' : ''}`;
            div.textContent = content;
            chatEl.appendChild(div);
            chatEl.scrollTop = chatEl.scrollHeight;
        }

        // 发送消息函数（带详细日志）
        async function sendMessage() {
            console.log('[sendMessage] 开始执行');

            // 1. 检查 Key
            const key = localStorage.getItem(KEY_STORAGE);
            console.log('[sendMessage] 获取到的 Key:', key ? '存在' : '不存在');
            if (!key) {
                const msg = '❌ 未找到 API Key，请先保存';
                addMessage('assistant', msg, true);
                statusEl.textContent = '错误: 未找到 Key';
                console.error('[sendMessage] 没有 Key');
                return;
            }

            // 2. 获取输入
            const text = promptEl.value.trim();
            console.log('[sendMessage] 输入文本:', text);
            if (!text) {
                const msg = '⚠️ 请输入问题';
                addMessage('assistant', msg, true);
                statusEl.textContent = '错误: 空输入';
                console.warn('[sendMessage] 空输入');
                return;
            }

            // 3. 显示用户消息
            addMessage('user', text);
            promptEl.value = '';
            promptEl.style.height = 'auto';
            sendBtn.disabled = true;
            statusEl.textContent = '⏳ 发送请求...';

            // 4. 显示占位
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'msg assistant';
            loadingDiv.textContent = '🤔 思考中...';
            chatEl.appendChild(loadingDiv);
            chatEl.scrollTop = chatEl.scrollHeight;

            console.log('[sendMessage] 准备发送请求到 API');

            try {
                // 5. 构建请求体
                const messages = [
                    { role: 'user', content: text }
                ];
                const requestBody = {
                    model: 'deepseek-v4-flash',  // 使用快速模型，简单测试
                    messages: messages,
                    stream: false,  // 非流式，简单
                    max_tokens: 1024
                };
                console.log('[sendMessage] 请求体:', requestBody);

                // 6. 发送请求
                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${key}`
                    },
                    body: JSON.stringify(requestBody)
                });

                console.log('[sendMessage] 响应状态:', response.status);

                // 7. 处理响应
                if (!response.ok) {
                    let errMsg = `HTTP ${response.status}`;
                    try {
                        const errData = await response.json();
                        errMsg += `\n${JSON.stringify(errData, null, 2)}`;
                    } catch (e) {
                        errMsg += `\n${await response.text()}`;
                    }
                    throw new Error(errMsg);
                }

                const data = await response.json();
                console.log('[sendMessage] 响应数据:', data);

                const reply = data.choices?.[0]?.message?.content || '(空回复)';
                // 移除占位
                loadingDiv.remove();
                // 显示 AI 回复
                addMessage('assistant', reply);
                statusEl.textContent = '✅ 回复成功';
                console.log('[sendMessage] 回复成功');

            } catch (error) {
                console.error('[sendMessage] 捕获错误:', error);
                // 移除占位
                loadingDiv.remove();
                // 显示错误详情
                addMessage('assistant', `❌ 请求失败\n${error.message}`, true);
                statusEl.textContent = '⚠️ 请求失败';
            } finally {
                sendBtn.disabled = false;
                console.log('[sendMessage] 执行完毕');
            }
        }

        // 绑定发送事件
        sendBtn.addEventListener('click', () => {
            console.log('[点击] 发送按钮被点击');
            sendMessage();
        });

        // Ctrl+Enter 发送
        promptEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                console.log('[快捷键] Enter 触发发送');
                sendMessage();
            }
        });

        // 自适应高度
        promptEl.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // 页面加载完成提示
        console.log('[页面] 调试版已加载，请尝试发送消息');
        statusEl.textContent = '就绪 (调试版)';
    </script>
</body>
</html>
