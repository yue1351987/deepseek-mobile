<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeepSeek V4 创作版</title>
    <style>
        :root {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --bg-input: #f8fafc;
            --bg-msg-user: #4a6cf7;
            --bg-msg-ai: #f1f3f5;
            --text-primary: #0f172a;
            --text-secondary: #1e293b;
            --text-muted: #64748b;
            --border-color: #e9edf2;
            --shadow-color: rgba(0,0,0,0.06);
            --highlight-bg: #fef08a;
            --folder-color: #8b5cf6;
        }
        body.dark {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-input: #1c2333;
            --bg-msg-user: #3b5fd9;
            --bg-msg-ai: #2d333b;
            --text-primary: #e6edf3;
            --text-secondary: #c9d1d9;
            --text-muted: #8b949e;
            --border-color: #30363d;
            --shadow-color: rgba(0,0,0,0.4);
            --highlight-bg: #664d00;
            --folder-color: #a78bfa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }
        #topbar {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 10px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        #menuBtn { font-size: 22px; background: none; border: none; cursor: pointer; color: var(--text-primary); padding: 0 4px; }
        #titleArea { flex: 1; text-align: center; font-weight: 600; font-size: 15px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 30%; }
        .topbar-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-muted); padding: 2px 5px; }
        .topbar-btn:active { color: var(--text-primary); }
        #controls { display: flex; align-items: center; gap: 6px; background: var(--bg-primary); padding: 2px 10px 2px 6px; border-radius: 30px; border: 1px solid var(--border-color); }
        #controls select { background: transparent; border: none; color: var(--text-primary); font-size: 12px; font-weight: 600; outline: none; padding: 2px 0; cursor: pointer; }
        #darkToggle { background: none; border: none; font-size: 16px; cursor: pointer; padding: 0 2px; }
        #keyBar { display: flex; gap: 4px; padding: 4px 10px; background: var(--bg-primary); border-bottom: 1px solid var(--border-color); flex-shrink: 0; align-items: center; }
        #apiKey { flex: 1; padding: 4px 10px; border: 1px solid var(--border-color); border-radius: 20px; font-size: 11px; background: var(--bg-secondary); color: var(--text-primary); outline: none; }
        #apiKey:focus { border-color: #4a6cf7; }
        #saveKeyBtn { padding: 3px 12px; background: #4a6cf7; color: white; border: none; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; }
        #attachmentBar { display: none; gap: 4px; padding: 3px 10px; background: var(--bg-primary); border-bottom: 1px solid var(--border-color); flex-shrink: 0; flex-wrap: wrap; }
        #attachmentBar.show { display: flex; }
        .attach-tag { background: var(--bg-secondary); border-radius: 16px; padding: 1px 8px 1px 12px; font-size: 11px; display: flex; align-items: center; gap: 4px; border: 1px solid var(--border-color); color: var(--text-secondary); }
        #chatBox { flex: 1; overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; background: var(--bg-primary); }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 92%; animation: fadeIn 0.2s ease; }
        .msg-wrapper.user { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.assistant { align-self: flex-start; align-items: flex-start; width: 100%; }
        .msg { padding: 8px 12px; border-radius: 16px; line-height: 1.5; word-break: break-word; font-size: 14px; position: relative; white-space: pre-wrap; width: 100%; }
        .user .msg { background: var(--bg-msg-user); color: white; border-bottom-right-radius: 4px; max-width: 100%; }
        .assistant .msg { background: var(--bg-msg-ai); color: var(--text-secondary); border-bottom-left-radius: 4px; max-width: 100%; }
        .msg img { max-width: 100%; border-radius: 6px; margin-top: 3px; max-height: 180px; }
        .cursor-blink::after { content: '▊'; animation: blink 0.9s step-end infinite; color: #4a6cf7; margin-left: 2px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .msg-actions { display: flex; gap: 6px; margin-top: 3px; font-size: 12px; opacity: 0.7; flex-wrap: wrap; align-items: center; }
        .msg-actions button { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 1px 5px; border-radius: 10px; font-size: 11px; }
        .msg-actions button:active { background: var(--border-color); }
        .version-control { display: inline-flex; align-items: center; gap: 2px; background: var(--bg-primary); border-radius: 14px; padding: 0 4px; border: 1px solid var(--border-color); }
        .version-control button { background: none; border: none; font-size: 12px; cursor: pointer; padding: 0 3px; color: var(--text-muted); }
        .version-control button:active { color: var(--text-primary); }
        .version-control span { font-size: 11px; color: var(--text-muted); min-width: 24px; text-align: center; }
        .reasoning-box { width: 100%; background: var(--bg-primary); border-radius: 10px; padding: 6px 10px; margin-bottom: 4px; border-left: 3px solid #4a6cf7; font-size: 12px; color: var(--text-muted); }
        .reasoning-box summary { cursor: pointer; font-weight: 500; color: var(--text-secondary); padding: 2px 0; }
        .reasoning-box summary:active { opacity: 0.6; }
        .reasoning-content { white-space: pre-wrap; margin-top: 4px; padding-top: 4px; border-top: 1px dashed var(--border-color); max-height: 150px; overflow-y: auto; }
        #inputArea { display: flex; gap: 4px; padding: 6px 10px 10px; background: var(--bg-secondary); border-top: 1px solid var(--border-color); flex-shrink: 0; align-items: flex-end; }
        #attachBtn { font-size: 20px; background: none; border: none; cursor: pointer; color: var(--text-muted); height: 38px; display: flex; align-items: center; }
        #prompt { flex: 1; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 20px; font-size: 14px; resize: none; outline: none; background: var(--bg-input); color: var(--text-primary); font-family: inherit; min-height: 38px; max-height: 90px; line-height: 1.3; }
        #prompt:focus { border-color: #4a6cf7; }
        #sendBtn { width: 42px; height: 42px; border-radius: 50%; background: #4a6cf7; color: white; border: none; font-size: 18px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        #sendBtn:disabled { opacity: 0.4; pointer-events: none; }
        #stopBtn { width: 42px; height: 42px; border-radius: 50%; background: #ef4444; color: white; border: none; font-size: 14px; cursor: pointer; flex-shrink: 0; display: none; align-items: center; justify-content: center; }
        #stopBtn:active { background: #dc2626; }
        #fileInput { display: none; }
        #statusBar { display: flex; justify-content: space-between; padding: 3px 14px; font-size: 10px; color: var(--text-muted); background: var(--bg-primary); border-top: 1px solid var(--border-color); flex-shrink: 0; }

        /* 抽屉强化 */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; display: none; }
        #overlay.active { display: block; }
        #drawer {
            position: fixed; top: 0; left: -85%; width: 85%; max-width: 350px; height: 100%;
            background: var(--bg-secondary); z-index: 1001; padding: 16px 12px;
            box-shadow: 4px 0 20px var(--shadow-color);
            transition: left 0.25s ease;
            display: flex; flex-direction: column; overflow: hidden;
            color: var(--text-primary);
        }
        #drawer.open { left: 0; }
        #drawerTitle { font-size: 18px; font-weight: 700; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        #drawerTitle button { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-muted); }
        #drawerActions { display: flex; gap: 6px; margin: 8px 0; flex-shrink: 0; flex-wrap: wrap; }
        #drawerActions button { background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 16px; padding: 4px 12px; font-size: 12px; color: var(--text-primary); cursor: pointer; }
        #drawerActions button:active { background: var(--border-color); }
        #sessionListContainer { flex: 1; overflow-y: auto; margin-top: 6px; }
        .drawer-section-title {
            font-size: 12px; font-weight: 600; color: var(--text-muted); margin: 8px 0 4px 8px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .folder-item, .session-item {
            display: flex; align-items: center; padding: 8px 10px; border-radius: 10px;
            margin-bottom: 2px; cursor: pointer; background: var(--bg-primary); gap: 6px;
        }
        .folder-item.active, .session-item.active { background: #4a6cf7; color: white; }
        .folder-item.active .session-name, .session-item.active .session-name { color: white; }
        .folder-item .folder-icon { font-size: 16px; margin-right: 2px; }
        .session-name { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        .item-actions { display: flex; gap: 2px; flex-shrink: 0; }
        .item-actions button { background: none; border: none; font-size: 14px; cursor: pointer; color: var(--text-muted); padding: 1px 4px; }
        .item-actions button:active { color: var(--text-primary); }
        .folder-children { padding-left: 20px; border-left: 2px solid var(--border-color); margin-left: 6px; }
        .pinned-badge { font-size: 10px; color: var(--text-muted); margin-left: 4px; }
        .folder-item .session-name { font-weight: 600; color: var(--folder-color); }
        .folder-item.active .session-name { color: white; }

        #newSessionBtn, #newFolderBtn { width: 100%; padding: 10px; background: #4a6cf7; color: white; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 6px; flex-shrink: 0; }
        #newFolderBtn { background: var(--folder-color); }

        /* 导出、搜索等模态框保留 */
        #exportModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; display: none; justify-content: center; align-items: center; }
        #exportModal.active { display: flex; }
        #exportBox { background: var(--bg-secondary); padding: 24px 20px; border-radius: 20px; max-width: 300px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; color: var(--text-primary); }
        #exportBox h3 { margin-bottom: 14px; font-size: 17px; }
        .export-options { display: flex; flex-direction: column; gap: 10px; }
        .export-options button { padding: 12px; border: none; border-radius: 14px; font-size: 14px; font-weight: 600; cursor: pointer; background: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border-color); }
        .export-options button:active { background: #4a6cf7; color: white; }
        #closeExportBtn { margin-top: 14px; background: none; border: none; color: var(--text-muted); font-size: 13px; cursor: pointer; }
        #searchModal { position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg-secondary);z-index:2000;display:none;flex-direction:column;padding:16px;color:var(--text-primary); }
        #searchModal.active { display: flex; }
        #closeSearchBtn { align-self:flex-end;font-size:24px;background:none;border:none;color:var(--text-muted); }
        #searchInput { width:100%;padding:12px;border:2px solid #4a6cf7;border-radius:28px;font-size:14px;outline:none;margin-bottom:10px;background:var(--bg-input);color:var(--text-primary); }
        #searchResults { flex:1;overflow-y:auto; }
        .search-result-item { padding:12px;border-bottom:1px solid var(--border-color);cursor:pointer; }
        .search-result-item:active { background:var(--bg-primary); }
        #backupFileInput { display: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 480px) { .msg-wrapper { max-width: 96%; } #drawer { left: -100%; width: 88%; } #controls select { font-size: 11px; max-width: 80px; } #topbar { gap: 3px; padding: 4px 6px; } .topbar-btn { font-size: 16px; padding: 1px 4px; } }
    </style>
</head>
<body>

    <div id="topbar">
        <button id="menuBtn">☰</button>
        <span id="titleArea">新对话</span>
        <div id="controls">
            <select id="modelSelect">
                <option value="deepseek-v4-flash">⚡ V4 Flash</option>
                <option value="deepseek-v4-pro">🧠 V4 Pro</option>
            </select>
            <button id="darkToggle">🌙</button>
        </div>
        <button class="topbar-btn" id="backupBtn" title="备份所有数据">💾</button>
        <button class="topbar-btn" id="restoreBtn" title="恢复数据">📂</button>
        <input type="file" id="backupFileInput" accept=".json">
        <button class="topbar-btn" id="exportBtn">📤</button>
        <button class="topbar-btn" id="searchBtn">🔍</button>
        <button class="topbar-btn" id="newChatBtn">+</button>
    </div>

    <div id="keyBar">
        <input type="password" id="apiKey" placeholder="输入 API Key">
        <button id="saveKeyBtn">保存</button>
    </div>
    <div id="attachmentBar"></div>
    <div id="chatBox"></div>
    <div id="inputArea">
        <button id="attachBtn">📎</button>
        <input type="file" id="fileInput" multiple accept="image/*,.pdf,.doc,.docx,.txt,.xls,.xlsx,.ppt,.pptx">
        <textarea id="prompt" rows="1" placeholder="输入问题..."></textarea>
        <button id="sendBtn">➤</button>
        <button id="stopBtn">⏹</button>
    </div>
    <div id="statusBar">
        <span id="statusText">就绪</span>
        <span id="tokenCounter">📊 ~0 tokens</span>
    </div>

    <div id="exportModal">
        <div id="exportBox">
            <h3>📤 导出当前对话</h3>
            <div class="export-options">
                <button id="exportAI">🤖 仅导出 AI 回复</button>
                <button id="exportUser">👤 仅导出我的提问</button>
                <button id="exportAll">📋 导出全部</button>
            </div>
            <button id="closeExportBtn">取消</button>
        </div>
    </div>

    <div id="searchModal">
        <button id="closeSearchBtn">✕</button>
        <input type="text" id="searchInput" placeholder="搜索所有对话...">
        <div id="searchResults"></div>
    </div>

    <div id="overlay"></div>
    <div id="drawer">
        <div id="drawerTitle">
            我的对话
            <button id="closeDrawerBtn">✕</button>
        </div>
        <div id="drawerActions">
            <button id="newSessionBtn">➕ 新对话</button>
            <button id="newFolderBtn">📁 新建文件夹</button>
        </div>
        <div id="sessionListContainer"></div>
    </div>

    <script>
        // ============================================================
        //  数据层 (新增 folders, 修改 sessions 结构)
        // ============================================================
        let sessions = [];
        let folders = [];
        let currentId = null;
        let currentKey = '';
        let pendingAttachments = [];
        let isStreaming = false;
        let abortController = null;

        const STORAGE_SESSIONS_KEY = 'deepseek_sessions_v4';
        const STORAGE_FOLDERS_KEY = 'deepseek_folders_v4';
        const KEY_STORAGE = 'deepseek_api_key';
        const THEME_KEY = 'deepseek_theme';
        const MODEL_KEY = 'deepseek_model';

        // DOM 引用
        const chatBox = document.getElementById('chatBox');
        const promptInput = document.getElementById('prompt');
        const sendBtn = document.getElementById('sendBtn');
        const stopBtn = document.getElementById('stopBtn');
        const apiKeyInput = document.getElementById('apiKey');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const titleArea = document.getElementById('titleArea');
        const menuBtn = document.getElementById('menuBtn');
        const newChatBtn = document.getElementById('newChatBtn');
        const drawer = document.getElementById('drawer');
        const overlay = document.getElementById('overlay');
        const sessionListContainer = document.getElementById('sessionListContainer');
        const newSessionBtn = document.getElementById('newSessionBtn');
        const newFolderBtn = document.getElementById('newFolderBtn');
        const closeDrawerBtn = document.getElementById('closeDrawerBtn');
        const attachBtn = document.getElementById('attachBtn');
        const fileInput = document.getElementById('fileInput');
        const attachmentBar = document.getElementById('attachmentBar');
        const statusText = document.getElementById('statusText');
        const tokenCounter = document.getElementById('tokenCounter');
        const searchBtn = document.getElementById('searchBtn');
        const searchModal = document.getElementById('searchModal');
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        const closeSearchBtn = document.getElementById('closeSearchBtn');
        const modelSelect = document.getElementById('modelSelect');
        const darkToggle = document.getElementById('darkToggle');
        const exportBtn = document.getElementById('exportBtn');
        const exportModal = document.getElementById('exportModal');
        const closeExportBtn = document.getElementById('closeExportBtn');
        const exportAI = document.getElementById('exportAI');
        const exportUser = document.getElementById('exportUser');
        const exportAll = document.getElementById('exportAll');
        const backupBtn = document.getElementById('backupBtn');
        const restoreBtn = document.getElementById('restoreBtn');
        const backupFileInput = document.getElementById('backupFileInput');

        function generateId() { return Date.now() + '_' + Math.random().toString(36).slice(2, 7); }

        function saveSessions() {
            localStorage.setItem(STORAGE_SESSIONS_KEY, JSON.stringify(sessions));
            localStorage.setItem(STORAGE_FOLDERS_KEY, JSON.stringify(folders));
            updateTokenCounter();
        }

        function getCurrentSession() { return sessions.find(s => s.id === currentId) || sessions[0]; }

        function loadData() {
            // Key
            const savedKey = localStorage.getItem(KEY_STORAGE);
            if (savedKey) { currentKey = savedKey; apiKeyInput.value = savedKey; }
            // Theme
            const theme = localStorage.getItem(THEME_KEY);
            if (theme === 'dark') { document.body.classList.add('dark'); darkToggle.textContent = '☀️'; }
            // Model
            const model = localStorage.getItem(MODEL_KEY);
            if (model) modelSelect.value = model;
            // Folders
            const rawFolders = localStorage.getItem(STORAGE_FOLDERS_KEY);
            if (rawFolders) { try { folders = JSON.parse(rawFolders); } catch { folders = []; } }
            // Sessions
            const rawSessions = localStorage.getItem(STORAGE_SESSIONS_KEY);
            if (rawSessions) { try { sessions = JSON.parse(rawSessions); } catch { sessions = []; } }
            // 如果没有会话，创建一个默认
            if (!sessions.length) {
                sessions.push({ id: generateId(), name: '新对话', messages: [], folderId: null, pinned: false });
                saveSessions();
            }
            const active = sessions.find(s => s.active) || sessions[0];
            currentId = active.id;
            sessions.forEach(s => delete s.active);
            const cur = sessions.find(s => s.id === currentId);
            if (cur) cur.active = true;
            saveSessions();
        }

        function estimateTokens(text) { if (!text) return 0; return Math.ceil(text.length / 1.8); }
        function updateTokenCounter() {
            const session = getCurrentSession();
            if (!session) { tokenCounter.textContent = '📊 ~0 tokens'; return; }
            let total = 0;
            session.messages.forEach(m => {
                total += estimateTokens(m.content || '');
                if (m.images) total += 50;
                if (m.reasoning) total += estimateTokens(m.reasoning);
            });
            tokenCounter.textContent = `📊 ~${total} tokens`;
        }

        // ============================================================
        //  渲染聊天 (与之前一致)
        // ============================================================
        function renderChat() {
            const session = getCurrentSession();
            if (!session) return;
            titleArea.textContent = session.name || '未命名';
            chatBox.innerHTML = '';

            const msgs = session.messages || [];
            if (msgs.length === 0) {
                const wrap = document.createElement('div');
                wrap.className = 'msg-wrapper assistant';
                wrap.innerHTML = `<div class="msg">👋 开始新对话吧！支持上传图片和文档。</div>`;
                chatBox.appendChild(wrap);
            } else {
                for (let i = 0; i < msgs.length; i++) {
                    const msg = msgs[i];
                    if (msg._loading && !msg.content && !msg.reasoning) continue;
                    const wrap = document.createElement('div');
                    wrap.className = `msg-wrapper ${msg.role}`;
                    wrap.dataset.index = i;

                    if (msg.role === 'assistant' && msg.reasoning) {
                        const details = document.createElement('details');
                        details.className = 'reasoning-box';
                        const summary = document.createElement('summary');
                        summary.textContent = '🧠 思考过程 (点击展开)';
                        details.appendChild(summary);
                        const contentDiv = document.createElement('div');
                        contentDiv.className = 'reasoning-content';
                        contentDiv.textContent = msg.reasoning;
                        details.appendChild(contentDiv);
                        wrap.appendChild(details);
                    }

                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'msg';
                    if (msg.role === 'user' && msg.images && msg.images.length) {
                        const textSpan = document.createElement('div');
                        textSpan.textContent = msg.content || '📷 图片';
                        msgDiv.appendChild(textSpan);
                        msg.images.forEach(imgData => {
                            const img = document.createElement('img');
                            img.src = imgData;
                            msgDiv.appendChild(img);
                        });
                    } else {
                        msgDiv.textContent = msg.content || '(空消息)';
                    }
                    wrap.appendChild(msgDiv);

                    const actions = document.createElement('div');
                    actions.className = 'msg-actions';

                    if (msg.role === 'user' && msg.history && msg.history.length > 0) {
                        const verControl = createVersionControl(msg, i);
                        actions.appendChild(verControl);
                    }

                    if (msg.role === 'user') {
                        const editBtn = document.createElement('button');
                        editBtn.textContent = '✏️ 编辑';
                        editBtn.addEventListener('click', (e) => { e.stopPropagation(); editUserMessage(i); });
                        actions.appendChild(editBtn);
                    }

                    if (msg.role === 'assistant' && !msg._loading) {
                        const regenBtn = document.createElement('button');
                        regenBtn.textContent = '🔄 重新生成';
                        regenBtn.addEventListener('click', (e) => { e.stopPropagation(); regenerateMessage(i); });
                        actions.appendChild(regenBtn);
                    }

                    if (actions.children.length > 0) wrap.appendChild(actions);
                    chatBox.appendChild(wrap);
                }
            }
            chatBox.scrollTop = chatBox.scrollHeight;
            renderDrawer();
            updateTokenCounter();
        }

        function createVersionControl(msg, msgIndex) {
            const container = document.createElement('span');
            container.className = 'version-control';
            const leftBtn = document.createElement('button');
            leftBtn.textContent = '◀';
            leftBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                changeVersion(msgIndex, -1);
            });
            const rightBtn = document.createElement('button');
            rightBtn.textContent = '▶';
            rightBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                changeVersion(msgIndex, 1);
            });
            const label = document.createElement('span');
            const total = (msg.history ? msg.history.length : 0) + 1;
            const current = msg.historyIndex !== undefined ? msg.historyIndex : 0;
            label.textContent = `${current+1}/${total}`;
            container.appendChild(leftBtn);
            container.appendChild(label);
            container.appendChild(rightBtn);
            return container;
        }

        function changeVersion(userMsgIndex, direction) {
            const session = getCurrentSession();
            if (!session) return;
            const msg = session.messages[userMsgIndex];
            if (!msg || msg.role !== 'user') return;
            if (!msg.history || msg.history.length === 0) return;
            let idx = msg.historyIndex !== undefined ? msg.historyIndex : 0;
            const total = msg.history.length + 1;
            idx = (idx + direction + total) % total;
            msg.historyIndex = idx;

            if (idx === 0) {
                // 当前版本，无需恢复
            } else {
                const histItem = msg.history[idx - 1];
                if (histItem) {
                    msg.content = histItem.user;
                    let assistantIdx = userMsgIndex + 1;
                    while (assistantIdx < session.messages.length && session.messages[assistantIdx].role !== 'assistant') {
                        assistantIdx++;
                    }
                    if (assistantIdx < session.messages.length) {
                        session.messages[assistantIdx].content = histItem.assistant;
                    }
                }
            }
            saveSessions();
            renderChat();
        }

        // ============================================================
        //  编辑、重新生成 (与之前相同，略)
        // ============================================================
        function editUserMessage(index) {
            const session = getCurrentSession();
            if (!session) return;
            const msg = session.messages[index];
            if (!msg || msg.role !== 'user') return;
            const newText = prompt('修改你的消息：', msg.content);
            if (newText === null || newText.trim() === '') return;

            let assistantIdx = index + 1;
            let assistantMsg = null;
            while (assistantIdx < session.messages.length && session.messages[assistantIdx].role !== 'assistant') {
                assistantIdx++;
            }
            if (assistantIdx < session.messages.length) {
                assistantMsg = session.messages[assistantIdx];
            }

            if (!msg.history) msg.history = [];
            if (msg.content && (!msg.history.length || msg.history[msg.history.length-1].user !== msg.content)) {
                msg.history.push({
                    user: msg.content,
                    assistant: assistantMsg ? assistantMsg.content : ''
                });
            }
            msg.content = newText.trim();
            session.messages = session.messages.slice(0, index + 1);
            msg.historyIndex = 0;
            saveSessions();
            renderChat();
            promptInput.value = newText.trim();
            promptInput.focus();
            statusText.textContent = '消息已修改，按发送键重新生成';
        }

        async function regenerateMessage(index) {
            const session = getCurrentSession();
            if (!session) return;
            const msg = session.messages[index];
            if (!msg || msg.role !== 'assistant') return;
            let userIdx = index - 1;
            let userMsg = null;
            while (userIdx >= 0 && session.messages[userIdx].role !== 'user') {
                userIdx--;
            }
            if (userIdx < 0) { alert('找不到对应的用户消息'); return; }
            userMsg = session.messages[userIdx];

            const key = localStorage.getItem(KEY_STORAGE);
            if (!key) { alert('请先保存 API Key'); return; }

            if (!userMsg.history) userMsg.history = [];
            const lastHist = userMsg.history.length ? userMsg.history[userMsg.history.length-1] : null;
            if (!lastHist || lastHist.user !== userMsg.content || lastHist.assistant !== msg.content) {
                userMsg.history.push({
                    user: userMsg.content,
                    assistant: msg.content
                });
            }
            userMsg.historyIndex = 0;

            session.messages = session.messages.slice(0, index);
            const loadingMsg = { role: 'assistant', content: '🤔 重新生成中...', _loading: true };
            session.messages.push(loadingMsg);
            saveSessions();
            renderChat();

            try {
                const history = session.messages.slice(0, index);
                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify({
                        model: modelSelect.value,
                        messages: history.map(m => ({ role: m.role, content: m.content })),
                        stream: false,
                        max_tokens: 4096
                    })
                });
                if (!response.ok) throw new Error('API Error');
                const data = await response.json();
                const reply = data.choices?.[0]?.message?.content || '无回复';
                session.messages.pop();
                session.messages.push({ role: 'assistant', content: reply });
                saveSessions();
                renderChat();
                statusText.textContent = '✅ 重新生成完成';
            } catch (e) {
                session.messages.pop();
                session.messages.push({ role: 'assistant', content: `❌ 失败: ${e.message}` });
                saveSessions();
                renderChat();
            }
        }

        // ============================================================
        //  发送消息 (流式) - 与之前一致，省略以节省篇幅，功能完全保留
        //  实际使用时需要包含完整 sendMessage 函数，但此处为了代码完整性，我会在最终版本中保留。
        //  由于代码过长，此处仅作示意，最终完整代码我会在回答末尾提供。

        // ============================================================
        //  附件管理 (与之前一致)
        // ============================================================
        function renderAttachmentBar() {
            attachmentBar.innerHTML = '';
            if (pendingAttachments.length === 0) { attachmentBar.classList.remove('show'); return; }
            attachmentBar.classList.add('show');
            pendingAttachments.forEach((att, index) => {
                const tag = document.createElement('span');
                tag.className = 'attach-tag';
                const icon = att.type === 'image' ? '🖼️' : '📄';
                tag.innerHTML = `${icon} ${att.name}`;
                const removeBtn = document.createElement('button');
                removeBtn.textContent = '✕';
                removeBtn.style.background = 'none';
                removeBtn.style.border = 'none';
                removeBtn.style.cursor = 'pointer';
                removeBtn.addEventListener('click', () => {
                    pendingAttachments.splice(index, 1);
                    renderAttachmentBar();
                });
                tag.appendChild(removeBtn);
                attachmentBar.appendChild(tag);
            });
        }

        attachBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            fileInput.value = '';
            for (const file of files) {
                const isImage = file.type.startsWith('image/');
                if (isImage) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        pendingAttachments.push({ type: 'image', data: ev.target.result, name: file.name });
                        renderAttachmentBar();
                    };
                    reader.readAsDataURL(file);
                } else {
                    try {
                        const key = localStorage.getItem(KEY_STORAGE);
                        if (!key) { alert('请先保存 API Key'); return; }
                        const formData = new FormData();
                        formData.append('file', file);
                        formData.append('purpose', 'file-extract');
                        const uploadRes = await fetch('https://api.deepseek.com/files', {
                            method: 'POST', headers: { 'Authorization': `Bearer ${key}` }, body: formData
                        });
                        if (!uploadRes.ok) {
                            const err = await uploadRes.json().catch(() => ({}));
                            throw new Error(`上传失败 (${uploadRes.status})`);
                        }
                        const result = await uploadRes.json();
                        pendingAttachments.push({ type: 'file', data: result.id, name: file.name });
                        renderAttachmentBar();
                    } catch (err) { alert(`文档上传出错：${err.message}`); }
                }
            }
        });

        // ============================================================
        //  文件夹 & 对话管理 (新增)
        // ============================================================
        function createFolder() {
            const name = prompt('请输入文件夹名称：', '新文件夹');
            if (!name || name.trim() === '') return;
            const folder = {
                id: generateId(),
                name: name.trim(),
                pinned: false
            };
            folders.push(folder);
            saveSessions();
            renderDrawer();
        }

        function renameFolder(folderId) {
            const folder = folders.find(f => f.id === folderId);
            if (!folder) return;
            const newName = prompt('重命名文件夹：', folder.name);
            if (newName && newName.trim() !== '') {
                folder.name = newName.trim();
                saveSessions();
                renderDrawer();
            }
        }

        function toggleFolderPin(folderId) {
            const folder = folders.find(f => f.id === folderId);
            if (folder) {
                folder.pinned = !folder.pinned;
                saveSessions();
                renderDrawer();
            }
        }

        function deleteFolder(folderId) {
            const folder = folders.find(f => f.id === folderId);
            if (!folder) return;
            const confirmText = prompt(`⚠️ 确定要删除文件夹“${folder.name}”吗？\n其中的对话将移至“未分类”。\n请输入“确认删除”以继续：`);
            if (confirmText !== '确认删除') {
                alert('删除已取消');
                return;
            }
            // 将该文件夹下的对话移出（folderId设为null）
            sessions.forEach(s => {
                if (s.folderId === folderId) s.folderId = null;
            });
            folders = folders.filter(f => f.id !== folderId);
            saveSessions();
            renderDrawer();
        }

        function toggleSessionPin(sessionId) {
            const session = sessions.find(s => s.id === sessionId);
            if (session) {
                session.pinned = !session.pinned;
                saveSessions();
                renderDrawer();
            }
        }

        function deleteSessionWithConfirm(sessionId) {
            const session = sessions.find(s => s.id === sessionId);
            if (!session) return;
            if (sessions.length <= 1) {
                alert('至少保留一个对话');
                return;
            }
            const confirmText = prompt(`⚠️ 确定要删除对话“${session.name}”吗？\n请输入“确认删除”以继续：`);
            if (confirmText !== '确认删除') {
                alert('删除已取消');
                return;
            }
            sessions = sessions.filter(s => s.id !== sessionId);
            if (currentId === sessionId) {
                currentId = sessions[0].id;
                sessions[0].active = true;
            }
            saveSessions();
            renderChat();
            renderDrawer();
        }

        function moveSessionToFolder(sessionId, folderId) {
            const session = sessions.find(s => s.id === sessionId);
            if (session) {
                session.folderId = folderId;
                saveSessions();
                renderDrawer();
            }
        }

        // ============================================================
        //  渲染抽屉 (支持文件夹、置顶、二次确认删除)
        // ============================================================
        function renderDrawer() {
            sessionListContainer.innerHTML = '';

            // 获取当前选中的会话ID
            const currentSessionId = currentId;

            // 分离置顶和非置顶项
            const pinnedFolders = folders.filter(f => f.pinned);
            const unpinnedFolders = folders.filter(f => !f.pinned);
            const pinnedSessions = sessions.filter(s => s.pinned && !s.folderId);
            const unpinnedSessions = sessions.filter(s => !s.pinned && !s.folderId);
            // 文件夹内的会话按文件夹分组（每个文件夹单独显示）
            // 为了简洁，我们展示所有文件夹，并在其中列出其会话

            // 辅助函数：创建会话项DOM
            function createSessionItem(session) {
                const div = document.createElement('div');
                div.className = 'session-item' + (session.id === currentSessionId ? ' active' : '');
                const nameSpan = document.createElement('span');
                nameSpan.className = 'session-name';
                nameSpan.textContent = session.name || '未命名';
                if (session.pinned) {
                    const badge = document.createElement('span');
                    badge.className = 'pinned-badge';
                    badge.textContent = '📌';
                    nameSpan.appendChild(badge);
                }
                const actions = document.createElement('div');
                actions.className = 'item-actions';

                // 移动按钮（移到其他文件夹或未分类）
                const moveBtn = document.createElement('button');
                moveBtn.textContent = '📂';
                moveBtn.title = '移动到文件夹';
                moveBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    // 弹出选择文件夹对话框
                    const folderOptions = folders.map(f => `${f.name} (${f.id})`).join('\n');
                    const choice = prompt(`选择目标文件夹 (输入文件夹ID，留空则移到未分类)：\n${folderOptions}\n\n当前对话: ${session.name}`);
                    if (choice === null) return;
                    const targetFolder = folders.find(f => f.id === choice.trim());
                    moveSessionToFolder(session.id, targetFolder ? targetFolder.id : null);
                });
                actions.appendChild(moveBtn);

                // 置顶切换
                const pinBtn = document.createElement('button');
                pinBtn.textContent = session.pinned ? '📌' : '📍';
                pinBtn.title = '切换置顶';
                pinBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleSessionPin(session.id);
                });
                actions.appendChild(pinBtn);

                // 删除
                const delBtn = document.createElement('button');
                delBtn.textContent = '🗑️';
                delBtn.title = '删除对话';
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteSessionWithConfirm(session.id);
                });
                actions.appendChild(delBtn);

                div.appendChild(nameSpan);
                div.appendChild(actions);
                div.addEventListener('click', () => {
                    switchSession(session.id);
                });
                return div;
            }

            // 辅助函数：创建文件夹DOM（含子会话）
            function createFolderItem(folder) {
                const container = document.createElement('div');
                container.className = 'folder-container';

                const folderDiv = document.createElement('div');
                folderDiv.className = 'folder-item';
                const icon = document.createElement('span');
                icon.className = 'folder-icon';
                icon.textContent = '📁';
                const nameSpan = document.createElement('span');
                nameSpan.className = 'session-name';
                nameSpan.textContent = folder.name;
                if (folder.pinned) {
                    const badge = document.createElement('span');
                    badge.className = 'pinned-badge';
                    badge.textContent = '📌';
                    nameSpan.appendChild(badge);
                }
                const actions = document.createElement('div');
                actions.className = 'item-actions';
                // 重命名
                const renameBtn = document.createElement('button');
                renameBtn.textContent = '✏️';
                renameBtn.title = '重命名文件夹';
                renameBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    renameFolder(folder.id);
                });
                actions.appendChild(renameBtn);
                // 置顶切换
                const pinBtn = document.createElement('button');
                pinBtn.textContent = folder.pinned ? '📌' : '📍';
                pinBtn.title = '切换置顶';
                pinBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleFolderPin(folder.id);
                });
                actions.appendChild(pinBtn);
                // 删除文件夹
                const delBtn = document.createElement('button');
                delBtn.textContent = '🗑️';
                delBtn.title = '删除文件夹';
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteFolder(folder.id);
                });
                actions.appendChild(delBtn);

                folderDiv.appendChild(icon);
                folderDiv.appendChild(nameSpan);
                folderDiv.appendChild(actions);
                container.appendChild(folderDiv);

                // 子会话列表
                const childSessions = sessions.filter(s => s.folderId === folder.id);
                if (childSessions.length > 0) {
                    const childrenDiv = document.createElement('div');
                    childrenDiv.className = 'folder-children';
                    // 按置顶排序
                    const sorted = [...childSessions].sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));
                    sorted.forEach(s => {
                        childrenDiv.appendChild(createSessionItem(s));
                    });
                    container.appendChild(childrenDiv);
                } else {
                    const empty = document.createElement('div');
                    empty.style.cssText = 'color:var(--text-muted);font-size:12px;padding:4px 12px;';
                    empty.textContent = '（空文件夹）';
                    container.appendChild(empty);
                }
                return container;
            }

            // 显示置顶文件夹
            if (pinnedFolders.length) {
                const title = document.createElement('div');
                title.className = 'drawer-section-title';
                title.textContent = '📌 置顶文件夹';
                sessionListContainer.appendChild(title);
                pinnedFolders.forEach(f => {
                    sessionListContainer.appendChild(createFolderItem(f));
                });
            }

            // 显示置顶对话（未分类）
            if (pinnedSessions.length) {
                const title = document.createElement('div');
                title.className = 'drawer-section-title';
                title.textContent = '📌 置顶对话';
                sessionListContainer.appendChild(title);
                pinnedSessions.forEach(s => {
                    sessionListContainer.appendChild(createSessionItem(s));
                });
            }

            // 显示普通文件夹
            if (unpinnedFolders.length) {
                const title = document.createElement('div');
                title.className = 'drawer-section-title';
                title.textContent = '📁 文件夹';
                sessionListContainer.appendChild(title);
                unpinnedFolders.forEach(f => {
                    sessionListContainer.appendChild(createFolderItem(f));
                });
            }

            // 显示普通对话（未分类）
            if (unpinnedSessions.length) {
                const title = document.createElement('div');
                className = 'drawer-section-title';
                title.textContent = '💬 对话';
                sessionListContainer.appendChild(title);
                unpinnedSessions.forEach(s => {
                    sessionListContainer.appendChild(createSessionItem(s));
                });
            }

            // 如果没有任何内容，显示提示
            if (sessions.length === 0 && folders.length === 0) {
                const empty = document.createElement('div');
                empty.style.cssText = 'color:var(--text-muted);text-align:center;padding:30px 0;';
                empty.textContent = '暂无对话和文件夹，点击下方创建';
                sessionListContainer.appendChild(empty);
            }
        }

        // ============================================================
        //  会话切换、创建
        // ============================================================
        function switchSession(id) {
            if (id === currentId) { closeDrawer(); return; }
            sessions.forEach(s => delete s.active);
            const target = sessions.find(s => s.id === id);
            if (target) {
                target.active = true;
                currentId = id;
                saveSessions();
                renderChat();
                closeDrawer();
            }
        }

        function createNewSession() {
            const count = sessions.length + 1;
            const newSession = {
                id: generateId(),
                name: `对话 ${count}`,
                messages: [],
                folderId: null,
                pinned: false,
                active: true
            };
            sessions.forEach(s => delete s.active);
            sessions.push(newSession);
            currentId = newSession.id;
            saveSessions();
            renderChat();
            closeDrawer();
            promptInput.focus();
        }

        // ============================================================
        //  备份 & 恢复 (包含 folders)
        // ============================================================
        function backupData() {
            try {
                const data = {
                    version: '2.0',
                    exportedAt: new Date().toISOString(),
                    sessions: sessions,
                    folders: folders,
                    apiKey: localStorage.getItem(KEY_STORAGE) || '',
                    theme: localStorage.getItem(THEME_KEY) || 'light',
                    model: localStorage.getItem(MODEL_KEY) || 'deepseek-v4-flash'
                };
                const json = JSON.stringify(data, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const dateStr = new Date().toISOString().slice(0,10);
                a.download = `DeepSeek_备份_${dateStr}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                statusText.textContent = '✅ 数据备份成功！';
                setTimeout(() => { if (statusText.textContent === '✅ 数据备份成功！') statusText.textContent = '就绪'; }, 3000);
            } catch (e) {
                alert('备份失败：' + e.message);
            }
        }

        function restoreData(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.sessions || !Array.isArray(data.sessions)) {
                        throw new Error('无效的备份文件：缺少 sessions 数据');
                    }
                    sessions = data.sessions;
                    folders = data.folders || [];
                    if (data.apiKey) localStorage.setItem(KEY_STORAGE, data.apiKey);
                    if (data.theme) {
                        localStorage.setItem(THEME_KEY, data.theme);
                        if (data.theme === 'dark') {
                            document.body.classList.add('dark');
                            darkToggle.textContent = '☀️';
                        } else {
                            document.body.classList.remove('dark');
                            darkToggle.textContent = '🌙';
                        }
                    }
                    if (data.model) {
                        localStorage.setItem(MODEL_KEY, data.model);
                        modelSelect.value = data.model;
                    }
                    const active = sessions.find(s => s.active) || sessions[0];
                    if (active) {
                        currentId = active.id;
                    } else if (sessions.length > 0) {
                        sessions[0].active = true;
                        currentId = sessions[0].id;
                    } else {
                        sessions.push({ id: generateId(), name: '新对话', messages: [], folderId: null, pinned: false, active: true });
                        currentId = sessions[0].id;
                    }
                    saveSessions();
                    renderChat();
                    const savedKey = localStorage.getItem(KEY_STORAGE);
                    if (savedKey) apiKeyInput.value = savedKey;
                    statusText.textContent = '✅ 数据恢复成功！';
                    alert('✅ 数据恢复成功！所有对话和文件夹已还原。');
                } catch (err) {
                    alert('恢复失败：' + err.message + '\n请确认选择的是正确的备份文件。');
                }
            };
            reader.readAsText(file);
        }

        backupBtn.addEventListener('click', backupData);
        restoreBtn.addEventListener('click', () => { backupFileInput.click(); });
        backupFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                if (confirm('⚠️ 恢复数据将覆盖当前所有对话、文件夹和历史记录，确定继续吗？')) {
                    restoreData(file);
                }
            }
            backupFileInput.value = '';
        });

        // ============================================================
        //  搜索 (略)
        // ============================================================
        function performSearch(query) {
            if (!query.trim()) { searchResults.innerHTML = '<div style="color:var(--text-muted);padding:20px;">输入关键词搜索</div>'; return; }
            const q = query.trim().toLowerCase();
            let results = [];
            sessions.forEach(s => {
                s.messages.forEach((m, idx) => {
                    if (m.content && m.content.toLowerCase().includes(q)) {
                        results.push({ sessionId: s.id, sessionName: s.name, msgIndex: idx, content: m.content, role: m.role });
                    }
                });
            });
            if (results.length === 0) { searchResults.innerHTML = '<div style="color:var(--text-muted);padding:20px;">未找到</div>'; return; }
            searchResults.innerHTML = '';
            results.slice(0, 30).forEach(r => {
                const div = document.createElement('div');
                div.className = 'search-result-item';
                const snippet = document.createElement('div');
                snippet.style.fontSize = '14px';
                const idx = r.content.toLowerCase().indexOf(q);
                let highlighted = r.content;
                if (idx !== -1) {
                    const start = Math.max(0, idx - 20);
                    const end = Math.min(r.content.length, idx + q.length + 20);
                    highlighted = (start>0?'...':'') + r.content.substring(start, idx) + `<mark>${r.content.substring(idx, idx+q.length)}</mark>` + r.content.substring(idx+q.length, end) + (end<r.content.length?'...':'');
                }
                snippet.innerHTML = highlighted;
                const meta = document.createElement('div');
                meta.style.fontSize = '12px';
                meta.style.color = 'var(--text-muted)';
                meta.textContent = `📁 ${r.sessionName} · ${r.role === 'user' ? '你' : 'AI'}`;
                div.appendChild(snippet); div.appendChild(meta);
                div.addEventListener('click', () => {
                    closeSearch();
                    switchSession(r.sessionId);
                    setTimeout(() => {
                        const items = chatBox.querySelectorAll('.msg-wrapper');
                        const session = getCurrentSession();
                        if (session) {
                            const idx = session.messages.findIndex(m => m.content === r.content);
                            if (idx !== -1 && items[idx]) {
                                items[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
                                items[idx].style.transition = 'background 0.3s';
                                items[idx].style.background = 'var(--highlight-bg)';
                                setTimeout(() => items[idx].style.background = '', 2000);
                            }
                        }
                    }, 300);
                });
                searchResults.appendChild(div);
            });
        }
        let searchTimeout;
        searchInput.addEventListener('input', () => { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => performSearch(searchInput.value), 300); });
        searchBtn.addEventListener('click', () => { searchModal.classList.add('active'); searchInput.value = ''; searchResults.innerHTML = ''; searchInput.focus(); });
        closeSearchBtn.addEventListener('click', closeSearch);
        function closeSearch() { searchModal.classList.remove('active'); }

        // ============================================================
        //  导出 (与之前一致)
        // ============================================================
        function exportChat(role) {
            const session = getCurrentSession();
            if (!session || !session.messages.length) { alert('当前对话为空，无法导出'); return; }
            let msgs = session.messages;
            if (role === 'user') msgs = msgs.filter(m => m.role === 'user');
            else if (role === 'assistant') msgs = msgs.filter(m => m.role === 'assistant');
            if (!msgs.length) { alert('没有匹配的消息可导出'); return; }

            let text = `导出时间: ${new Date().toLocaleString()}\n对话: ${session.name}\n${'='.repeat(30)}\n\n`;
            msgs.forEach(m => {
                const label = m.role === 'user' ? '👤 我' : '🤖 AI';
                text += `[${label}]\n${m.content}\n\n---\n\n`;
            });
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            const roleName = role === 'user' ? '我的提问' : (role === 'assistant' ? 'AI回复' : '全部');
            a.download = `${session.name}_${roleName}_${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(a.href);
            closeExport();
        }

        exportBtn.addEventListener('click', () => { exportModal.classList.add('active'); });
        closeExportBtn.addEventListener('click', closeExport);
        function closeExport() { exportModal.classList.remove('active'); }
        exportAI.addEventListener('click', () => exportChat('assistant'));
        exportUser.addEventListener('click', () => exportChat('user'));
        exportAll.addEventListener('click', () => exportChat('all'));

        // ============================================================
        //  发送消息 (完整流式，集成停止)
        // ============================================================
        async function sendMessage() {
            if (isStreaming) return;
            const key = localStorage.getItem(KEY_STORAGE);
            if (!key) { alert('请先保存 API Key'); return; }
            const text = promptInput.value.trim();
            if (!text && pendingAttachments.length === 0) { alert('请输入问题或上传文件'); return; }

            const session = getCurrentSession();
            if (!session) { createNewSession(); }

            let userContent = text || '请分析上传的文件内容';
            const images = [];
            const fileIds = [];
            for (const att of pendingAttachments) {
                if (att.type === 'image') images.push(att.data);
                else if (att.type === 'file') fileIds.push(att.data);
            }
            let finalUserMsg;
            if (images.length > 0) {
                const contentArray = [{ type: 'text', text: userContent }];
                images.forEach(img => { contentArray.push({ type: 'image_url', image_url: { url: img } }); });
                finalUserMsg = contentArray;
            } else {
                finalUserMsg = userContent;
            }

            const localMsg = { role: 'user', content: text || '📎 文件上传请求' };
            if (images.length > 0) localMsg.images = images;
            session.messages.push(localMsg);
            saveSessions();
            renderChat();

            promptInput.value = '';
            promptInput.style.height = 'auto';
            pendingAttachments = [];
            renderAttachmentBar();
            sendBtn.disabled = true;
            stopBtn.style.display = 'flex';
            isStreaming = true;
            statusText.textContent = '⏳ 流式生成中...';

            abortController = new AbortController();

            const aiMsgIndex = session.messages.length;
            session.messages.push({ role: 'assistant', content: '', reasoning: '', _loading: true });
            saveSessions();
            
            const wrap = document.createElement('div');
            wrap.className = 'msg-wrapper assistant';
            
            const details = document.createElement('details');
            details.className = 'reasoning-box';
            details.open = true;
            const summary = document.createElement('summary');
            summary.textContent = '🧠 思考过程中...';
            details.appendChild(summary);
            const reasoningDiv = document.createElement('div');
            reasoningDiv.className = 'reasoning-content';
            reasoningDiv.textContent = '';
            details.appendChild(reasoningDiv);
            wrap.appendChild(details);

            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg';
            msgDiv.textContent = '';
            msgDiv.classList.add('cursor-blink');
            wrap.appendChild(msgDiv);
            chatBox.appendChild(wrap);
            chatBox.scrollTop = chatBox.scrollHeight;

            let fullReasoning = '';
            let fullContent = '';

            try {
                const apiMessages = session.messages.filter(m => !m._loading && m.content).map(m => ({ role: m.role, content: m.content }));
                const body = {
                    model: modelSelect.value,
                    messages: apiMessages,
                    stream: true,
                    max_tokens: 4096
                };
                if (fileIds.length > 0) body.file_ids = fileIds;

                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify(body),
                    signal: abortController.signal
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(`API错误(${response.status}): ${errData.error?.message || '请检查Key'}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const payload = line.slice(6).trim();
                            if (payload === '[DONE]') continue;
                            try {
                                const json = JSON.parse(payload);
                                const delta = json.choices?.[0]?.delta;
                                if (delta) {
                                    if (delta.reasoning_content) {
                                        fullReasoning += delta.reasoning_content;
                                        reasoningDiv.textContent = fullReasoning;
                                        reasoningDiv.scrollTop = reasoningDiv.scrollHeight;
                                    }
                                    if (delta.content) {
                                        fullContent += delta.content;
                                        msgDiv.textContent = fullContent;
                                        chatBox.scrollTop = chatBox.scrollHeight;
                                    }
                                }
                            } catch (e) { /* 忽略 */ }
                        }
                    }
                }

                const savedMsg = session.messages[aiMsgIndex];
                if (savedMsg) {
                    savedMsg.content = fullContent || '(空回复)';
                    savedMsg.reasoning = fullReasoning || '';
                    savedMsg._loading = false;
                }
                saveSessions();
                details.open = false;
                summary.textContent = '🧠 思考过程 (点击展开)';
                msgDiv.classList.remove('cursor-blink');
                renderChat();
                statusText.textContent = '✅ 回复完成';

            } catch (error) {
                if (error.name === 'AbortError') {
                    const savedMsg = session.messages[aiMsgIndex];
                    if (savedMsg) {
                        savedMsg.content = fullContent || '(已停止)';
                        savedMsg.reasoning = fullReasoning || '';
                        savedMsg._loading = false;
                    }
                    saveSessions();
                    renderChat();
                    statusText.textContent = '⏹ 已停止生成';
                } else {
                    session.messages.pop();
                    session.messages.push({ role: 'assistant', content: `❌ 出错：${error.message}`, reasoning: fullReasoning || '出错前思考' });
                    saveSessions();
                    renderChat();
                    statusText.textContent = '⚠️ 请求失败';
                }
            } finally {
                sendBtn.disabled = false;
                stopBtn.style.display = 'none';
                isStreaming = false;
                abortController = null;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        stopBtn.addEventListener('click', () => {
            if (abortController) {
                abortController.abort();
                statusText.textContent = '⏹ 正在停止...';
            }
        });

        // ============================================================
        //  启动
        // ============================================================
        loadData();
        renderChat();
        statusText.textContent = '就绪 (V4 模型，支持文件夹/置顶/安全删除)';
    </script>
</body>
</html>
