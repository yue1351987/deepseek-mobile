        // ============================================================
        // 目录功能
        // ============================================================
        function updateTOC() {
            const session = getCurrentSession();
            if (!session) return;
            const userMessages = session.turns
                .map((turn, idx) => {
                    const iv = turn.inputVersions[turn.selectedInputIdx];
                    return iv && iv.content ? { content: iv.content, idx: idx } : null;
                })
                .filter(Boolean);
            tocPanel.innerHTML = '';
            if (userMessages.length === 0) {
                tocPanel.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:4px 0;">暂无用户消息</div>';
                return;
            }
            userMessages.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'toc-item';
                const preview = item.content.length > 10 ? item.content.slice(0, 10) + '…' : item.content;
                div.innerHTML = `<span class="toc-index">#${idx+1}</span> ${preview}`;
                div.addEventListener('click', () => {
                    const turnWrappers = chatBox.querySelectorAll('.turn-wrapper');
                    if (turnWrappers[item.idx]) {
                        turnWrappers[item.idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
                        turnWrappers[item.idx].style.transition = 'background 0.3s';
                        turnWrappers[item.idx].style.background = 'var(--highlight-bg)';
                        setTimeout(() => turnWrappers[item.idx].style.background = '', 1500);
                    }
                });
                tocPanel.appendChild(div);
            });
        }

        function toggleTOC() {
            const isOpen = tocPanel.classList.toggle('open');
            tocBtn.classList.toggle('active', isOpen);
            if (isOpen) updateTOC();
        }
        tocBtn.addEventListener('click', toggleTOC);

        // ============================================================
        // 渲染聊天 - 双层版本
        // ============================================================
        function renderChat() {
            const session = getCurrentSession();
            if (!session) return;
            titleArea.textContent = session.name || '新对话';
            chatBox.innerHTML = '';

            if (session.turns.length === 0) {
                const wrap = document.createElement('div');
                wrap.className = 'msg-wrapper assistant';
                wrap.innerHTML = `<div class="msg">👋 开始新对话吧！支持上传图片和文档。</div>`;
                chatBox.appendChild(wrap);
            } else {
                session.turns.forEach((turn, turnIdx) => {
                    const ivIdx = turn.selectedInputIdx !== undefined ? turn.selectedInputIdx : 0;
                    const iv = turn.inputVersions[ivIdx];
                    if (!iv) return;
                    const ovIdx = iv.selectedOutputIdx !== undefined ? iv.selectedOutputIdx : 0;
                    const ov = iv.outputVersions[ovIdx] || { content: '', reasoning: '', _loading: false };

                    const turnWrapper = document.createElement('div');
                    turnWrapper.className = 'turn-wrapper';
                    turnWrapper.dataset.turnIndex = turnIdx;

                    // --- 用户消息 ---
                    const userWrap = document.createElement('div');
                    userWrap.className = 'msg-wrapper user';
                    const userMsgDiv = document.createElement('div');
                    userMsgDiv.className = 'msg';
                    userMsgDiv.textContent = iv.content || '(空消息)';
                    userWrap.appendChild(userMsgDiv);
                    turnWrapper.appendChild(userWrap);

                    // --- 用户消息操作栏 ---
                    const userActions = document.createElement('div');
                    userActions.className = 'msg-actions';
                    // 输入版本切换（如果有多版本）
                    if (turn.inputVersions.length > 1) {
                        const verControl = createInputVersionControl(turn, turnIdx);
                        userActions.appendChild(verControl);
                    }
                    const editBtn = document.createElement('button');
                    editBtn.textContent = '编辑';
                    editBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        editUserMessage(turnIdx);
                    });
                    userActions.appendChild(editBtn);
                    const isFav = isMsgFavorited(session.id, turnIdx, ivIdx);
                    const favBtn = document.createElement('button');
                    favBtn.className = 'fav-btn';
                    favBtn.textContent = isFav ? '★' : '☆';
                    favBtn.classList.toggle('favorited', isFav);
                    favBtn.title = isFav ? '取消收藏' : '收藏此消息';
                    favBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleFavoriteMsg(session.id, turnIdx, ivIdx);
                    });
                    userActions.appendChild(favBtn);
                    if (userActions.children.length > 0) {
                        userWrap.appendChild(userActions);
                    }

                    // --- AI 回复 ---
                    if (ov.content) {
                        const assistantWrap = document.createElement('div');
                        assistantWrap.className = 'msg-wrapper assistant';
                        if (ov.reasoning && showReasoning) {
                            const details = document.createElement('details');
                            details.className = 'reasoning-box';
                            details.open = false;
                            const summary = document.createElement('summary');
                            summary.textContent = '思考过程 (点击展开)';
                            details.appendChild(summary);
                            const contentDiv = document.createElement('div');
                            contentDiv.className = 'reasoning-content';
                            contentDiv.textContent = ov.reasoning;
                            details.appendChild(contentDiv);
                            assistantWrap.appendChild(details);
                        }
                        const assistantMsgDiv = document.createElement('div');
                        assistantMsgDiv.className = 'msg';
                        assistantMsgDiv.textContent = ov.content;
                        assistantWrap.appendChild(assistantMsgDiv);

                        const assistantActions = document.createElement('div');
                        assistantActions.className = 'msg-actions';
                        // 输出版本切换（如果有多版本）
                        if (iv.outputVersions.length > 1) {
                            const verControlAI = createOutputVersionControl(turn, turnIdx, ivIdx);
                            assistantActions.appendChild(verControlAI);
                        }
                        const regenBtn = document.createElement('button');
                        regenBtn.textContent = '重新生成';
                        regenBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            regenerateMessage(turnIdx);
                        });
                        assistantActions.appendChild(regenBtn);
                        if (assistantActions.children.length > 0) {
                            assistantWrap.appendChild(assistantActions);
                        }
                        turnWrapper.appendChild(assistantWrap);
                    } else if (ov._loading) {
                        const loadingWrap = document.createElement('div');
                        loadingWrap.className = 'msg-wrapper assistant';
                        const loadingMsgDiv = document.createElement('div');
                        loadingMsgDiv.className = 'msg';
                        loadingMsgDiv.textContent = '🤔 思考中...';
                        loadingMsgDiv.classList.add('cursor-blink');
                        loadingWrap.appendChild(loadingMsgDiv);
                        turnWrapper.appendChild(loadingWrap);
                    } else {
                        // 没有任何输出，显示一个占位提示（可点击重新生成）
                        const assistantWrap = document.createElement('div');
                        assistantWrap.className = 'msg-wrapper assistant';
                        const placeholder = document.createElement('div');
                        placeholder.className = 'msg';
                        placeholder.textContent = '💬 点击“重新生成”开始对话';
                        placeholder.style.color = 'var(--text-muted)';
                        assistantWrap.appendChild(placeholder);
                        const actions = document.createElement('div');
                        actions.className = 'msg-actions';
                        const regenBtn = document.createElement('button');
                        regenBtn.textContent = '重新生成';
                        regenBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            regenerateMessage(turnIdx);
                        });
                        actions.appendChild(regenBtn);
                        assistantWrap.appendChild(actions);
                        turnWrapper.appendChild(assistantWrap);
                    }

                    chatBox.appendChild(turnWrapper);
                });
            }
            chatBox.scrollTop = chatBox.scrollHeight;
            renderDrawer();
            updateTokenCounter();
            updateTOC();
            updateConvStatus();
        }

        // ============================================================
        // 输入版本控制组件
        // ============================================================
        function createInputVersionControl(turn, turnIdx) {
            const container = document.createElement('span');
            container.className = 'version-control';
            const leftBtn = document.createElement('button');
            leftBtn.textContent = '◀';
            leftBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                switchInputVersion(turnIdx, -1);
            });
            const rightBtn = document.createElement('button');
            rightBtn.textContent = '▶';
            rightBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                switchInputVersion(turnIdx, 1);
            });
            const label = document.createElement('span');
            const total = turn.inputVersions.length;
            const current = turn.selectedInputIdx !== undefined ? turn.selectedInputIdx : 0;
            label.textContent = `${current+1}/${total}`;
            container.appendChild(leftBtn);
            container.appendChild(label);
            container.appendChild(rightBtn);
            return container;
        }

        // ============================================================
        // 输出版本控制组件
        // ============================================================
        function createOutputVersionControl(turn, turnIdx, inputIdx) {
            const container = document.createElement('span');
            container.className = 'version-control';
            const leftBtn = document.createElement('button');
            leftBtn.textContent = '◀';
            leftBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                switchOutputVersion(turnIdx, inputIdx, -1);
            });
            const rightBtn = document.createElement('button');
            rightBtn.textContent = '▶';
            rightBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                switchOutputVersion(turnIdx, inputIdx, 1);
            });
            const label = document.createElement('span');
            const iv = turn.inputVersions[inputIdx];
            const total = iv.outputVersions.length;
            const current = iv.selectedOutputIdx !== undefined ? iv.selectedOutputIdx : 0;
            label.textContent = `${current+1}/${total}`;
            container.appendChild(leftBtn);
            container.appendChild(label);
            container.appendChild(rightBtn);
            return container;
        }

        // ============================================================
        // 切换输入版本
        // ============================================================
        function switchInputVersion(turnIdx, direction) {
            const session = getCurrentSession();
            if (!session) return;
            const turn = session.turns[turnIdx];
            if (!turn) return;
            const total = turn.inputVersions.length;
            if (total <= 1) return;
            let idx = turn.selectedInputIdx !== undefined ? turn.selectedInputIdx : 0;
            idx = (idx + direction + total) % total;
            turn.selectedInputIdx = idx;
            // 自动选中该输入版本的最后一个输出
            const iv = turn.inputVersions[idx];
            iv.selectedOutputIdx = iv.outputVersions.length - 1;
            if (iv.selectedOutputIdx < 0) iv.selectedOutputIdx = 0;
            saveSessions();
            renderChat();
        }

        // ============================================================
        // 切换输出版本（在同一输入版本下）
        // ============================================================
        function switchOutputVersion(turnIdx, inputIdx, direction) {
            const session = getCurrentSession();
            if (!session) return;
            const turn = session.turns[turnIdx];
            if (!turn) return;
            const iv = turn.inputVersions[inputIdx];
            if (!iv) return;
            const total = iv.outputVersions.length;
            if (total <= 1) return;
            let idx = iv.selectedOutputIdx !== undefined ? iv.selectedOutputIdx : 0;
            idx = (idx + direction + total) % total;
            iv.selectedOutputIdx = idx;
            saveSessions();
            renderChat();
        }

        // ============================================================
        // 编辑用户消息（新增输入版本）
        // ============================================================
        function editUserMessage(turnIdx) {
            const session = getCurrentSession();
            if (!session) return;
            const turn = session.turns[turnIdx];
            if (!turn) return;
            const ivIdx = turn.selectedInputIdx !== undefined ? turn.selectedInputIdx : 0;
            const iv = turn.inputVersions[ivIdx];
            if (!iv) return;
            const newText = prompt('修改你的消息：', iv.content);
            if (newText === null || newText.trim() === '') return;

            // 新建输入版本
            const newIv = {
                id: generateId(),
                content: newText.trim(),
                outputVersions: [],
                selectedOutputIdx: 0
            };
            turn.inputVersions.push(newIv);
            turn.selectedInputIdx = turn.inputVersions.length - 1;
            // 自动生成第一个输出（调用重新生成）
            saveSessions();
            renderChat();
            regenerateMessage(turnIdx);
        }

        // ============================================================
        // 重新生成 AI 回复（在当前输入版本下新增输出版本）
        // ============================================================
        async function regenerateMessage(turnIdx) {
            const session = getCurrentSession();
            if (!session) return;
            const turn = session.turns[turnIdx];
            if (!turn) return;
            const ivIdx = turn.selectedInputIdx !== undefined ? turn.selectedInputIdx : 0;
            const iv = turn.inputVersions[ivIdx];
            if (!iv || !iv.content) {
                alert('当前输入版本为空，请先输入内容');
                return;
            }

            // 新增一个输出版本（空内容，置 loading 状态）
            const newOv = {
                content: '',
                reasoning: '',
                _loading: true,
                timestamp: Date.now()
            };
            iv.outputVersions.push(newOv);
            iv.selectedOutputIdx = iv.outputVersions.length - 1;
            saveSessions();
            renderChat();

            // 执行请求
            await performStreamRequest(session, turnIdx, iv, newOv);
        }

        // ============================================================
        // 执行流式请求
        // ============================================================
        async function performStreamRequest(session, turnIdx, inputVersion, outputVersion) {
            const key = localStorage.getItem(KEY_STORAGE);
            if (!key) {
                outputVersion._loading = false;
                outputVersion.content = '❌ 未找到 API Key';
                saveSessions();
                renderChat();
                return;
            }

            // 构建历史：当前 turn 之前的所有 turn，使用每个 turn 当前选中的输入版本及其最新输出
            const history = [];
            const memoryLimit = memoryMode === 'window' ? 20 : Infinity;
            const startIdx = Math.max(0, turnIdx - memoryLimit);
            for (let i = startIdx; i < turnIdx; i++) {
                const prevTurn = session.turns[i];
                const prevIvIdx = prevTurn.selectedInputIdx !== undefined ? prevTurn.selectedInputIdx : 0;
                const prevIv = prevTurn.inputVersions[prevIvIdx];
                if (prevIv) {
                    if (prevIv.content) history.push({ role: 'user', content: prevIv.content });
                    const prevOvIdx = prevIv.selectedOutputIdx !== undefined ? prevIv.selectedOutputIdx : 0;
                    const prevOv = prevIv.outputVersions[prevOvIdx];
                    if (prevOv && prevOv.content) history.push({ role: 'assistant', content: prevOv.content });
                }
            }
            history.push({ role: 'user', content: inputVersion.content });

            const model = mode === 'flash' ? 'deepseek-v4-flash' : 'deepseek-v4-pro';
            const requestBody = {
                model: model,
                messages: history,
                stream: true,
                max_tokens: 4096,
                temperature: 0.7,
            };
            if (deepThinking) {
                requestBody.reasoning_effort = 'high';
            }

            try {
                isStreaming = true;
                sendBtn.disabled = true;
                stopBtn.style.display = 'flex';
                statusShort.textContent = '⏳ 生成中...';
                updateConvStatus();

                abortController = new AbortController();
                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${key}`
                    },
                    body: JSON.stringify(requestBody),
                    signal: abortController.signal
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(`API错误(${response.status}): ${errData.error?.message || '请检查Key'}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullContent = '';
                let reasoningContent = '';

                outputVersion.content = '';
                outputVersion.reasoning = '';
                outputVersion._loading = true;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const payload = line.slice(6).trim();
                            if (payload === '[DONE]') continue;
                            try {
                                const json = JSON.parse(payload);
                                const delta = json.choices?.[0]?.delta;
                                if (delta) {
                                    if (delta.content) {
                                        fullContent += delta.content;
                                        outputVersion.content = fullContent;
                                        renderChat();
                                        chatBox.scrollTop = chatBox.scrollHeight;
                                    }
                                    if (delta.reasoning_content) {
                                        reasoningContent += delta.reasoning_content;
                                        outputVersion.reasoning = reasoningContent;
                                        renderChat();
                                        chatBox.scrollTop = chatBox.scrollHeight;
                                    }
                                }
                            } catch (e) { /* ignore */ }
                        }
                    }
                }

                outputVersion._loading = false;
                saveSessions();
                renderChat();
                statusShort.textContent = '✅ 回复完成';
                setTimeout(() => { if (statusShort.textContent === '✅ 回复完成') statusShort.textContent = '就绪'; updateConvStatus(); }, 2000);

            } catch (error) {
                if (error.name === 'AbortError') {
                    outputVersion._loading = false;
                    outputVersion.content = outputVersion.content || '(已停止)';
                    saveSessions();
                    renderChat();
                    statusShort.textContent = '⏹ 已停止';
                    setTimeout(() => { if (statusShort.textContent === '⏹ 已停止') statusShort.textContent = '就绪'; updateConvStatus(); }, 1500);
                } else {
                    outputVersion._loading = false;
                    outputVersion.content = `❌ 失败: ${error.message}`;
                    saveSessions();
                    renderChat();
                    statusShort.textContent = '⚠️ 生成失败';
                }
            } finally {
                isStreaming = false;
                sendBtn.disabled = false;
                stopBtn.style.display = 'none';
                abortController = null;
                updateConvStatus();
            }
        }

        // ============================================================
        // 发送新消息（创建新回合，包含第一个输入版本）
        // ============================================================
        async function sendMessage() {
            if (isStreaming) {
                alert('⏳ 正在生成中，请等待完成或点击停止');
                return;
            }

            const key = localStorage.getItem(KEY_STORAGE);
            if (!key) {
                alert('❌ 未找到 API Key，请先在设置中保存 Key');
                return;
            }

            const text = promptInput.value.trim();
            if (!text && pendingAttachments.length === 0) {
                alert('⚠️ 请输入问题或上传文件');
                return;
            }

            let session = getCurrentSession();
            if (!session) {
                createNewSession();
                session = getCurrentSession();
                if (!session) {
                    alert('❌ 无法创建会话');
                    return;
                }
            }

            const userContent = text || '(文件上传)';

            // 创建新回合，包含一个输入版本
            const newTurn = {
                inputVersions: [{
                    id: generateId(),
                    content: userContent,
                    outputVersions: [],
                    selectedOutputIdx: 0
                }],
                selectedInputIdx: 0
            };
            session.turns.push(newTurn);
            const turnIdx = session.turns.length - 1;
            saveSessions();
            renderChat();

            promptInput.value = '';
            promptInput.style.height = 'auto';
            pendingAttachments = [];
            renderAttachmentBar();

            // 自动触发重新生成（第一个输出）
            await regenerateMessage(turnIdx);
        }

        // ============================================================
        // 重置流状态
        // ============================================================
        window.resetStreamState = function() {
            if (isStreaming) {
                if (abortController) {
                    abortController.abort();
                }
                isStreaming = false;
                abortController = null;
                sendBtn.disabled = false;
                stopBtn.style.display = 'none';
                statusShort.textContent = '已重置';
                setTimeout(() => { if (statusShort.textContent === '已重置') statusShort.textContent = '就绪'; updateConvStatus(); }, 1000);
            } else {
                statusShort.textContent = '当前无流式任务';
                setTimeout(() => { if (statusShort.textContent === '当前无流式任务') statusShort.textContent = '就绪'; updateConvStatus(); }, 1000);
            }
        };

        // ============================================================
        // 停止按钮
        // ============================================================
        stopBtn.addEventListener('click', () => {
            if (abortController) {
                abortController.abort();
                statusShort.textContent = '⏹ 正在停止...';
                updateConvStatus();
            }
        });

        // ============================================================
        // 附件管理
        // ============================================================
        function renderAttachmentBar() {
            attachmentBar.innerHTML = '';
            if (pendingAttachments.length === 0) { attachmentBar.classList.remove('show'); return; }
            attachmentBar.classList.add('show');
            pendingAttachments.forEach((att, index) => {
                const tag = document.createElement('span');
                tag.className = 'attach-tag';
                const icon = att.type === 'image' ? '🖼️' : '📄';
                tag.innerHTML = `${icon} ${att.name}`;
                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-attach';
                removeBtn.textContent = '✕';
                removeBtn.addEventListener('click', () => {
                    pendingAttachments.splice(index, 1);
                    renderAttachmentBar();
                });
                tag.appendChild(removeBtn);
                attachmentBar.appendChild(tag);
            });
        }

        attachBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            fileInput.value = '';
            for (const file of files) {
                const isImage = file.type.startsWith('image/');
                if (isImage) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        pendingAttachments.push({ type: 'image', data: ev.target.result, name: file.name });
                        renderAttachmentBar();
                    };
                    reader.readAsDataURL(file);
                } else {
                    pendingAttachments.push({ type: 'file', data: file.name, name: file.name });
                    renderAttachmentBar();
                }
            }
        });

        // ============================================================
        // 文件夹 & 会话管理（沿用之前的，略作调整）
        // ============================================================
        function renameSession(sessionId) {
            const session = sessions.find(s => s.id === sessionId);
            if (!session) return;
            const newName = prompt('重命名对话：', session.name);
            if (newName && newName.trim() !== '') {
                session.name = newName.trim();
                saveSessions();
                renderDrawer();
                if (session.id === currentId) renderChat();
            }
        }

        function createFolder() {
            const name = prompt('请输入文件夹名称：', '新文件夹');
            if (!name || name.trim() === '') return;
            const folder = { id: generateId(), name: name.trim(), pinned: false };
            folders.push(folder);
            saveSessions();
            renderDrawer();
        }

        function renameFolder(folderId) {
            const folder = folders.find(f => f.id === folderId);
            if (!folder) return;
            const newName = prompt('重命名文件夹：', folder.name);
            if (newName && newName.trim() !== '') {
                folder.name = newName.trim();
                saveSessions();
                renderDrawer();
            }
        }

        function toggleFolderPin(folderId) {
            const folder = folders.find(f => f.id === folderId);
            if (folder) { folder.pinned = !folder.pinned; saveSessions(); renderDrawer(); }
        }

        function deleteFolder(folderId) {
            const folder = folders.find(f => f.id === folderId);
            if (!folder) return;
            const confirmText = prompt(`⚠️ 确定要删除文件夹“${folder.name}”吗？\n其中的对话将移至“未分类”。\n请输入“确认删除”以继续：`);
            if (confirmText !== '确认删除') { alert('删除已取消'); return; }
            sessions.forEach(s => { if (s.folderId === folderId) s.folderId = null; });
            folders = folders.filter(f => f.id !== folderId);
            saveSessions();
            renderDrawer();
        }

        function toggleSessionPin(sessionId) {
            const session = sessions.find(s => s.id === sessionId);
            if (session) { session.pinned = !session.pinned; saveSessions(); renderDrawer(); }
        }

        function deleteSessionWithConfirm(sessionId) {
            const session = sessions.find(s => s.id === sessionId);
            if (!session) return;
            if (sessions.length <= 1) { alert('至少保留一个对话'); return; }
            const confirmText = prompt(`⚠️ 确定要删除对话“${session.name}”吗？\n请输入“确认删除”以继续：`);
            if (confirmText !== '确认删除') { alert('删除已取消'); return; }
            sessions = sessions.filter(s => s.id !== sessionId);
            if (currentId === sessionId) { currentId = sessions[0].id; sessions[0].active = true; }
            saveSessions();
            renderChat();
            renderDrawer();
        }

        function moveSessionToFolder(sessionId, folderId) {
            const session = sessions.find(s => s.id === sessionId);
            if (session) {
                session.folderId = folderId;
                saveSessions();
                renderDrawer();
            }
        }

        function exportSingleSession(sessionId) {
            const session = sessions.find(s => s.id === sessionId);
            if (!session) return;
            if (!session.turns.length) { alert('该对话为空，无法导出'); return; }
            let text = `导出时间: ${new Date().toLocaleString()}\n对话: ${session.name}\n${'='.repeat(30)}\n\n`;
            session.turns.forEach((turn, idx) => {
                const ivIdx = turn.selectedInputIdx !== undefined ? turn.selectedInputIdx : 0;
                const iv = turn.inputVersions[ivIdx];
                if (!iv) return;
                const ovIdx = iv.selectedOutputIdx !== undefined ? iv.selectedOutputIdx : 0;
                const ov = iv.outputVersions[ovIdx] || { content: '' };
                text += `[回合 ${idx+1}]\n`;
                if (iv.content) text += `👤 我: ${iv.content}\n`;
                if (ov.content) text += `🤖 AI: ${ov.content}\n`;
                text += '\n---\n\n';
            });
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${session.name}_${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(a.href);
        }

            if (pinnedFolders.length) {
                const title = document.createElement('div');
                title.className = 'drawer-section-title';
                title.textContent = '📌 置顶文件夹';
                sessionListContainer.appendChild(title);
                pinnedFolders.forEach(f => { sessionListContainer.appendChild(createFolderItem(f)); });
            }
            if (pinnedSessions.length) {
                const title = document.createElement('div');
                title.className = 'drawer-section-title';
                title.textContent = '📌 置顶对话';
                sessionListContainer.appendChild(title);
                pinnedSessions.forEach(s => { sessionListContainer.appendChild(createSessionItem(s)); });
            }
            if (unpinnedFolders.length) {
                const title = document.createElement('div');
                title.className = 'drawer-section-title';
                title.textContent = '📁 文件夹';
                sessionListContainer.appendChild(title);
                unpinnedFolders.forEach(f => { sessionListContainer.appendChild(createFolderItem(f)); });
            }
            if (unpinnedSessions.length) {
                const title = document.createElement('div');
                title.className = 'drawer-section-title';
                title.textContent = '💬 对话';
                sessionListContainer.appendChild(title);
                unpinnedSessions.forEach(s => { sessionListContainer.appendChild(createSessionItem(s)); });
            }
            if (sessions.length === 0 && folders.length === 0) {
                const empty = document.createElement('div');
                empty.style.cssText = 'color:var(--text-muted);text-align:center;padding:30px 0;';
                empty.textContent = '暂无对话和文件夹';
                sessionListContainer.appendChild(empty);
            }
        }

        // ============================================================
        // 会话切换、创建
        // ============================================================
        function switchSession(id) {
            if (id === currentId) { closeDrawer(); return; }
            sessions.forEach(s => delete s.active);
            const target = sessions.find(s => s.id === id);
            if (target) {
                target.active = true;
                currentId = id;
                saveSessions();
                renderChat();
                closeDrawer();
            }
        }

        function createNewSession() {
            const count = sessions.length + 1;
            const newSession = {
                id: generateId(),
                name: `对话 ${count}`,
                turns: [],
                folderId: null,
                pinned: false,
                active: true
            };
            sessions.forEach(s => delete s.active);
            sessions.push(newSession);
            currentId = newSession.id;
            saveSessions();
            renderChat();
            closeDrawer();
            promptInput.focus();
            updateCharCounter();
            updateConvStatus();
        }

        function openDrawer() { renderDrawer(); overlay.classList.add('active'); drawer.classList.add('open'); }
        function closeDrawer() { overlay.classList.remove('active'); drawer.classList.remove('open'); }

        menuBtn.addEventListener('click', openDrawer);
        closeDrawerBtn.addEventListener('click', closeDrawer);
        overlay.addEventListener('click', closeDrawer);
        newSessionBtn.addEventListener('click', createNewSession);
        newFolderBtn.addEventListener('click', createFolder);
        newChatBtn.addEventListener('click', createNewSession);
        titleArea.addEventListener('click', () => {
            const cur = getCurrentSession();
            if (cur) {
                const newName = prompt('重命名对话：', cur.name);
                if (newName && newName.trim() !== '') {
                    cur.name = newName.trim();
                    saveSessions();
                    renderChat();
                }
            }
        });

        // ============================================================
        // 设置面板交互（同之前，略）
        // ============================================================
        settingsBtn.addEventListener('click', () => { settingsOverlay.classList.add('active'); });
        closeSettingsBtn.addEventListener('click', () => { settingsOverlay.classList.remove('active'); });
        settingsOverlay.addEventListener('click', (e) => { if (e.target === settingsOverlay) settingsOverlay.classList.remove('active'); });

        settingsDarkToggle.addEventListener('click', () => {
            const isLight = document.body.classList.toggle('light');
            settingsDarkToggle.classList.toggle('active', isLight);
            darkLabel.textContent = isLight ? '开启' : '关闭';
            localStorage.setItem(THEME_KEY, isLight ? 'light' : 'dark');
        });

        modeOptions.addEventListener('click', (e) => {
            const card = e.target.closest('.option-card');
            if (!card) return;
            const val = card.dataset.value;
            if (val === pendingMode) return;
            modeOptions.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            pendingMode = val;
            settingsModeConfirm.disabled = false;
        });

        settingsModeConfirm.addEventListener('click', () => {
            if (pendingMode !== mode) {
                mode = pendingMode;
                localStorage.setItem(MODE_KEY, mode);
                updateModeUI();
                statusShort.textContent = `已切换为 ${mode === 'flash' ? '快速' : '专家'} 模式`;
                setTimeout(() => { if (statusShort.textContent.includes('切换')) statusShort.textContent = '就绪'; updateConvStatus(); }, 1500);
                updateConvStatus();
            }
            settingsModeConfirm.disabled = true;
        });

        memoryOptions.addEventListener('click', (e) => {
            const card = e.target.closest('.option-card');
            if (!card) return;
            const val = card.dataset.value;
            if (val === pendingMemory) return;
            memoryOptions.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            pendingMemory = val;
            settingsMemoryConfirm.disabled = false;
        });

        settingsMemoryConfirm.addEventListener('click', () => {
            if (pendingMemory !== memoryMode) {
                memoryMode = pendingMemory;
                localStorage.setItem(MEMORY_MODE_KEY, memoryMode);
                updateMemoryUI();
                statusShort.textContent = `记忆摘要: ${memoryMode === 'full' ? '全量' : '窗口(最近20条)'}`;
                setTimeout(() => { if (statusShort.textContent.includes('记忆摘要')) statusShort.textContent = '就绪'; updateConvStatus(); }, 2000);
            }
            settingsMemoryConfirm.disabled = true;
        });

        settingsApiSave.addEventListener('click', () => {
            const key = settingsApiKey.value.trim();
            if (key) {
                localStorage.setItem(KEY_STORAGE, key);
                currentKey = key;
                statusShort.textContent = '✅ Key 已保存';
                setTimeout(() => { if (statusShort.textContent === '✅ Key 已保存') statusShort.textContent = '就绪'; updateConvStatus(); }, 1500);
            } else {
                alert('请输入有效的 API Key');
            }
        });

        settingsApiClear.addEventListener('click', () => {
            if (confirm('确定要清除 API Key 吗？')) {
                localStorage.removeItem(KEY_STORAGE);
                currentKey = '';
                settingsApiKey.value = '';
                statusShort.textContent = 'Key 已清除';
                setTimeout(() => { if (statusShort.textContent === 'Key 已清除') statusShort.textContent = '就绪'; updateConvStatus(); }, 1500);
            }
        });

        fontSizeOptions.addEventListener('click', (e) => {
            const card = e.target.closest('.font-card');
            if (!card) return;
            const size = parseInt(card.dataset.size);
            if (size === fontSize) return;
            fontSize = size;
            localStorage.setItem(FONT_SIZE_KEY, String(fontSize));
            document.documentElement.style.setProperty('--font-size-msg', fontSize + 'px');
            updateFontSizeUI();
            renderChat();
        });

        dispReasoning.addEventListener('click', () => {
            showReasoning = !showReasoning;
            localStorage.setItem(SHOW_REASONING_KEY, String(showReasoning));
            updateShowReasoningUI();
            renderChat();
            statusShort.textContent = showReasoning ? '思考过程已显示' : '思考过程已隐藏';
            setTimeout(() => { if (statusShort.textContent.includes('思考过程')) statusShort.textContent = '就绪'; updateConvStatus(); }, 1500);
        });

        dispChars.addEventListener('click', () => {
            showChars = !showChars;
            localStorage.setItem(SHOW_CHARS_KEY, String(showChars));
            updateShowCharsUI();
            updateCharCounter();
        });

        dispTokens.addEventListener('click', () => {
            showTokens = !showTokens;
            localStorage.setItem(SHOW_TOKENS_KEY, String(showTokens));
            updateShowTokensUI();
            updateConvStatus();
        });

        // ============================================================
        // 备份 & 恢复
        // ============================================================
        function backupData() {
            try {
                const data = {
                    version: '7.0',
                    exportedAt: new Date().toISOString(),
                    sessions: sessions,
                    folders: folders,
                    favorites: favorites,
                    apiKey: localStorage.getItem(KEY_STORAGE) || '',
                    theme: localStorage.getItem(THEME_KEY) || 'dark',
                    mode: mode,
                    deepThinking: deepThinking,
                    showReasoning: showReasoning,
                    showChars: showChars,
                    showTokens: showTokens,
                    fontSize: fontSize,
                    memoryMode: memoryMode
                };
                const json = JSON.stringify(data, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const dateStr = new Date().toISOString().slice(0,10);
                a.download = `My_DeepSeek_备份_${dateStr}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                statusShort.textContent = '✅ 备份成功！';
                setTimeout(() => { if (statusShort.textContent === '✅ 备份成功！') statusShort.textContent = '就绪'; updateConvStatus(); }, 3000);
            } catch (e) { alert('备份失败：' + e.message); }
        }

        function restoreData(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.sessions || !Array.isArray(data.sessions)) throw new Error('无效备份文件');
                    sessions = data.sessions;
                    folders = data.folders || [];
                    favorites = data.favorites || [];
                    if (data.apiKey) { localStorage.setItem(KEY_STORAGE, data.apiKey); settingsApiKey.value = data.apiKey; }
                    if (data.theme) {
                        localStorage.setItem(THEME_KEY, data.theme);
                        if (data.theme === 'light') {
                            document.body.classList.add('light');
                            settingsDarkToggle.classList.add('active');
                            darkLabel.textContent = '开启';
                        } else {
                            document.body.classList.remove('light');
                            settingsDarkToggle.classList.remove('active');
                            darkLabel.textContent = '关闭';
                        }
                    }
                    if (data.mode) {
                        mode = data.mode;
                        pendingMode = mode;
                        localStorage.setItem(MODE_KEY, mode);
                        updateModeUI();
                    }
                    if (data.deepThinking !== undefined) {
                        deepThinking = data.deepThinking;
                        localStorage.setItem(DEEP_THINKING_KEY, String(deepThinking));
                        updateDeepThinkingUI();
                    }
                    if (data.showReasoning !== undefined) {
                        showReasoning = data.showReasoning;
                        localStorage.setItem(SHOW_REASONING_KEY, String(showReasoning));
                        updateShowReasoningUI();
                    }
                    if (data.showChars !== undefined) {
                        showChars = data.showChars;
                        localStorage.setItem(SHOW_CHARS_KEY, String(showChars));
                        updateShowCharsUI();
                    }
                    if (data.showTokens !== undefined) {
                        showTokens = data.showTokens;
                        localStorage.setItem(SHOW_TOKENS_KEY, String(showTokens));
                        updateShowTokensUI();
                    }
                    if (data.fontSize) {
                        fontSize = data.fontSize;
                        localStorage.setItem(FONT_SIZE_KEY, String(fontSize));
                        document.documentElement.style.setProperty('--font-size-msg', fontSize + 'px');
                        updateFontSizeUI();
                    }
                    if (data.memoryMode) {
                        memoryMode = data.memoryMode;
                        pendingMemory = memoryMode;
                        localStorage.setItem(MEMORY_MODE_KEY, memoryMode);
                        updateMemoryUI();
                    }
                    const active = sessions.find(s => s.active) || sessions[0];
                    if (active) { currentId = active.id; }
                    else if (sessions.length > 0) { sessions[0].active = true; currentId = sessions[0].id; }
                    else {
                        sessions.push({
                            id: generateId(),
                            name: '新对话',
                            turns: [],
                            folderId: null,
                            pinned: false,
                            active: true
                        });
                        currentId = sessions[0].id;
                    }
                    saveSessions();
                    renderChat();
                    updateCharCounter();
                    statusShort.textContent = '✅ 恢复成功！';
                    alert('✅ 恢复成功！所有数据已还原。');
                    updateConvStatus();
                } catch (err) {
                    alert('恢复失败：' + err.message);
                }
            };
            reader.readAsText(file);
        }

        settingsBackupBtn.addEventListener('click', backupData);
        settingsBackupFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                if (confirm('⚠️ 恢复将覆盖当前所有数据，确定继续？')) {
                    restoreData(file);
                }
            }
            settingsBackupFileInput.value = '';
        });

        // ============================================================
        // 深度思考开关
        // ============================================================
        deepSwitch.addEventListener('click', () => {
            deepThinking = !deepThinking;
            localStorage.setItem(DEEP_THINKING_KEY, String(deepThinking));
            updateDeepThinkingUI();
            statusShort.textContent = deepThinking ? '深度思考已开启 (高费用)' : '深度思考已关闭 (低费用)';
            setTimeout(() => { if (statusShort.textContent.includes('深度思考')) statusShort.textContent = '就绪'; updateConvStatus(); }, 2000);
        });

        // ============================================================
        // 搜索
        // ============================================================
        function performSearch(query) {
            if (!query.trim()) { searchResults.innerHTML = '<div style="color:var(--text-muted);padding:20px;">输入关键词搜索</div>'; return; }
            const q = query.trim().toLowerCase();
            let results = [];
            sessions.forEach(s => {
                s.turns.forEach((turn, tIdx) => {
                    const iv = turn.inputVersions[turn.selectedInputIdx];
                    if (!iv) return;
                    const content = (iv.content || '') + ' ' + (iv.outputVersions[iv.selectedOutputIdx]?.content || '');
                    if (content.toLowerCase().includes(q)) {
                        results.push({
                            sessionId: s.id,
                            sessionName: s.name,
                            turnIndex: tIdx,
                            snippet: content,
                            role: 'mixed'
                        });
                    }
                });
            });
            if (results.length === 0) { searchResults.innerHTML = '<div style="color:var(--text-muted);padding:20px;">未找到</div>'; return; }
            searchResults.innerHTML = '';
            results.slice(0, 30).forEach(r => {
                const div = document.createElement('div');
                div.className = 'search-result-item';
                const snippet = document.createElement('div');
                snippet.className = 'snippet';
                const idx = r.snippet.toLowerCase().indexOf(q);
                let highlighted = r.snippet;
                if (idx !== -1) {
                    const start = Math.max(0, idx - 20);
                    const end = Math.min(r.snippet.length, idx + q.length + 20);
                    highlighted = (start>0?'...':'') + r.snippet.substring(start, idx) + `<mark>${r.snippet.substring(idx, idx+q.length)}</mark>` + r.snippet.substring(idx+q.length, end) + (end<r.snippet.length?'...':'');
                }
                snippet.innerHTML = highlighted;
                const meta = document.createElement('div');
                meta.className = 'meta';
                meta.textContent = `📁 ${r.sessionName} · 回合 ${r.turnIndex+1}`;
                div.appendChild(snippet);
                div.appendChild(meta);
                div.addEventListener('click', () => {
                    closeSearch();
                    switchSession(r.sessionId);
                    setTimeout(() => {
                        const turnWrappers = chatBox.querySelectorAll('.turn-wrapper');
                        if (turnWrappers[r.turnIndex]) {
                            turnWrappers[r.turnIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
                            turnWrappers[r.turnIndex].style.transition = 'background 0.3s';
                            turnWrappers[r.turnIndex].style.background = 'var(--highlight-bg)';
                            setTimeout(() => turnWrappers[r.turnIndex].style.background = '', 2000);
                        }
                    }, 300);
                });
                searchResults.appendChild(div);
            });
        }
        let searchTimeout;
        searchInput.addEventListener('input', () => { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => performSearch(searchInput.value), 300); });
        searchBtnTop.addEventListener('click', () => { searchModal.classList.add('active'); searchInput.value = ''; searchResults.innerHTML = ''; searchInput.focus(); });
        closeSearchBtn.addEventListener('click', closeSearch);
        function closeSearch() { searchModal.classList.remove('active'); }

        // ============================================================
        // 导出当前对话（三选项）
        // ============================================================
        function exportChat(role) {
            const session = getCurrentSession();
            if (!session || !session.turns.length) { alert('当前对话为空，无法导出'); return; }
            let text = `导出时间: ${new Date().toLocaleString()}\n对话: ${session.name}\n${'='.repeat(30)}\n\n`;
            session.turns.forEach((turn, idx) => {
                const iv = turn.inputVersions[turn.selectedInputIdx];
                if (!iv) return;
                const ov = iv.outputVersions[iv.selectedOutputIdx] || { content: '' };
                if (role === 'user' || role === 'all') {
                    text += `[👤 我] (回合 ${idx+1})\n${iv.content || '(空)'}\n\n`;
                }
                if ((role === 'assistant' || role === 'all') && ov.content) {
                    text += `[🤖 AI] (回合 ${idx+1})\n${ov.content}\n\n`;
                }
                text += '---\n\n';
            });
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            const roleName = role === 'user' ? '我的提问' : (role === 'assistant' ? 'AI回复' : '全部');
            a.download = `${session.name}_${roleName}_${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(a.href);
            closeExport();
        }

        exportModal.addEventListener('click', (e) => { if (e.target === exportModal) closeExport(); });
        closeExportBtn.addEventListener('click', closeExport);
        function closeExport() { exportModal.classList.remove('active'); }
        exportAI.addEventListener('click', () => exportChat('assistant'));
        exportUser.addEventListener('click', () => exportChat('user'));
        exportAll.addEventListener('click', () => exportChat('all'));

        // ============================================================
        // 字数统计
        // ============================================================
        promptInput.addEventListener('input', function() {
            updateCharCounter();
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // ============================================================
        // 启动
        // ============================================================
        loadData();
        renderChat();
        updateCharCounter();
        statusShort.textContent = '就绪';
        updateConvStatus();
        updateStorageInfo();
        setInterval(updateStorageInfo, 30000);
    </script>
</body>
</html>
