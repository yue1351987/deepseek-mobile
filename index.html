                delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteFolder(folder.id); });
                actions.appendChild(delBtn);

                folderDiv.appendChild(icon);
                folderDiv.appendChild(nameSpan);
                folderDiv.appendChild(actions);
                container.appendChild(folderDiv);

                const childSessions = sessions.filter(s => s.folderId === folder.id);
                if (childSessions.length > 0) {
                    const childrenDiv = document.createElement('div');
                    childrenDiv.className = 'folder-children';
                    const sorted = [...childSessions].sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));
                    sorted.forEach(s => { childrenDiv.appendChild(createSessionItem(s)); });
                    container.appendChild(childrenDiv);
                } else {
                    const empty = document.createElement('div');
                    empty.style.cssText = 'color:var(--text-muted);font-size:12px;padding:4px 12px;';
                    empty.textContent = '（空文件夹）';
                    container.appendChild(empty);
                }
                return container;
            }

            if (pinnedFolders.length) {
                const title = document.createElement('div');
                title.className = 'drawer-section-title';
                title.textContent = '📌 置顶文件夹';
                sessionListContainer.appendChild(title);
                pinnedFolders.forEach(f => { sessionListContainer.appendChild(createFolderItem(f)); });
            }
            if (pinnedSessions.length) {
                const title = document.createElement('div');
                title.className = 'drawer-section-title';
                title.textContent = '📌 置顶对话';
                sessionListContainer.appendChild(title);
                pinnedSessions.forEach(s => { sessionListContainer.appendChild(createSessionItem(s)); });
            }
            if (unpinnedFolders.length) {
                const title = document.createElement('div');
                title.className = 'drawer-section-title';
                title.textContent = '📁 文件夹';
                sessionListContainer.appendChild(title);
                unpinnedFolders.forEach(f => { sessionListContainer.appendChild(createFolderItem(f)); });
            }
            if (unpinnedSessions.length) {
                const title = document.createElement('div');
                title.className = 'drawer-section-title';
                title.textContent = '💬 对话';
                sessionListContainer.appendChild(title);
                unpinnedSessions.forEach(s => { sessionListContainer.appendChild(createSessionItem(s)); });
            }
            if (sessions.length === 0 && folders.length === 0) {
                const empty = document.createElement('div');
                empty.style.cssText = 'color:var(--text-muted);text-align:center;padding:30px 0;';
                empty.textContent = '暂无对话和文件夹';
                sessionListContainer.appendChild(empty);
            }
        }

        // ============================================================
        //  会话切换、创建
        // ============================================================
        function switchSession(id) {
            if (id === currentId) { closeDrawer(); return; }
            sessions.forEach(s => delete s.active);
            const target = sessions.find(s => s.id === id);
            if (target) {
                target.active = true;
                currentId = id;
                saveSessions();
                renderChat();
                closeDrawer();
            }
        }

        function createNewSession() {
            const count = sessions.length + 1;
            const newSession = { id: generateId(), name: `对话 ${count}`, messages: [], folderId: null, pinned: false, active: true };
            sessions.forEach(s => delete s.active);
            sessions.push(newSession);
            currentId = newSession.id;
            saveSessions();
            renderChat();
            closeDrawer();
            promptInput.focus();
            updateCharCounter();
        }

        function openDrawer() { renderDrawer(); overlay.classList.add('active'); drawer.classList.add('open'); }
        function closeDrawer() { overlay.classList.remove('active'); drawer.classList.remove('open'); }

        menuBtn.addEventListener('click', openDrawer);
        closeDrawerBtn.addEventListener('click', closeDrawer);
        overlay.addEventListener('click', closeDrawer);
        newSessionBtn.addEventListener('click', createNewSession);
        newFolderBtn.addEventListener('click', createFolder);
        newChatBtn.addEventListener('click', createNewSession);
        titleArea.addEventListener('click', () => {
            const cur = getCurrentSession();
            if (cur) {
                const newName = prompt('重命名对话：', cur.name);
                if (newName && newName.trim() !== '') {
                    cur.name = newName.trim();
                    saveSessions();
                    renderChat();
                }
            }
        });

        // ============================================================
        //  设置面板交互
        // ============================================================
        settingsBtn.addEventListener('click', () => { settingsOverlay.classList.add('active'); });
        closeSettingsBtn.addEventListener('click', () => { settingsOverlay.classList.remove('active'); });
        settingsOverlay.addEventListener('click', (e) => { if (e.target === settingsOverlay) settingsOverlay.classList.remove('active'); });

        // 深色模式
        settingsDarkToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            settingsDarkToggle.textContent = isDark ? '开启' : '关闭';
            localStorage.setItem(THEME_KEY, isDark ? 'dark' : 'light');
        });

        // 模型模式
        settingsModeSelect.addEventListener('change', () => {
            mode = settingsModeSelect.value;
            localStorage.setItem(MODE_KEY, mode);
            updateModeUI();
            if (mode === 'flash') {
                deepThinking = false;
                localStorage.setItem(DEEP_THINKING_KEY, 'false');
                updateDeepThinkingUI();
            } else {
                const dt = localStorage.getItem(DEEP_THINKING_KEY);
                if (dt === 'true') deepThinking = true;
                else deepThinking = false;
                updateDeepThinkingUI();
            }
            statusShort.textContent = `已切换为 ${mode === 'flash' ? '快速' : '专家'} 模式`;
            setTimeout(() => { if (statusShort.textContent.includes('切换')) statusShort.textContent = '就绪'; }, 1500);
        });

        // API Key - 保存
        settingsApiSave.addEventListener('click', () => {
            const key = settingsApiKey.value.trim();
            if (key) {
                localStorage.setItem(KEY_STORAGE, key);
                currentKey = key;
                statusShort.textContent = '✅ Key 已保存';
                setTimeout(() => { if (statusShort.textContent === '✅ Key 已保存') statusShort.textContent = '就绪'; }, 1500);
            } else {
                alert('请输入有效的 API Key');
            }
        });

        // API Key - 修改（清除）
        settingsApiClear.addEventListener('click', () => {
            if (confirm('确定要清除 API Key 吗？')) {
                localStorage.removeItem(KEY_STORAGE);
                currentKey = '';
                settingsApiKey.value = '';
                statusShort.textContent = 'Key 已清除';
                setTimeout(() => { if (statusShort.textContent === 'Key 已清除') statusShort.textContent = '就绪'; }, 1500);
            }
        });

        // 字号
        settingsFontSize.addEventListener('change', () => {
            let val = parseInt(settingsFontSize.value);
            if (isNaN(val) || val < 12) val = 12;
            if (val > 24) val = 24;
            fontSize = val;
            localStorage.setItem(FONT_SIZE_KEY, String(fontSize));
            document.documentElement.style.setProperty('--font-size-msg', fontSize + 'px');
            renderChat();
        });

        // 记忆摘要
        settingsMemoryMode.addEventListener('change', () => {
            memoryMode = settingsMemoryMode.value;
            localStorage.setItem(MEMORY_MODE_KEY, memoryMode);
            statusShort.textContent = `记忆摘要: ${memoryMode === 'full' ? '全量' : '窗口(最近20条)'}`;
            setTimeout(() => { if (statusShort.textContent.includes('记忆摘要')) statusShort.textContent = '就绪'; }, 2000);
        });

        // 显示思考过程
        settingsShowReasoning.addEventListener('click', () => {
            showReasoning = !showReasoning;
            localStorage.setItem(SHOW_REASONING_KEY, String(showReasoning));
            updateShowReasoningUI();
            renderChat();
            statusShort.textContent = showReasoning ? '思考过程已显示' : '思考过程已隐藏';
            setTimeout(() => { if (statusShort.textContent.includes('思考过程')) statusShort.textContent = '就绪'; }, 1500);
        });

        // 显示字符计数
        settingsShowChars.addEventListener('click', () => {
            showChars = !showChars;
            localStorage.setItem(SHOW_CHARS_KEY, String(showChars));
            updateShowCharsUI();
            updateCharCounter();
        });

        // 显示Token计数
        settingsShowTokens.addEventListener('click', () => {
            showTokens = !showTokens;
            localStorage.setItem(SHOW_TOKENS_KEY, String(showTokens));
            updateShowTokensUI();
            updateTokenCounter();
        });

        // 备份 & 恢复
        function backupData() {
            try {
                const data = {
                    version: '5.0',
                    exportedAt: new Date().toISOString(),
                    sessions: sessions,
                    folders: folders,
                    apiKey: localStorage.getItem(KEY_STORAGE) || '',
                    theme: localStorage.getItem(THEME_KEY) || 'light',
                    mode: mode,
                    deepThinking: deepThinking,
                    showReasoning: showReasoning,
                    showChars: showChars,
                    showTokens: showTokens,
                    fontSize: fontSize,
                    memoryMode: memoryMode
                };
                const json = JSON.stringify(data, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const dateStr = new Date().toISOString().slice(0,10);
                a.download = `My_ds_备份_${dateStr}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                statusShort.textContent = '✅ 备份成功！';
                setTimeout(() => { if (statusShort.textContent === '✅ 备份成功！') statusShort.textContent = '就绪'; }, 3000);
            } catch (e) { alert('备份失败：' + e.message); }
        }

        function restoreData(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.sessions || !Array.isArray(data.sessions)) throw new Error('无效备份文件');
                    sessions = data.sessions;
                    folders = data.folders || [];
                    if (data.apiKey) { localStorage.setItem(KEY_STORAGE, data.apiKey); settingsApiKey.value = data.apiKey; }
                    if (data.theme) {
                        localStorage.setItem(THEME_KEY, data.theme);
                        if (data.theme === 'dark') { document.body.classList.add('dark'); settingsDarkToggle.textContent = '开启'; }
                        else { document.body.classList.remove('dark'); settingsDarkToggle.textContent = '关闭'; }
                    }
                    if (data.mode) {
                        mode = data.mode;
                        localStorage.setItem(MODE_KEY, mode);
                        settingsModeSelect.value = mode;
                        updateModeUI();
                    }
                    if (data.deepThinking !== undefined) {
                        deepThinking = data.deepThinking;
                        localStorage.setItem(DEEP_THINKING_KEY, String(deepThinking));
                        updateDeepThinkingUI();
                    }
                    if (data.showReasoning !== undefined) {
                        showReasoning = data.showReasoning;
                        localStorage.setItem(SHOW_REASONING_KEY, String(showReasoning));
                        updateShowReasoningUI();
                    }
                    if (data.showChars !== undefined) {
                        showChars = data.showChars;
                        localStorage.setItem(SHOW_CHARS_KEY, String(showChars));
                        updateShowCharsUI();
                    }
                    if (data.showTokens !== undefined) {
                        showTokens = data.showTokens;
                        localStorage.setItem(SHOW_TOKENS_KEY, String(showTokens));
                        updateShowTokensUI();
                    }
                    if (data.fontSize) {
                        fontSize = data.fontSize;
                        localStorage.setItem(FONT_SIZE_KEY, String(fontSize));
                        settingsFontSize.value = fontSize;
                        document.documentElement.style.setProperty('--font-size-msg', fontSize + 'px');
                    }
                    if (data.memoryMode) {
                        memoryMode = data.memoryMode;
                        localStorage.setItem(MEMORY_MODE_KEY, memoryMode);
                        settingsMemoryMode.value = memoryMode;
                    }
                    const active = sessions.find(s => s.active) || sessions[0];
                    if (active) { currentId = active.id; }
                    else if (sessions.length > 0) { sessions[0].active = true; currentId = sessions[0].id; }
                    else {
                        sessions.push({ id: generateId(), name: '新对话', messages: [], folderId: null, pinned: false, active: true });
                        currentId = sessions[0].id;
                    }
                    saveSessions();
                    renderChat();
                    updateCharCounter();
                    statusShort.textContent = '✅ 恢复成功！';
                    alert('✅ 恢复成功！所有数据已还原。');
                } catch (err) {
                    alert('恢复失败：' + err.message);
                }
            };
            reader.readAsText(file);
        }

        settingsBackupBtn.addEventListener('click', backupData);
        settingsBackupFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                if (confirm('⚠️ 恢复将覆盖当前所有数据，确定继续？')) {
                    restoreData(file);
                }
            }
            settingsBackupFileInput.value = '';
        });

        // ============================================================
        //  深度思考开关
        // ============================================================
        deepSwitch.addEventListener('click', () => {
            if (mode !== 'pro') {
                alert('深度思考仅在专家模式下可用');
                return;
            }
            deepThinking = !deepThinking;
            localStorage.setItem(DEEP_THINKING_KEY, String(deepThinking));
            updateDeepThinkingUI();
            statusShort.textContent = deepThinking ? '深度思考已开启 (高费用)' : '深度思考已关闭 (低费用)';
            setTimeout(() => { if (statusShort.textContent.includes('深度思考')) statusShort.textContent = '就绪'; }, 2000);
        });

        // ============================================================
        //  搜索
        // ============================================================
        function performSearch(query) {
            if (!query.trim()) { searchResults.innerHTML = '<div style="color:var(--text-muted);padding:20px;">输入关键词搜索</div>'; return; }
            const q = query.trim().toLowerCase();
            let results = [];
            sessions.forEach(s => {
                s.messages.forEach((m, idx) => {
                    if (m.content && m.content.toLowerCase().includes(q)) {
                        results.push({ sessionId: s.id, sessionName: s.name, msgIndex: idx, content: m.content, role: m.role });
                    }
                });
            });
            if (results.length === 0) { searchResults.innerHTML = '<div style="color:var(--text-muted);padding:20px;">未找到</div>'; return; }
            searchResults.innerHTML = '';
            results.slice(0, 30).forEach(r => {
                const div = document.createElement('div');
                div.className = 'search-result-item';
                const snippet = document.createElement('div');
                snippet.className = 'snippet';
                const idx = r.content.toLowerCase().indexOf(q);
                let highlighted = r.content;
                if (idx !== -1) {
                    const start = Math.max(0, idx - 20);
                    const end = Math.min(r.content.length, idx + q.length + 20);
                    highlighted = (start>0?'...':'') + r.content.substring(start, idx) + `<mark>${r.content.substring(idx, idx+q.length)}</mark>` + r.content.substring(idx+q.length, end) + (end<r.content.length?'...':'');
                }
                snippet.innerHTML = highlighted;
                const meta = document.createElement('div');
                meta.className = 'meta';
                meta.textContent = `📁 ${r.sessionName} · ${r.role === 'user' ? '你' : 'AI'}`;
                div.appendChild(snippet);
                div.appendChild(meta);
                div.addEventListener('click', () => {
                    closeSearch();
                    switchSession(r.sessionId);
                    setTimeout(() => {
                        const items = chatBox.querySelectorAll('.msg-wrapper');
                        const session = getCurrentSession();
                        if (session) {
                            const idx = session.messages.findIndex(m => m.content === r.content);
                            if (idx !== -1 && items[idx]) {
                                items[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
                                items[idx].style.transition = 'background 0.3s';
                                items[idx].style.background = 'var(--highlight-bg)';
                                setTimeout(() => items[idx].style.background = '', 2000);
                            }
                        }
                    }, 300);
                });
                searchResults.appendChild(div);
            });
        }
        let searchTimeout;
        searchInput.addEventListener('input', () => { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => performSearch(searchInput.value), 300); });
        searchBtnTop.addEventListener('click', () => { searchModal.classList.add('active'); searchInput.value = ''; searchResults.innerHTML = ''; searchInput.focus(); });
        closeSearchBtn.addEventListener('click', closeSearch);
        function closeSearch() { searchModal.classList.remove('active'); }

        // ============================================================
        //  导出当前对话（模态框）
        // ============================================================
        function exportChat(role) {
            const session = getCurrentSession();
            if (!session || !session.messages.length) { alert('当前对话为空，无法导出'); return; }
            let msgs = session.messages;
            if (role === 'user') msgs = msgs.filter(m => m.role === 'user');
            else if (role === 'assistant') msgs = msgs.filter(m => m.role === 'assistant');
            if (!msgs.length) { alert('没有匹配的消息可导出'); return; }

            let text = `导出时间: ${new Date().toLocaleString()}\n对话: ${session.name}\n${'='.repeat(30)}\n\n`;
            msgs.forEach(m => {
                const label = m.role === 'user' ? '👤 我' : '🤖 AI';
                text += `[${label}]\n${m.content}\n\n---\n\n`;
            });
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            const roleName = role === 'user' ? '我的提问' : (role === 'assistant' ? 'AI回复' : '全部');
            a.download = `${session.name}_${roleName}_${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(a.href);
            closeExport();
        }

        exportModal.addEventListener('click', (e) => { if (e.target === exportModal) closeExport(); });
        closeExportBtn.addEventListener('click', closeExport);
        function closeExport() { exportModal.classList.remove('active'); }
        exportAI.addEventListener('click', () => exportChat('assistant'));
        exportUser.addEventListener('click', () => exportChat('user'));
        exportAll.addEventListener('click', () => exportChat('all'));

        // ============================================================
        //  字数统计
        // ============================================================
        promptInput.addEventListener('input', function() {
            const len = this.value.length;
            statusChars.textContent = `${len} 字符`;
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // ============================================================
        //  启动
        // ============================================================
        loadData();
        renderChat();
        updateCharCounter();
        statusShort.textContent = '就绪';
        updateStorageInfo();
        // 每30秒更新一次存储信息
        setInterval(updateStorageInfo, 30000);
    </script>
</body>
</html>
