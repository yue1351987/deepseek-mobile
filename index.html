<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeepSeek 多会话助手</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0;
            overflow: hidden;
        }
        /* ---------- 顶部导航 ---------- */
        #topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #e9edf2;
            flex-shrink: 0;
            min-height: 60px;
        }
        #menuBtn {
            font-size: 28px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0 8px;
            color: #1e293b;
            line-height: 1;
        }
        #titleArea {
            flex: 1;
            text-align: center;
            font-weight: 600;
            font-size: 18px;
            color: #0f172a;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 8px;
            user-select: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60%;
        }
        #titleArea:active { background: #f1f5f9; }
        #newChatBtn {
            font-size: 24px;
            background: #4a6cf7;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-weight: 300;
            cursor: pointer;
            flex-shrink: 0;
        }
        #newChatBtn:active { background: #3a5cd5; }

        /* ---------- API Key 输入栏 ---------- */
        #keyBar {
            display: flex;
            gap: 8px;
            padding: 8px 16px;
            background: #f8fafc;
            border-bottom: 1px solid #e9edf2;
            flex-shrink: 0;
            align-items: center;
        }
        #apiKey {
            flex: 1;
            padding: 8px 14px;
            border: 1px solid #d1d5db;
            border-radius: 20px;
            font-size: 13px;
            background: white;
            outline: none;
            min-width: 0;
        }
        #apiKey:focus { border-color: #4a6cf7; }
        #saveKeyBtn {
            padding: 6px 16px;
            background: #4a6cf7;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        #saveKeyBtn:active { background: #3a5cd5; }

        /* ---------- 聊天区域 ---------- */
        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #ffffff;
        }
        .msg {
            max-width: 88%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            word-break: break-word;
            font-size: 15px;
            animation: fadeIn 0.2s ease;
        }
        .user { align-self: flex-end; background: #4a6cf7; color: white; border-bottom-right-radius: 4px; }
        .assistant { align-self: flex-start; background: #f1f3f5; color: #1e293b; border-bottom-left-radius: 4px; }
        .loading { align-self: flex-start; background: #f1f3f5; color: #64748b; padding: 12px 20px; border-radius: 18px; font-size: 14px; }

        /* ---------- 底部输入 ---------- */
        #inputArea {
            display: flex;
            gap: 8px;
            padding: 10px 16px 14px;
            background: white;
            border-top: 1px solid #e9edf2;
            flex-shrink: 0;
            align-items: flex-end;
        }
        #prompt {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 24px;
            font-size: 15px;
            resize: none;
            outline: none;
            background: #f8fafc;
            font-family: inherit;
            min-height: 44px;
            max-height: 120px;
            line-height: 1.4;
        }
        #prompt:focus { border-color: #4a6cf7; background: white; }
        #sendBtn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #4a6cf7;
            color: white;
            border: none;
            font-size: 22px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #sendBtn:active { background: #3a5cd5; transform: scale(0.95); }
        #sendBtn:disabled { opacity: 0.4; pointer-events: none; }

        /* ---------- 侧滑菜单（会话列表） ---------- */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            display: none;
            animation: fadeIn 0.2s;
        }
        #overlay.active { display: block; }
        #drawer {
            position: fixed;
            top: 0;
            left: -85%;
            width: 82%;
            max-width: 340px;
            height: 100%;
            background: white;
            z-index: 1001;
            padding: 20px 16px;
            box-shadow: 4px 0 20px rgba(0,0,0,0.15);
            transition: left 0.25s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #drawer.open { left: 0; }
        #drawerTitle {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
            padding-bottom: 12px;
            border-bottom: 1px solid #e9edf2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        #drawerTitle button {
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            color: #94a3b8;
        }
        #sessionList {
            flex: 1;
            overflow-y: auto;
            margin-top: 12px;
            padding-bottom: 12px;
        }
        .session-item {
            display: flex;
            align-items: center;
            padding: 14px 12px;
            border-radius: 12px;
            margin-bottom: 4px;
            cursor: pointer;
            background: #f8fafc;
            transition: 0.1s;
            gap: 8px;
        }
        .session-item:active { background: #e9edf2; }
        .session-item.active {
            background: #dbeafe;
            border-left: 4px solid #4a6cf7;
        }
        .session-name {
            flex: 1;
            font-size: 15px;
            color: #1e293b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }
        .session-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .session-actions button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
            color: #64748b;
        }
        .session-actions .del-btn:active { color: #dc2626; background: #fee2e2; }
        .session-actions .rename-btn:active { color: #2563eb; background: #dbeafe; }
        #newSessionBtn {
            width: 100%;
            padding: 14px;
            background: #4a6cf7;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            flex-shrink: 0;
        }
        #newSessionBtn:active { background: #3a5cd5; }
        .empty-sessions {
            color: #94a3b8;
            text-align: center;
            padding: 30px 0;
            font-size: 14px;
        }

        /* ---------- 公用动画 ---------- */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 小屏优化 */
        @media (max-width: 480px) {
            .msg { max-width: 92%; font-size: 14px; padding: 10px 14px; }
            #titleArea { font-size: 16px; max-width: 50%; }
            #drawer { left: -100%; width: 88%; }
        }
    </style>
</head>
<body>

    <!-- 顶部导航 -->
    <div id="topbar">
        <button id="menuBtn">☰</button>
        <span id="titleArea">新对话</span>
        <button id="newChatBtn">+</button>
    </div>

    <!-- API Key 栏 -->
    <div id="keyBar">
        <input type="password" id="apiKey" placeholder="输入 API Key">
        <button id="saveKeyBtn">保存</button>
    </div>

    <!-- 聊天框 -->
    <div id="chatBox"></div>

    <!-- 底部输入 -->
    <div id="inputArea">
        <textarea id="prompt" rows="1" placeholder="输入问题..."></textarea>
        <button id="sendBtn">➤</button>
    </div>

    <!-- 遮罩层 -->
    <div id="overlay"></div>

    <!-- 侧滑抽屉 -->
    <div id="drawer">
        <div id="drawerTitle">
            我的对话
            <button id="closeDrawerBtn">✕</button>
        </div>
        <div id="sessionList"></div>
        <button id="newSessionBtn">➕ 新建对话</button>
    </div>

    <script>
        // ============================================================
        //  数据管理
        // ============================================================
        let sessions = [];
        let currentId = null;
        let currentKey = '';

        // 存储键名
        const STORAGE_KEY = 'deepseek_sessions';
        const KEY_STORAGE = 'deepseek_api_key';

        // DOM 引用
        const chatBox = document.getElementById('chatBox');
        const promptInput = document.getElementById('prompt');
        const sendBtn = document.getElementById('sendBtn');
        const apiKeyInput = document.getElementById('apiKey');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const titleArea = document.getElementById('titleArea');
        const menuBtn = document.getElementById('menuBtn');
        const newChatBtn = document.getElementById('newChatBtn');
        const drawer = document.getElementById('drawer');
        const overlay = document.getElementById('overlay');
        const sessionList = document.getElementById('sessionList');
        const newSessionBtn = document.getElementById('newSessionBtn');
        const closeDrawerBtn = document.getElementById('closeDrawerBtn');

        // ============================================================
        //  初始化数据
        // ============================================================
        function loadData() {
            // 加载 Key
            const savedKey = localStorage.getItem(KEY_STORAGE);
            if (savedKey) {
                currentKey = savedKey;
                apiKeyInput.value = savedKey;
            }

            // 加载会话
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                try {
                    sessions = JSON.parse(raw);
                } catch { sessions = []; }
            }

            // 如果没有会话，创建一个默认的
            if (!sessions.length) {
                sessions.push({
                    id: generateId(),
                    name: '新对话',
                    messages: []
                });
                saveSessions();
            }

            // 设置当前会话（优先选第一个，或者标记为 active 的）
            const active = sessions.find(s => s.active) || sessions[0];
            currentId = active.id;
            // 清除旧的 active 标记
            sessions.forEach(s => delete s.active);
            // 标记当前
            const cur = sessions.find(s => s.id === currentId);
            if (cur) cur.active = true;
            saveSessions();
        }

        function generateId() {
            return Date.now() + '_' + Math.random().toString(36).slice(2, 7);
        }

        function saveSessions() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
        }

        // ============================================================
        //  核心渲染
        // ============================================================
        function getCurrentSession() {
            return sessions.find(s => s.id === currentId) || sessions[0];
        }

        function renderChat() {
            const session = getCurrentSession();
            if (!session) return;
            // 更新标题
            titleArea.textContent = session.name || '未命名';

            chatBox.innerHTML = '';
            const msgs = session.messages || [];
            if (msgs.length === 0) {
                const welcome = document.createElement('div');
                welcome.className = 'msg assistant';
                welcome.textContent = '👋 开始新对话吧！';
                chatBox.appendChild(welcome);
            } else {
                msgs.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = `msg ${msg.role}`;
                    div.textContent = msg.content;
                    chatBox.appendChild(div);
                });
            }
            chatBox.scrollTop = chatBox.scrollHeight;
            renderSessionList();
        }

        function renderSessionList() {
            sessionList.innerHTML = '';
            if (sessions.length === 0) {
                sessionList.innerHTML = '<div class="empty-sessions">暂无对话，点击下方新建</div>';
                return;
            }
            sessions.forEach(s => {
                const item = document.createElement('div');
                item.className = 'session-item' + (s.id === currentId ? ' active' : '');
                // 名称
                const nameSpan = document.createElement('span');
                nameSpan.className = 'session-name';
                nameSpan.textContent = s.name || '未命名';
                // 操作按钮
                const actions = document.createElement('div');
                actions.className = 'session-actions';

                // 重命名按钮
                const renameBtn = document.createElement('button');
                renameBtn.className = 'rename-btn';
                renameBtn.textContent = '✏️';
                renameBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    renameSession(s.id);
                });

                // 删除按钮
                const delBtn = document.createElement('button');
                delBtn.className = 'del-btn';
                delBtn.textContent = '🗑️';
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteSession(s.id);
                });

                actions.appendChild(renameBtn);
                actions.appendChild(delBtn);

                item.appendChild(nameSpan);
                item.appendChild(actions);

                // 点击切换到该会话
                item.addEventListener('click', () => {
                    switchSession(s.id);
                });

                sessionList.appendChild(item);
            });
        }

        // ============================================================
        //  会话操作
        // ============================================================
        function switchSession(id) {
            if (id === currentId) {
                closeDrawer();
                return;
            }
            // 保存当前会话（已自动保存）
            sessions.forEach(s => delete s.active);
            const target = sessions.find(s => s.id === id);
            if (target) {
                target.active = true;
                currentId = id;
                saveSessions();
                renderChat();
                closeDrawer();
            }
        }

        function renameSession(id) {
            const s = sessions.find(s => s.id === id);
            if (!s) return;
            const newName = prompt('请输入新的对话名称：', s.name);
            if (newName !== null && newName.trim() !== '') {
                s.name = newName.trim();
                saveSessions();
                renderChat(); // 更新标题
                renderSessionList(); // 更新列表
            }
        }

        function deleteSession(id) {
            if (sessions.length <= 1) {
                alert('至少保留一个对话，不能全部删除。');
                return;
            }
            if (!confirm(`确定要删除“${sessions.find(s=>s.id===id)?.name || '未命名'}”吗？`)) return;
            sessions = sessions.filter(s => s.id !== id);
            if (currentId === id) {
                // 切到第一个
                currentId = sessions[0].id;
                sessions[0].active = true;
            }
            saveSessions();
            renderChat();
            renderSessionList();
        }

        function createNewSession() {
            const count = sessions.length + 1;
            const newSession = {
                id: generateId(),
                name: `对话 ${count}`,
                messages: [],
                active: true
            };
            sessions.forEach(s => delete s.active);
            sessions.push(newSession);
            currentId = newSession.id;
            saveSessions();
            renderChat();
            closeDrawer();
            // 聚焦输入
            promptInput.focus();
        }

        // ============================================================
        //  抽屉控制
        // ============================================================
        function openDrawer() {
            renderSessionList();
            overlay.classList.add('active');
            drawer.classList.add('open');
        }
        function closeDrawer() {
            overlay.classList.remove('active');
            drawer.classList.remove('open');
        }
        menuBtn.addEventListener('click', openDrawer);
        closeDrawerBtn.addEventListener('click', closeDrawer);
        overlay.addEventListener('click', closeDrawer);
        newSessionBtn.addEventListener('click', createNewSession);
        newChatBtn.addEventListener('click', createNewSession);

        // 点击标题重命名当前会话
        titleArea.addEventListener('click', () => {
            const cur = getCurrentSession();
            if (cur) renameSession(cur.id);
        });

        // ============================================================
        //  API Key 保存
        // ============================================================
        saveKeyBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem(KEY_STORAGE, key);
                currentKey = key;
                alert('✅ API Key 已保存到本地');
            } else {
                alert('请输入有效的 Key');
            }
        });

        // ============================================================
        //  发送消息
        // ============================================================
        async function sendMessage() {
            const key = localStorage.getItem(KEY_STORAGE);
            if (!key) {
                alert('请先输入并保存 API Key');
                return;
            }
            const text = promptInput.value.trim();
            if (!text) return;
            promptInput.value = '';
            promptInput.style.height = 'auto';

            // 获取当前会话
            let session = getCurrentSession();
            if (!session) {
                createNewSession();
                session = getCurrentSession();
            }

            // 添加用户消息
            session.messages.push({ role: 'user', content: text });
            saveSessions();
            renderChat();

            // 添加占位
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'msg assistant';
            loadingDiv.textContent = '🤔 思考中...';
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            sendBtn.disabled = true;

            try {
                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${key}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: session.messages.map(m => ({ role: m.role, content: m.content })),
                        stream: false,
                        max_tokens: 2048
                    })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(`API错误(${response.status}): ${errData.error?.message || '请检查Key或网络'}`);
                }

                const data = await response.json();
                const reply = data.choices?.[0]?.message?.content || '无回复内容';

                // 移除占位
                chatBox.removeChild(loadingDiv);

                // 保存回复
                session.messages.push({ role: 'assistant', content: reply });
                saveSessions();
                renderChat();

            } catch (error) {
                loadingDiv.textContent = `❌ ${error.message}`;
                loadingDiv.style.color = '#dc2626';
            } finally {
                sendBtn.disabled = false;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        // 绑定事件
        sendBtn.addEventListener('click', sendMessage);
        promptInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        promptInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // ============================================================
        //  启动
        // ============================================================
        loadData();
        renderChat();
    </script>
</body>
</html>
