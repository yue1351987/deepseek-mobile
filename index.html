<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My DeepSeek - 终极调试</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
            gap: 12px;
        }
        .debug-header {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            background: #161b22;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #30363d;
        }
        .debug-header input {
            flex: 1;
            min-width: 150px;
            padding: 8px 12px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background: #1c2333;
            color: #e6edf3;
            font-size: 13px;
        }
        .debug-header button {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            background: #3b82f6;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .debug-header button:active { opacity: 0.7; }
        .debug-header button.danger { background: #ef4444; }
        .debug-status {
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 20px;
            background: #1f2937;
            border: 1px solid #30363d;
            white-space: nowrap;
        }
        .debug-status.ok { border-color: #22c55e; color: #22c55e; }
        .debug-status.err { border-color: #ef4444; color: #ef4444; }
        #chat {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px;
            background: #161b22;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 14px;
            line-height: 1.6;
        }
        .msg {
            margin: 6px 0;
            padding: 8px 14px;
            border-radius: 6px;
        }
        .msg.user { background: #1f2937; border-left: 3px solid #3b82f6; }
        .msg.ai { background: #21262d; border-left: 3px solid #22c55e; }
        .msg.error { background: #3d1a1a; border-left: 3px solid #ef4444; color: #f87171; }
        .input-row {
            display: flex;
            gap: 8px;
        }
        .input-row textarea {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #30363d;
            border-radius: 8px;
            background: #1c2333;
            color: #e6edf3;
            font-size: 14px;
            resize: none;
            outline: none;
            font-family: inherit;
        }
        .input-row textarea:focus { border-color: #3b82f6; }
        .input-row button {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            background: #3b82f6;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }
        .input-row button:active { opacity: 0.7; }
        .input-row button:disabled { opacity: 0.4; }
        .log-area {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 8px 12px;
            max-height: 120px;
            overflow-y: auto;
            font-size: 12px;
            font-family: monospace;
            color: #8b949e;
        }
        .log-area .log-line { padding: 2px 0; border-bottom: 1px solid #1c2333; }
        .log-area .log-line .time { color: #586069; margin-right: 8px; }
        .log-area .log-line .lvl-info { color: #58a6ff; }
        .log-area .log-line .lvl-ok { color: #22c55e; }
        .log-area .log-line .lvl-err { color: #ef4444; }
    </style>
</head>
<body>

    <div class="debug-header">
        <input type="password" id="apiKeyInput" placeholder="输入 API Key">
        <button id="saveKeyBtn">保存 Key</button>
        <span id="keyStatus" class="debug-status">未保存</span>
        <button id="clearLogs" class="danger" style="background:#2d3748;color:#8b949e;">清空日志</button>
    </div>

    <div id="chat">
        <div class="msg ai">👋 调试版已加载，请先保存 API Key，然后输入消息测试。</div>
    </div>

    <div class="input-row">
        <textarea id="prompt" rows="1" placeholder="输入消息..."></textarea>
        <button id="sendBtn">🚀 发送</button>
    </div>

    <div class="log-area" id="logArea">
        <div class="log-line"><span class="time">[启动]</span><span class="lvl-info">调试版已加载，等待操作...</span></div>
    </div>

    <script>
        // ============================================================
        // 终极调试版 - 所有逻辑独立，不依赖任何外部数据
        // ============================================================

        const KEY_STORAGE = 'deepseek_api_key';
        const chatEl = document.getElementById('chat');
        const promptEl = document.getElementById('prompt');
        const sendBtn = document.getElementById('sendBtn');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const keyStatus = document.getElementById('keyStatus');
        const logArea = document.getElementById('logArea');
        const clearLogsBtn = document.getElementById('clearLogs');

        let isSending = false;

        // ============================================================
        // 日志系统
        // ============================================================
        function addLog(msg, level = 'info') {
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.className = 'log-line';
            const lvlClass = level === 'ok' ? 'lvl-ok' : (level === 'err' ? 'lvl-err' : 'lvl-info');
            div.innerHTML = `<span class="time">[${time}]</span><span class="${lvlClass}">${msg}</span>`;
            logArea.appendChild(div);
            logArea.scrollTop = logArea.scrollHeight;
            console.log(`[${time}] ${msg}`);
        }

        clearLogsBtn.addEventListener('click', () => {
            logArea.innerHTML = '';
            addLog('日志已清空', 'info');
        });

        // ============================================================
        // 在聊天框添加消息
        // ============================================================
        function addChatMessage(role, content, isError = false) {
            const div = document.createElement('div');
            div.className = `msg ${role}${isError ? ' error' : ''}`;
            div.textContent = content;
            chatEl.appendChild(div);
            chatEl.scrollTop = chatEl.scrollHeight;
        }

        // ============================================================
        // API Key 管理
        // ============================================================
        function loadKey() {
            const saved = localStorage.getItem(KEY_STORAGE);
            if (saved) {
                apiKeyInput.value = saved;
                keyStatus.textContent = '✅ 已加载';
                keyStatus.className = 'debug-status ok';
                addLog('API Key 已从本地加载', 'ok');
            } else {
                keyStatus.textContent = '❌ 未保存';
                keyStatus.className = 'debug-status err';
                addLog('未找到 API Key', 'err');
            }
        }
        loadKey();

        saveKeyBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem(KEY_STORAGE, key);
                keyStatus.textContent = '✅ 已保存';
                keyStatus.className = 'debug-status ok';
                addLog('API Key 已保存', 'ok');
            } else {
                keyStatus.textContent = '❌ 无效';
                keyStatus.className = 'debug-status err';
                addLog('保存失败：Key 为空', 'err');
                alert('请输入有效的 API Key');
            }
        });

        // ============================================================
        // 发送消息 - 独立测试函数
        // ============================================================
        async function sendTestMessage() {
            addLog('>>> sendTestMessage() 被调用', 'info');

            // 1. 检查 Key
            const key = localStorage.getItem(KEY_STORAGE);
            addLog(`检查 API Key: ${key ? '存在' : '不存在'}`, 'info');
            if (!key || key.trim() === '') {
                const err = '❌ 未找到 API Key，请先保存';
                addLog(err, 'err');
                addChatMessage('error', err, true);
                alert(err);
                return;
            }

            // 2. 检查输入
            const text = promptEl.value.trim();
            addLog(`输入内容: "${text}" (长度: ${text.length})`, 'info');
            if (!text) {
                const err = '⚠️ 请输入消息';
                addLog(err, 'err');
                addChatMessage('error', err, true);
                alert(err);
                return;
            }

            // 3. 防止重复点击
            if (isSending) {
                addLog('⏳ 正在发送中，请勿重复点击', 'err');
                alert('正在发送中，请稍候');
                return;
            }
            isSending = true;
            sendBtn.disabled = true;
            addLog('🔄 开始发送请求', 'info');

            // 4. 显示用户消息
            addChatMessage('user', text);

            // 5. 清空输入
            promptEl.value = '';
            promptEl.style.height = 'auto';

            // 6. 添加加载占位
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'msg ai';
            loadingDiv.textContent = '⏳ 请求中...';
            chatEl.appendChild(loadingDiv);
            chatEl.scrollTop = chatEl.scrollHeight;

            try {
                // 7. 构建请求
                const messages = [{ role: 'user', content: text }];
                const requestBody = {
                    model: 'deepseek-v4-flash',
                    messages: messages,
                    stream: false,
                    max_tokens: 1024
                };
                addLog(`请求体: ${JSON.stringify(requestBody).slice(0, 200)}...`, 'info');

                // 8. 发送请求
                addLog('📡 正在请求 https://api.deepseek.com/chat/completions', 'info');
                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${key}`
                    },
                    body: JSON.stringify(requestBody)
                });

                addLog(`响应状态: ${response.status}`, 'info');

                // 9. 处理响应
                if (!response.ok) {
                    let errText = `HTTP ${response.status}`;
                    try {
                        const errData = await response.json();
                        errText += `\n${JSON.stringify(errData, null, 2)}`;
                    } catch (e) {
                        errText += `\n${await response.text()}`;
                    }
                    throw new Error(errText);
                }

                const data = await response.json();
                addLog('响应数据接收成功', 'ok');
                const reply = data.choices?.[0]?.message?.content || '(空回复)';
                addLog(`回复内容长度: ${reply.length} 字符`, 'ok');

                // 10. 移除占位，显示回复
                loadingDiv.remove();
                addChatMessage('ai', reply);
                addLog('✅ 回复成功', 'ok');

            } catch (error) {
                addLog(`❌ 错误: ${error.message}`, 'err');
                loadingDiv.remove();
                addChatMessage('error', `❌ 请求失败\n${error.message}`, true);
                // 也弹窗提示
                alert(`请求失败:\n${error.message}`);
            } finally {
                isSending = false;
                sendBtn.disabled = false;
                addLog('>>> sendTestMessage() 执行完毕', 'info');
            }
        }

        // ============================================================
        // 绑定事件
        // ============================================================
        sendBtn.addEventListener('click', () => {
            addLog('🔘 发送按钮被点击', 'info');
            sendTestMessage();
        });

        promptEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                addLog('⌨️ 回车键触发发送', 'info');
                sendTestMessage();
            }
        });

        promptEl.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // ============================================================
        // 页面加载完成提示
        // ============================================================
        addLog('✅ 调试版就绪，请保存 Key 后输入消息测试', 'ok');
    </script>
</body>
</html>
