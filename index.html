<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeepSeek 专业版</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* ---------- 顶部导航 ---------- */
        #topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: white;
            border-bottom: 1px solid #e9edf2;
            flex-shrink: 0;
            min-height: 56px;
            gap: 6px;
        }
        #menuBtn { font-size: 26px; background: none; border: none; cursor: pointer; padding: 0 6px; color: #1e293b; }
        #titleArea { flex: 1; text-align: center; font-weight: 600; font-size: 17px; color: #0f172a; cursor: pointer; padding: 4px 8px; border-radius: 8px; user-select: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 50%; }
        #titleArea:active { background: #f1f5f9; }
        #searchBtn { font-size: 22px; background: none; border: none; cursor: pointer; padding: 0 6px; color: #1e293b; }
        #newChatBtn { font-size: 22px; background: #4a6cf7; color: white; border: none; width: 38px; height: 38px; border-radius: 50%; font-weight: 300; cursor: pointer; flex-shrink: 0; }

        /* ---------- API Key 栏 ---------- */
        #keyBar {
            display: flex; gap: 6px; padding: 6px 12px; background: #f8fafc;
            border-bottom: 1px solid #e9edf2; flex-shrink: 0; align-items: center;
        }
        #apiKey { flex: 1; padding: 6px 12px; border: 1px solid #d1d5db; border-radius: 20px; font-size: 12px; background: white; outline: none; min-width: 0; }
        #apiKey:focus { border-color: #4a6cf7; }
        #saveKeyBtn { padding: 4px 14px; background: #4a6cf7; color: white; border: none; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; }

        /* ---------- 附件 ---------- */
        #attachmentBar { display: none; gap: 6px; padding: 4px 12px; background: #f1f5f9; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; flex-wrap: wrap; align-items: center; }
        #attachmentBar.show { display: flex; }
        .attach-tag { background: white; border-radius: 16px; padding: 2px 10px 2px 14px; font-size: 12px; display: flex; align-items: center; gap: 6px; border: 1px solid #cbd5e1; }
        .attach-tag .remove-attach { background: none; border: none; font-size: 14px; cursor: pointer; color: #94a3b8; }

        /* ---------- 聊天 ---------- */
        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #ffffff;
        }
        .msg-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 92%;
            animation: fadeIn 0.2s ease;
        }
        .msg-wrapper.user { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.assistant { align-self: flex-start; align-items: flex-start; }

        .msg {
            padding: 10px 14px;
            border-radius: 18px;
            line-height: 1.5;
            word-break: break-word;
            font-size: 15px;
            position: relative;
        }
        .user .msg { background: #4a6cf7; color: white; border-bottom-right-radius: 4px; }
        .assistant .msg { background: #f1f3f5; color: #1e293b; border-bottom-left-radius: 4px; }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 4px; max-height: 200px; }

        /* 消息操作栏 */
        .msg-actions {
            display: flex;
            gap: 8px;
            margin-top: 4px;
            font-size: 14px;
            opacity: 0.6;
        }
        .msg-actions button {
            background: none;
            border: none;
            cursor: pointer;
            color: #475569;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .msg-actions button:active { background: #e2e8f0; opacity: 1; }
        .version-badge {
            font-size: 11px;
            background: #cbd5e1;
            color: #1e293b;
            padding: 1px 8px;
            border-radius: 12px;
            margin-left: 4px;
            cursor: pointer;
        }

        .loading { background: #f1f3f5; color: #64748b; padding: 10px 18px; border-radius: 18px; font-size: 14px; align-self: flex-start; }

        /* ---------- 底部输入 ---------- */
        #inputArea {
            display: flex;
            gap: 6px;
            padding: 8px 12px 12px;
            background: white;
            border-top: 1px solid #e9edf2;
            flex-shrink: 0;
            align-items: flex-end;
        }
        #attachBtn { font-size: 24px; background: none; border: none; cursor: pointer; padding: 0 4px; color: #64748b; height: 42px; display: flex; align-items: center; }
        #prompt { flex: 1; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 24px; font-size: 15px; resize: none; outline: none; background: #f8fafc; font-family: inherit; min-height: 42px; max-height: 100px; line-height: 1.4; }
        #prompt:focus { border-color: #4a6cf7; background: white; }
        #sendBtn { width: 48px; height: 48px; border-radius: 50%; background: #4a6cf7; color: white; border: none; font-size: 20px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        #sendBtn:disabled { opacity: 0.4; pointer-events: none; }
        #fileInput { display: none; }

        /* ---------- 状态栏 + Token ---------- */
        #statusBar {
            display: flex;
            justify-content: space-between;
            padding: 4px 16px;
            font-size: 11px;
            color: #94a3b8;
            background: #f8fafc;
            border-top: 1px solid #e9edf2;
            flex-shrink: 0;
        }

        /* ---------- 抽屉/侧滑 ---------- */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; display: none; }
        #overlay.active { display: block; }
        #drawer {
            position: fixed; top: 0; left: -85%; width: 82%; max-width: 340px; height: 100%;
            background: white; z-index: 1001; padding: 20px 16px;
            box-shadow: 4px 0 20px rgba(0,0,0,0.15);
            transition: left 0.25s ease;
            display: flex; flex-direction: column; overflow: hidden;
        }
        #drawer.open { left: 0; }
        #drawerTitle { font-size: 20px; font-weight: 700; color: #0f172a; padding-bottom: 12px; border-bottom: 1px solid #e9edf2; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        #drawerTitle button { background: none; border: none; font-size: 26px; cursor: pointer; color: #94a3b8; }
        #sessionList { flex: 1; overflow-y: auto; margin-top: 12px; }
        .session-item { display: flex; align-items: center; padding: 12px 12px; border-radius: 12px; margin-bottom: 4px; cursor: pointer; background: #f8fafc; gap: 8px; }
        .session-item:active { background: #e9edf2; }
        .session-item.active { background: #dbeafe; border-left: 4px solid #4a6cf7; }
        .session-name { flex: 1; font-size: 14px; color: #1e293b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        .session-actions { display: flex; gap: 4px; }
        .session-actions button { background: none; border: none; font-size: 16px; cursor: pointer; padding: 2px 6px; color: #64748b; }
        #newSessionBtn { width: 100%; padding: 12px; background: #4a6cf7; color: white; border: none; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; flex-shrink: 0; }

        /* ---------- 搜索模态框 ---------- */
        #searchModal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 2000;
            display: none;
            flex-direction: column;
            padding: 16px;
            animation: fadeIn 0.2s;
        }
        #searchModal.active { display: flex; }
        #searchModal input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #4a6cf7;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            margin-bottom: 12px;
        }
        #searchResults {
            flex: 1;
            overflow-y: auto;
        }
        .search-result-item {
            padding: 14px;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
        }
        .search-result-item:active { background: #f1f5f9; }
        .search-result-item .snippet {
            font-size: 14px;
            color: #1e293b;
        }
        .search-result-item .snippet mark { background: #fef08a; padding: 0 2px; }
        .search-result-item .meta {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }
        #closeSearchBtn {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 28px;
            background: none;
            border: none;
            cursor: pointer;
            color: #94a3b8;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 480px) {
            .msg-wrapper { max-width: 96%; }
            #drawer { left: -100%; width: 88%; }
        }
    </style>
</head>
<body>

    <!-- 顶部栏 -->
    <div id="topbar">
        <button id="menuBtn">☰</button>
        <span id="titleArea">新对话</span>
        <button id="searchBtn">🔍</button>
        <button id="newChatBtn">+</button>
    </div>

    <!-- Key 栏 -->
    <div id="keyBar">
        <input type="password" id="apiKey" placeholder="输入 API Key">
        <button id="saveKeyBtn">保存</button>
    </div>

    <!-- 附件栏 -->
    <div id="attachmentBar"></div>

    <!-- 聊天框 -->
    <div id="chatBox"></div>

    <!-- 底部输入 -->
    <div id="inputArea">
        <button id="attachBtn">📎</button>
        <input type="file" id="fileInput" multiple accept="image/*,.pdf,.doc,.docx,.txt,.xls,.xlsx,.ppt,.pptx">
        <textarea id="prompt" rows="1" placeholder="输入问题..."></textarea>
        <button id="sendBtn">➤</button>
    </div>

    <!-- 状态栏 + Token -->
    <div id="statusBar">
        <span id="statusText">就绪</span>
        <span id="tokenCounter">📊 ~0 tokens</span>
    </div>

    <!-- 搜索模态框 -->
    <div id="searchModal">
        <button id="closeSearchBtn">✕</button>
        <input type="text" id="searchInput" placeholder="搜索所有对话...">
        <div id="searchResults"></div>
    </div>

    <!-- 遮罩 & 抽屉 -->
    <div id="overlay"></div>
    <div id="drawer">
        <div id="drawerTitle">我的对话 <button id="closeDrawerBtn">✕</button></div>
        <div id="sessionList"></div>
        <button id="newSessionBtn">➕ 新建对话</button>
    </div>

    <script>
        // ============================================================
        //  数据层
        // ============================================================
        let sessions = [];
        let currentId = null;
        let currentKey = '';
        let pendingAttachments = [];
        // 用于重新生成时的临时标记
        let isRegenerating = false;

        const STORAGE_KEY = 'deepseek_sessions';
        const KEY_STORAGE = 'deepseek_api_key';

        // DOM 引用
        const chatBox = document.getElementById('chatBox');
        const promptInput = document.getElementById('prompt');
        const sendBtn = document.getElementById('sendBtn');
        const apiKeyInput = document.getElementById('apiKey');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const titleArea = document.getElementById('titleArea');
        const menuBtn = document.getElementById('menuBtn');
        const newChatBtn = document.getElementById('newChatBtn');
        const drawer = document.getElementById('drawer');
        const overlay = document.getElementById('overlay');
        const sessionList = document.getElementById('sessionList');
        const newSessionBtn = document.getElementById('newSessionBtn');
        const closeDrawerBtn = document.getElementById('closeDrawerBtn');
        const attachBtn = document.getElementById('attachBtn');
        const fileInput = document.getElementById('fileInput');
        const attachmentBar = document.getElementById('attachmentBar');
        const statusText = document.getElementById('statusText');
        const tokenCounter = document.getElementById('tokenCounter');
        const searchBtn = document.getElementById('searchBtn');
        const searchModal = document.getElementById('searchModal');
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        const closeSearchBtn = document.getElementById('closeSearchBtn');

        // ============================================================
        //  核心函数
        // ============================================================
        function generateId() { return Date.now() + '_' + Math.random().toString(36).slice(2, 7); }
        function saveSessions() { localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions)); updateTokenCounter(); }
        function getCurrentSession() { return sessions.find(s => s.id === currentId) || sessions[0]; }

        function loadData() {
            const savedKey = localStorage.getItem(KEY_STORAGE);
            if (savedKey) { currentKey = savedKey; apiKeyInput.value = savedKey; }
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) { try { sessions = JSON.parse(raw); } catch { sessions = []; } }
            if (!sessions.length) {
                sessions.push({ id: generateId(), name: '新对话', messages: [] });
                saveSessions();
            }
            const active = sessions.find(s => s.active) || sessions[0];
            currentId = active.id;
            sessions.forEach(s => delete s.active);
            const cur = sessions.find(s => s.id === currentId);
            if (cur) cur.active = true;
            saveSessions();
        }

        // 估算 Token (粗略: 中文1字≈1.5token, 英文1词≈1.3token, 简化用 Math.ceil(长度/1.8))
        function estimateTokens(text) {
            if (!text) return 0;
            return Math.ceil(text.length / 1.8);
        }
        function updateTokenCounter() {
            const session = getCurrentSession();
            if (!session) { tokenCounter.textContent = '📊 ~0 tokens'; return; }
            let total = 0;
            session.messages.forEach(m => {
                total += estimateTokens(m.content || '');
                if (m.images) total += 50; // 每张图片粗略算50token
            });
            tokenCounter.textContent = `📊 ~${total} tokens`;
        }

        // ============================================================
        //  渲染聊天
        // ============================================================
        function renderChat() {
            const session = getCurrentSession();
            if (!session) return;
            titleArea.textContent = session.name || '未命名';
            chatBox.innerHTML = '';

            const msgs = session.messages || [];
            if (msgs.length === 0) {
                const wrap = document.createElement('div');
                wrap.className = 'msg-wrapper assistant';
                wrap.innerHTML = `<div class="msg">👋 开始新对话吧！支持上传图片和文档。</div>`;
                chatBox.appendChild(wrap);
            } else {
                msgs.forEach((msg, index) => {
                    const wrap = document.createElement('div');
                    wrap.className = `msg-wrapper ${msg.role}`;
                    wrap.dataset.index = index;
                    wrap.dataset.id = msg.id || index;

                    // 消息主体
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'msg';
                    if (msg.role === 'user' && msg.images && msg.images.length) {
                        const textSpan = document.createElement('div');
                        textSpan.textContent = msg.content || '📷 图片';
                        msgDiv.appendChild(textSpan);
                        msg.images.forEach(imgData => {
                            const img = document.createElement('img');
                            img.src = imgData;
                            img.style.maxWidth = '100%';
                            img.style.maxHeight = '200px';
                            img.style.borderRadius = '8px';
                            img.style.marginTop = '6px';
                            msgDiv.appendChild(img);
                        });
                    } else {
                        msgDiv.textContent = msg.content || '(空消息)';
                    }
                    wrap.appendChild(msgDiv);

                    // 操作栏 (仅对普通消息，loading除外)
                    const actions = document.createElement('div');
                    actions.className = 'msg-actions';

                    if (msg.role === 'user') {
                        // 编辑按钮
                        const editBtn = document.createElement('button');
                        editBtn.textContent = '✏️ 编辑';
                        editBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            editUserMessage(index);
                        });
                        actions.appendChild(editBtn);
                    } else if (msg.role === 'assistant' && !msg._loading) {
                        // 重新生成按钮（仅在最后一条助手消息显示，或者有上下文）
                        const regenBtn = document.createElement('button');
                        regenBtn.textContent = '🔄 重新生成';
                        regenBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            regenerateMessage(index);
                        });
                        actions.appendChild(regenBtn);

                        // 版本历史按钮
                        if (msg.versions && msg.versions.length > 0) {
                            const verBtn = document.createElement('button');
                            const idx = msg.versionIndex !== undefined ? msg.versionIndex : 0;
                            verBtn.textContent = `📜 v${idx+1}/${msg.versions.length+1}`;
                            verBtn.className = 'version-badge';
                            verBtn.addEventListener('click', (e) => {
                                e.stopPropagation();
                                cycleVersion(index);
                            });
                            actions.appendChild(verBtn);
                        }
                    }

                    if (actions.children.length > 0) wrap.appendChild(actions);
                    chatBox.appendChild(wrap);
                });
            }
            chatBox.scrollTop = chatBox.scrollHeight;
            renderSessionList();
            updateTokenCounter();
        }

        // ============================================================
        //  编辑用户消息
        // ============================================================
        function editUserMessage(index) {
            const session = getCurrentSession();
            if (!session) return;
            const msg = session.messages[index];
            if (!msg || msg.role !== 'user') return;

            const newText = prompt('修改你的消息：', msg.content);
            if (newText === null || newText.trim() === '') return;

            // 截断该消息之后的所有内容（包括助手回复）
            session.messages = session.messages.slice(0, index);
            // 更新该消息内容
            session.messages[index].content = newText.trim();
            // 清除该消息之后的附件残留（如有）
            saveSessions();
            renderChat();
            // 聚焦输入框
            promptInput.focus();
            statusText.textContent = '✅ 消息已修改，重新发送即可';
        }

        // ============================================================
        //  重新生成
        // ============================================================
        async function regenerateMessage(index) {
            const session = getCurrentSession();
            if (!session) return;
            const msg = session.messages[index];
            if (!msg || msg.role !== 'assistant') return;

            // 找到对应的用户消息（上一条）
            let userMsgIndex = index - 1;
            let userMsg = null;
            while (userMsgIndex >= 0) {
                if (session.messages[userMsgIndex].role === 'user') {
                    userMsg = session.messages[userMsgIndex];
                    break;
                }
                userMsgIndex--;
            }
            if (!userMsg) {
                alert('找不到对应的用户消息');
                return;
            }

            const key = localStorage.getItem(KEY_STORAGE);
            if (!key) { alert('请先保存 API Key'); return; }

            // 保存旧版本
            if (!msg.versions) msg.versions = [];
            // 如果当前内容还没存入版本，先存入（避免重复）
            const currentContent = msg.content;
            const exists = msg.versions.some(v => v.content === currentContent);
            if (!exists && currentContent) {
                msg.versions.push({ content: currentContent, timestamp: Date.now() });
            }
            // 设置版本索引为最新（0表示最新）
            msg.versionIndex = 0;

            // 显示加载状态
            const originalContent = msg.content;
            msg.content = '🤔 重新生成中...';
            msg._loading = true;
            saveSessions();
            renderChat();

            // 构建历史上下文（不包含当前这个助手消息及之后）
            const history = session.messages.slice(0, index);

            try {
                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${key}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: history.map(m => ({ role: m.role, content: m.content })),
                        stream: false,
                        max_tokens: 4096
                    })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(`API错误(${response.status}): ${errData.error?.message || '请检查Key'}`);
                }

                const data = await response.json();
                const reply = data.choices?.[0]?.message?.content || '无回复内容';

                // 更新消息
                msg.content = reply;
                msg._loading = false;
                // 把旧版本推入（如果还没推）
                if (originalContent && !msg.versions.some(v => v.content === originalContent)) {
                    msg.versions.push({ content: originalContent, timestamp: Date.now() });
                }
                msg.versionIndex = 0; // 显示最新
                saveSessions();
                renderChat();
                statusText.textContent = '✅ 重新生成完成';

            } catch (error) {
                msg.content = `❌ 重新生成失败: ${error.message}`;
                msg._loading = false;
                saveSessions();
                renderChat();
                statusText.textContent = '⚠️ 生成失败';
            }
        }

        // ============================================================
        //  版本循环（查看历史版本）
        // ============================================================
        function cycleVersion(index) {
            const session = getCurrentSession();
            if (!session) return;
            const msg = session.messages[index];
            if (!msg || msg.role !== 'assistant') return;
            if (!msg.versions || msg.versions.length === 0) return;

            // 当前显示的版本索引 (0 表示最新，1表示旧，类推)
            let current = msg.versionIndex !== undefined ? msg.versionIndex : 0;
            // 循环递增
            current = (current + 1) % (msg.versions.length + 1);
            msg.versionIndex = current;

            if (current === 0) {
                // 显示最新内容（即主内容）
                // 但主内容可能已经在 versions 里了，需要找出来
                // 我们存储时，主内容是单独存的，versions存的是旧版
                // 简单处理：如果版本索引为0，显示主内容，否则显示versions[current-1]
                // 但为了统一，我们重构：把当前内容先塞进versions（如果不在的话）
                // 更稳健：直接交换
                const allVersions = [msg.content, ...msg.versions.map(v => v.content)];
                // 去重保留顺序
                const unique = [];
                const seen = new Set();
                for (const c of allVersions) {
                    if (!seen.has(c)) { seen.add(c); unique.push(c); }
                }
                // 如果unique长度 > 0
                if (unique.length > 0) {
                    // 旋转显示
                    const idx = current % unique.length;
                    msg.content = unique[idx];
                    // 重新构建versions为剩下的
                    const remaining = unique.filter((_, i) => i !== idx);
                    msg.versions = remaining.map(c => ({ content: c, timestamp: Date.now() }));
                    msg.versionIndex = 0; // 重置索引，因为现在是新顺序
                    saveSessions();
                    renderChat();
                }
            } else {
                // 显示旧版本
                if (msg.versions[current - 1]) {
                    msg.content = msg.versions[current - 1].content;
                    saveSessions();
                    renderChat();
                }
            }
        }

        // ============================================================
        //  发送消息（含附件）
        // ============================================================
        async function sendMessage() {
            const key = localStorage.getItem(KEY_STORAGE);
            if (!key) { alert('请先输入并保存 API Key'); return; }
            const text = promptInput.value.trim();
            if (!text && pendingAttachments.length === 0) { alert('请输入问题或上传文件'); return; }

            const session = getCurrentSession();
            if (!session) { createNewSession(); }

            // 构建用户消息
            let userContent = text || '请分析上传的文件内容';
            const images = [];
            const fileIds = [];
            for (const att of pendingAttachments) {
                if (att.type === 'image') images.push(att.data);
                else if (att.type === 'file') fileIds.push(att.data);
            }

            let finalUserMsg;
            if (images.length > 0) {
                const contentArray = [{ type: 'text', text: userContent }];
                images.forEach(img => {
                    contentArray.push({ type: 'image_url', image_url: { url: img } });
                });
                finalUserMsg = contentArray;
            } else {
                finalUserMsg = userContent;
            }

            // 存储本地用户消息
            const localMsg = { role: 'user', content: text || '📎 文件上传请求' };
            if (images.length > 0) localMsg.images = images;
            session.messages.push(localMsg);
            saveSessions();
            renderChat();

            // 清空输入和附件
            promptInput.value = '';
            promptInput.style.height = 'auto';
            pendingAttachments = [];
            renderAttachmentBar();

            // 加载占位
            const loadingMsg = { role: 'assistant', content: '🤔 思考中...', _loading: true };
            session.messages.push(loadingMsg);
            saveSessions();
            renderChat();
            sendBtn.disabled = true;
            statusText.textContent = '⏳ 请求中...';

            try {
                const apiMessages = session.messages.filter(m => !m._loading).map(m => ({ role: m.role, content: m.content }));
                // 移除刚加的占位，用真实消息替换
                const requestBody = {
                    model: 'deepseek-chat',
                    messages: apiMessages,
                    stream: false,
                    max_tokens: 4096
                };
                if (fileIds.length > 0) requestBody.file_ids = fileIds;

                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(`API错误(${response.status}): ${errData.error?.message || '请检查Key'}`);
                }

                const data = await response.json();
                const reply = data.choices?.[0]?.message?.content || '无回复内容';

                // 移除占位
                session.messages.pop();
                // 添加真实回复
                session.messages.push({ role: 'assistant', content: reply });
                saveSessions();
                renderChat();
                statusText.textContent = '✅ 回复成功';

            } catch (error) {
                // 移除占位并报错
                session.messages.pop();
                session.messages.push({ role: 'assistant', content: `❌ 出错：${error.message}` });
                saveSessions();
                renderChat();
                statusText.textContent = '⚠️ 请求失败';
            } finally {
                sendBtn.disabled = false;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        // ============================================================
        //  附件管理
        // ============================================================
        function renderAttachmentBar() {
            attachmentBar.innerHTML = '';
            if (pendingAttachments.length === 0) { attachmentBar.classList.remove('show'); return; }
            attachmentBar.classList.add('show');
            pendingAttachments.forEach((att, index) => {
                const tag = document.createElement('span');
                tag.className = 'attach-tag';
                const icon = att.type === 'image' ? '🖼️' : '📄';
                tag.innerHTML = `${icon} ${att.name}`;
                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-attach';
                removeBtn.textContent = '✕';
                removeBtn.addEventListener('click', () => {
                    pendingAttachments.splice(index, 1);
                    renderAttachmentBar();
                });
                tag.appendChild(removeBtn);
                attachmentBar.appendChild(tag);
            });
        }

        attachBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            fileInput.value = '';
            for (const file of files) {
                const isImage = file.type.startsWith('image/');
                if (isImage) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        pendingAttachments.push({ type: 'image', data: ev.target.result, name: file.name });
                        renderAttachmentBar();
                    };
                    reader.readAsDataURL(file);
                } else {
                    try {
                        const key = localStorage.getItem(KEY_STORAGE);
                        if (!key) { alert('请先保存 API Key'); return; }
                        const formData = new FormData();
                        formData.append('file', file);
                        formData.append('purpose', 'file-extract');
                        const uploadRes = await fetch('https://api.deepseek.com/files', {
                            method: 'POST', headers: { 'Authorization': `Bearer ${key}` }, body: formData
                        });
                        if (!uploadRes.ok) {
                            const err = await uploadRes.json().catch(() => ({}));
                            throw new Error(`上传失败 (${uploadRes.status}): ${err.error?.message || '未知错误'}`);
                        }
                        const result = await uploadRes.json();
                        pendingAttachments.push({ type: 'file', data: result.id, name: file.name });
                        renderAttachmentBar();
                    } catch (err) { alert(`文档上传出错：${err.message}`); }
                }
            }
        });

        // ============================================================
        //  会话管理
        // ============================================================
        function renderSessionList() {
            sessionList.innerHTML = '';
            if (sessions.length === 0) { sessionList.innerHTML = '<div class="empty-sessions">暂无对话</div>'; return; }
            sessions.forEach(s => {
                const item = document.createElement('div');
                item.className = 'session-item' + (s.id === currentId ? ' active' : '');
                const nameSpan = document.createElement('span');
                nameSpan.className = 'session-name';
                nameSpan.textContent = s.name || '未命名';
                const actions = document.createElement('div');
                actions.className = 'session-actions';
                const renameBtn = document.createElement('button');
                renameBtn.textContent = '✏️';
                renameBtn.addEventListener('click', (e) => { e.stopPropagation(); renameSession(s.id); });
                const delBtn = document.createElement('button');
                delBtn.textContent = '🗑️';
                delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteSession(s.id); });
                actions.appendChild(renameBtn); actions.appendChild(delBtn);
                item.appendChild(nameSpan); item.appendChild(actions);
                item.addEventListener('click', () => { switchSession(s.id); });
                sessionList.appendChild(item);
            });
        }

        function switchSession(id) {
            if (id === currentId) { closeDrawer(); return; }
            sessions.forEach(s => delete s.active);
            const target = sessions.find(s => s.id === id);
            if (target) { target.active = true; currentId = id; saveSessions(); renderChat(); closeDrawer(); }
        }
        function renameSession(id) {
            const s = sessions.find(s => s.id === id);
            if (!s) return;
            const newName = prompt('重命名：', s.name);
            if (newName !== null && newName.trim() !== '') { s.name = newName.trim(); saveSessions(); renderChat(); }
        }
        function deleteSession(id) {
            if (sessions.length <= 1) { alert('至少保留一个对话'); return; }
            if (!confirm(`删除“${sessions.find(s=>s.id===id)?.name || '未命名'}”？`)) return;
            sessions = sessions.filter(s => s.id !== id);
            if (currentId === id) { currentId = sessions[0].id; sessions[0].active = true; }
            saveSessions(); renderChat();
        }
        function createNewSession() {
            const count = sessions.length + 1;
            const newSession = { id: generateId(), name: `对话 ${count}`, messages: [], active: true };
            sessions.forEach(s => delete s.active);
            sessions.push(newSession);
            currentId = newSession.id;
            saveSessions();
            renderChat();
            closeDrawer();
            promptInput.focus();
        }

        // 抽屉控制
        function openDrawer() { renderSessionList(); overlay.classList.add('active'); drawer.classList.add('open'); }
        function closeDrawer() { overlay.classList.remove('active'); drawer.classList.remove('open'); }
        menuBtn.addEventListener('click', openDrawer);
        closeDrawerBtn.addEventListener('click', closeDrawer);
        overlay.addEventListener('click', closeDrawer);
        newSessionBtn.addEventListener('click', createNewSession);
        newChatBtn.addEventListener('click', createNewSession);
        titleArea.addEventListener('click', () => { const cur = getCurrentSession(); if (cur) renameSession(cur.id); });

        // Key 保存
        saveKeyBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) { localStorage.setItem(KEY_STORAGE, key); currentKey = key; alert('✅ Key 已保存'); } else { alert('请输入 Key'); }
        });

        // ============================================================
        //  搜索功能
        // ============================================================
        function performSearch(query) {
            if (!query.trim()) { searchResults.innerHTML = '<div style="color:#94a3b8;padding:20px;">输入关键词搜索</div>'; return; }
            const q = query.trim().toLowerCase();
            let results = [];
            sessions.forEach(s => {
                s.messages.forEach((m, idx) => {
                    if (m.content && m.content.toLowerCase().includes(q)) {
                        results.push({
                            sessionId: s.id,
                            sessionName: s.name,
                            msgIndex: idx,
                            content: m.content,
                            role: m.role
                        });
                    }
                });
            });
            if (results.length === 0) {
                searchResults.innerHTML = '<div style="color:#94a3b8;padding:20px;">未找到匹配的消息</div>';
                return;
            }
            searchResults.innerHTML = '';
            results.slice(0, 30).forEach(r => {
                const div = document.createElement('div');
                div.className = 'search-result-item';
                const snippet = document.createElement('div');
                snippet.className = 'snippet';
                const idx = r.content.toLowerCase().indexOf(q);
                let highlighted = r.content;
                if (idx !== -1) {
                    const start = Math.max(0, idx - 20);
                    const end = Math.min(r.content.length, idx + q.length + 20);
                    const prefix = start > 0 ? '...' : '';
                    const suffix = end < r.content.length ? '...' : '';
                    const match = r.content.substring(idx, idx + q.length);
                    highlighted = prefix + r.content.substring(start, idx) + `<mark>${match}</mark>` + r.content.substring(idx + q.length, end) + suffix;
                }
                snippet.innerHTML = highlighted;
                const meta = document.createElement('div');
                meta.className = 'meta';
                meta.textContent = `📁 ${r.sessionName} · ${r.role === 'user' ? '你' : 'AI'}`;
                div.appendChild(snippet);
                div.appendChild(meta);
                div.addEventListener('click', () => {
                    closeSearch();
                    switchSession(r.sessionId);
                    setTimeout(() => {
                        // 高亮对应消息
                        const items = chatBox.querySelectorAll('.msg-wrapper');
                        let targetIdx = 0;
                        const session = getCurrentSession();
                        if (session) {
                            // 找到对应消息的索引
                            const idx = session.messages.findIndex((m, i) => i === r.msgIndex && m.content === r.content);
                            if (idx !== -1 && items[idx]) {
                                items[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
                                items[idx].style.transition = 'background 0.3s';
                                items[idx].style.background = '#fef08a';
                                setTimeout(() => items[idx].style.background = '', 2000);
                            }
                        }
                    }, 300);
                });
                searchResults.appendChild(div);
            });
        }

        let searchTimeout;
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => performSearch(searchInput.value), 300);
        });

        searchBtn.addEventListener('click', () => { searchModal.classList.add('active'); searchInput.value = ''; searchResults.innerHTML = ''; searchInput.focus(); });
        closeSearchBtn.addEventListener('click', closeSearch);
        function closeSearch() { searchModal.classList.remove('active'); }
        // 点击模态背景关闭
        searchModal.addEventListener('click', (e) => { if (e.target === searchModal) closeSearch(); });

        // ============================================================
        //  事件绑定（发送）
        // ============================================================
        sendBtn.addEventListener('click', sendMessage);
        promptInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
        promptInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // ============================================================
        //  启动
        // ============================================================
        loadData();
        renderChat();
        statusText.textContent = '就绪';
    </script>
</body>
</html>
