<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeepSeek 多模态助手</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* ---------- 顶部导航 ---------- */
        #topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #e9edf2;
            flex-shrink: 0;
            min-height: 60px;
        }
        #menuBtn { font-size: 28px; background: none; border: none; cursor: pointer; padding: 0 8px; color: #1e293b; }
        #titleArea { flex: 1; text-align: center; font-weight: 600; font-size: 18px; color: #0f172a; cursor: pointer; padding: 4px 12px; border-radius: 8px; user-select: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60%; }
        #titleArea:active { background: #f1f5f9; }
        #newChatBtn { font-size: 24px; background: #4a6cf7; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-weight: 300; cursor: pointer; flex-shrink: 0; }
        #newChatBtn:active { background: #3a5cd5; }

        /* ---------- API Key 栏 ---------- */
        #keyBar {
            display: flex; gap: 8px; padding: 8px 16px; background: #f8fafc;
            border-bottom: 1px solid #e9edf2; flex-shrink: 0; align-items: center;
        }
        #apiKey { flex: 1; padding: 8px 14px; border: 1px solid #d1d5db; border-radius: 20px; font-size: 13px; background: white; outline: none; min-width: 0; }
        #apiKey:focus { border-color: #4a6cf7; }
        #saveKeyBtn { padding: 6px 16px; background: #4a6cf7; color: white; border: none; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; }

        /* ---------- 文件附件预览条 ---------- */
        #attachmentBar {
            display: none;
            gap: 8px;
            padding: 6px 16px;
            background: #f1f5f9;
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
            flex-wrap: wrap;
            align-items: center;
        }
        #attachmentBar.show { display: flex; }
        .attach-tag {
            background: white;
            border-radius: 16px;
            padding: 4px 12px 4px 16px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #cbd5e1;
            color: #0f172a;
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .attach-tag .remove-attach {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: #94a3b8;
            padding: 0 2px;
        }
        .attach-tag .remove-attach:active { color: #dc2626; }

        /* ---------- 聊天区域 ---------- */
        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #ffffff;
        }
        .msg {
            max-width: 88%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            word-break: break-word;
            font-size: 15px;
            animation: fadeIn 0.2s ease;
        }
        .user { align-self: flex-end; background: #4a6cf7; color: white; border-bottom-right-radius: 4px; }
        .assistant { align-self: flex-start; background: #f1f3f5; color: #1e293b; border-bottom-left-radius: 4px; }
        .loading { align-self: flex-start; background: #f1f3f5; color: #64748b; padding: 12px 20px; border-radius: 18px; font-size: 14px; }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 4px; }

        /* ---------- 底部输入 ---------- */
        #inputArea {
            display: flex;
            gap: 8px;
            padding: 10px 16px 14px;
            background: white;
            border-top: 1px solid #e9edf2;
            flex-shrink: 0;
            align-items: flex-end;
        }
        #attachBtn {
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 6px;
            color: #64748b;
            line-height: 1;
            height: 44px;
            display: flex;
            align-items: center;
        }
        #attachBtn:active { color: #4a6cf7; }
        #prompt {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 24px;
            font-size: 15px;
            resize: none;
            outline: none;
            background: #f8fafc;
            font-family: inherit;
            min-height: 44px;
            max-height: 120px;
            line-height: 1.4;
        }
        #prompt:focus { border-color: #4a6cf7; background: white; }
        #sendBtn {
            width: 50px; height: 50px; border-radius: 50%; background: #4a6cf7;
            color: white; border: none; font-size: 22px; cursor: pointer;
            flex-shrink: 0; display: flex; align-items: center; justify-content: center;
        }
        #sendBtn:active { background: #3a5cd5; transform: scale(0.95); }
        #sendBtn:disabled { opacity: 0.4; pointer-events: none; }

        /* ---------- 侧滑菜单（会话列表） ---------- */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; display: none; animation: fadeIn 0.2s; }
        #overlay.active { display: block; }
        #drawer {
            position: fixed; top: 0; left: -85%; width: 82%; max-width: 340px; height: 100%;
            background: white; z-index: 1001; padding: 20px 16px;
            box-shadow: 4px 0 20px rgba(0,0,0,0.15);
            transition: left 0.25s ease;
            display: flex; flex-direction: column; overflow: hidden;
        }
        #drawer.open { left: 0; }
        #drawerTitle { font-size: 20px; font-weight: 700; color: #0f172a; padding-bottom: 12px; border-bottom: 1px solid #e9edf2; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        #drawerTitle button { background: none; border: none; font-size: 26px; cursor: pointer; color: #94a3b8; }
        #sessionList { flex: 1; overflow-y: auto; margin-top: 12px; padding-bottom: 12px; }
        .session-item { display: flex; align-items: center; padding: 14px 12px; border-radius: 12px; margin-bottom: 4px; cursor: pointer; background: #f8fafc; gap: 8px; }
        .session-item:active { background: #e9edf2; }
        .session-item.active { background: #dbeafe; border-left: 4px solid #4a6cf7; }
        .session-name { flex: 1; font-size: 15px; color: #1e293b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        .session-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .session-actions button { background: none; border: none; font-size: 18px; cursor: pointer; padding: 4px 6px; border-radius: 6px; color: #64748b; }
        .session-actions .del-btn:active { color: #dc2626; background: #fee2e2; }
        .session-actions .rename-btn:active { color: #2563eb; background: #dbeafe; }
        #newSessionBtn { width: 100%; padding: 14px; background: #4a6cf7; color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; flex-shrink: 0; }
        #newSessionBtn:active { background: #3a5cd5; }
        .empty-sessions { color: #94a3b8; text-align: center; padding: 30px 0; font-size: 14px; }
        #fileInput { display: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 480px) {
            .msg { max-width: 92%; font-size: 14px; padding: 10px 14px; }
            #titleArea { font-size: 16px; max-width: 50%; }
            #drawer { left: -100%; width: 88%; }
        }
    </style>
</head>
<body>

    <div id="topbar">
        <button id="menuBtn">☰</button>
        <span id="titleArea">新对话</span>
        <button id="newChatBtn">+</button>
    </div>

    <div id="keyBar">
        <input type="password" id="apiKey" placeholder="输入 API Key">
        <button id="saveKeyBtn">保存</button>
    </div>

    <!-- 附件预览条 -->
    <div id="attachmentBar"></div>

    <div id="chatBox"></div>

    <div id="inputArea">
        <button id="attachBtn">📎</button>
        <input type="file" id="fileInput" multiple accept="image/*,.pdf,.doc,.docx,.txt,.xls,.xlsx,.ppt,.pptx">
        <textarea id="prompt" rows="1" placeholder="输入问题，或上传文件..."></textarea>
        <button id="sendBtn">➤</button>
    </div>

    <div id="overlay"></div>
    <div id="drawer">
        <div id="drawerTitle">我的对话 <button id="closeDrawerBtn">✕</button></div>
        <div id="sessionList"></div>
        <button id="newSessionBtn">➕ 新建对话</button>
    </div>

    <script>
        // ============================================================
        //  数据管理（与之前版本保持一致）
        // ============================================================
        let sessions = [];
        let currentId = null;
        let currentKey = '';
        // 附件暂存：{ type: 'image'|'file', data: base64|file_id, name: string, file_obj?: File }
        let pendingAttachments = [];

        const STORAGE_KEY = 'deepseek_sessions';
        const KEY_STORAGE = 'deepseek_api_key';

        const chatBox = document.getElementById('chatBox');
        const promptInput = document.getElementById('prompt');
        const sendBtn = document.getElementById('sendBtn');
        const apiKeyInput = document.getElementById('apiKey');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const titleArea = document.getElementById('titleArea');
        const menuBtn = document.getElementById('menuBtn');
        const newChatBtn = document.getElementById('newChatBtn');
        const drawer = document.getElementById('drawer');
        const overlay = document.getElementById('overlay');
        const sessionList = document.getElementById('sessionList');
        const newSessionBtn = document.getElementById('newSessionBtn');
        const closeDrawerBtn = document.getElementById('closeDrawerBtn');
        const attachBtn = document.getElementById('attachBtn');
        const fileInput = document.getElementById('fileInput');
        const attachmentBar = document.getElementById('attachmentBar');

        // ============================================================
        //  初始化
        // ============================================================
        function loadData() {
            const savedKey = localStorage.getItem(KEY_STORAGE);
            if (savedKey) { currentKey = savedKey; apiKeyInput.value = savedKey; }
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) { try { sessions = JSON.parse(raw); } catch { sessions = []; } }
            if (!sessions.length) {
                sessions.push({ id: generateId(), name: '新对话', messages: [] });
                saveSessions();
            }
            const active = sessions.find(s => s.active) || sessions[0];
            currentId = active.id;
            sessions.forEach(s => delete s.active);
            const cur = sessions.find(s => s.id === currentId);
            if (cur) cur.active = true;
            saveSessions();
        }
        function generateId() { return Date.now() + '_' + Math.random().toString(36).slice(2, 7); }
        function saveSessions() { localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions)); }

        function getCurrentSession() { return sessions.find(s => s.id === currentId) || sessions[0]; }

        function renderChat() {
            const session = getCurrentSession();
            if (!session) return;
            titleArea.textContent = session.name || '未命名';
            chatBox.innerHTML = '';
            const msgs = session.messages || [];
            if (msgs.length === 0) {
                const welcome = document.createElement('div');
                welcome.className = 'msg assistant';
                welcome.textContent = '👋 开始新对话吧！支持上传图片或文档。';
                chatBox.appendChild(welcome);
            } else {
                msgs.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = `msg ${msg.role}`;
                    // 如果消息包含图片（仅限用户）
                    if (msg.role === 'user' && msg.images && msg.images.length) {
                        div.textContent = msg.content || '📷 图片';
                        msg.images.forEach(imgData => {
                            const img = document.createElement('img');
                            img.src = imgData;
                            img.style.maxWidth = '100%';
                            img.style.maxHeight = '200px';
                            img.style.borderRadius = '8px';
                            img.style.marginTop = '6px';
                            div.appendChild(img);
                        });
                    } else {
                        div.textContent = msg.content;
                    }
                    chatBox.appendChild(div);
                });
            }
            chatBox.scrollTop = chatBox.scrollHeight;
            renderSessionList();
        }

        function renderSessionList() {
            sessionList.innerHTML = '';
            if (sessions.length === 0) { sessionList.innerHTML = '<div class="empty-sessions">暂无对话</div>'; return; }
            sessions.forEach(s => {
                const item = document.createElement('div');
                item.className = 'session-item' + (s.id === currentId ? ' active' : '');
                const nameSpan = document.createElement('span');
                nameSpan.className = 'session-name';
                nameSpan.textContent = s.name || '未命名';
                const actions = document.createElement('div');
                actions.className = 'session-actions';
                const renameBtn = document.createElement('button');
                renameBtn.className = 'rename-btn';
                renameBtn.textContent = '✏️';
                renameBtn.addEventListener('click', (e) => { e.stopPropagation(); renameSession(s.id); });
                const delBtn = document.createElement('button');
                delBtn.className = 'del-btn';
                delBtn.textContent = '🗑️';
                delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteSession(s.id); });
                actions.appendChild(renameBtn);
                actions.appendChild(delBtn);
                item.appendChild(nameSpan);
                item.appendChild(actions);
                item.addEventListener('click', () => { switchSession(s.id); });
                sessionList.appendChild(item);
            });
        }

        function switchSession(id) {
            if (id === currentId) { closeDrawer(); return; }
            sessions.forEach(s => delete s.active);
            const target = sessions.find(s => s.id === id);
            if (target) { target.active = true; currentId = id; saveSessions(); renderChat(); closeDrawer(); }
        }
        function renameSession(id) {
            const s = sessions.find(s => s.id === id);
            if (!s) return;
            const newName = prompt('请输入新的对话名称：', s.name);
            if (newName !== null && newName.trim() !== '') { s.name = newName.trim(); saveSessions(); renderChat(); }
        }
        function deleteSession(id) {
            if (sessions.length <= 1) { alert('至少保留一个对话'); return; }
            if (!confirm(`删除“${sessions.find(s=>s.id===id)?.name || '未命名'}”？`)) return;
            sessions = sessions.filter(s => s.id !== id);
            if (currentId === id) { currentId = sessions[0].id; sessions[0].active = true; }
            saveSessions(); renderChat();
        }
        function createNewSession() {
            const count = sessions.length + 1;
            const newSession = { id: generateId(), name: `对话 ${count}`, messages: [], active: true };
            sessions.forEach(s => delete s.active);
            sessions.push(newSession);
            currentId = newSession.id;
            saveSessions();
            renderChat();
            closeDrawer();
            promptInput.focus();
        }

        // 抽屉
        function openDrawer() { renderSessionList(); overlay.classList.add('active'); drawer.classList.add('open'); }
        function closeDrawer() { overlay.classList.remove('active'); drawer.classList.remove('open'); }
        menuBtn.addEventListener('click', openDrawer);
        closeDrawerBtn.addEventListener('click', closeDrawer);
        overlay.addEventListener('click', closeDrawer);
        newSessionBtn.addEventListener('click', createNewSession);
        newChatBtn.addEventListener('click', createNewSession);
        titleArea.addEventListener('click', () => { const cur = getCurrentSession(); if (cur) renameSession(cur.id); });

        // Key 保存
        saveKeyBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) { localStorage.setItem(KEY_STORAGE, key); currentKey = key; alert('✅ Key 已保存'); } else { alert('请输入 Key'); }
        });

        // ============================================================
        //  文件上传逻辑（核心新增）
        // ============================================================
        function renderAttachmentBar() {
            attachmentBar.innerHTML = '';
            if (pendingAttachments.length === 0) {
                attachmentBar.classList.remove('show');
                return;
            }
            attachmentBar.classList.add('show');
            pendingAttachments.forEach((att, index) => {
                const tag = document.createElement('span');
                tag.className = 'attach-tag';
                const icon = att.type === 'image' ? '🖼️' : '📄';
                tag.innerHTML = `${icon} ${att.name}`;
                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-attach';
                removeBtn.textContent = '✕';
                removeBtn.addEventListener('click', () => {
                    pendingAttachments.splice(index, 1);
                    renderAttachmentBar();
                });
                tag.appendChild(removeBtn);
                attachmentBar.appendChild(tag);
            });
        }

        attachBtn.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            fileInput.value = ''; // 重置

            for (const file of files) {
                const isImage = file.type.startsWith('image/');
                if (isImage) {
                    // 图片转 Base64 暂存
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        pendingAttachments.push({
                            type: 'image',
                            data: ev.target.result,
                            name: file.name
                        });
                        renderAttachmentBar();
                    };
                    reader.readAsDataURL(file);
                } else {
                    // 文档 -> 立即上传到 DeepSeek 获取 file_id
                    try {
                        const key = localStorage.getItem(KEY_STORAGE);
                        if (!key) { alert('请先保存 API Key'); return; }
                        const formData = new FormData();
                        formData.append('file', file);
                        formData.append('purpose', 'file-extract');

                        const uploadRes = await fetch('https://api.deepseek.com/files', {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${key}` },
                            body: formData
                        });
                        if (!uploadRes.ok) {
                            const err = await uploadRes.json().catch(() => ({}));
                            throw new Error(`上传失败 (${uploadRes.status}): ${err.error?.message || '未知错误'}`);
                        }
                        const result = await uploadRes.json();
                        const fileId = result.id;
                        pendingAttachments.push({
                            type: 'file',
                            data: fileId,
                            name: file.name
                        });
                        renderAttachmentBar();
                    } catch (err) {
                        alert(`文档上传出错：${err.message}`);
                    }
                }
            }
        });

        // ============================================================
        //  发送消息（改造支持附件）
        // ============================================================
        async function sendMessage() {
            const key = localStorage.getItem(KEY_STORAGE);
            if (!key) { alert('请先输入并保存 API Key'); return; }
            const text = promptInput.value.trim();
            if (!text && pendingAttachments.length === 0) { alert('请输入问题或上传文件'); return; }

            // 准备请求体
            const session = getCurrentSession();
            if (!session) { createNewSession(); }

            // 构建 messages 数组（保留历史）
            let apiMessages = session.messages.map(m => ({ role: m.role, content: m.content }));

            // 构建当前用户消息内容
            let userContent = text || '请分析上传的文件内容';
            const images = [];
            const fileIds = [];

            // 分离附件
            for (const att of pendingAttachments) {
                if (att.type === 'image') {
                    images.push(att.data);
                } else if (att.type === 'file') {
                    fileIds.push(att.data);
                }
            }

            // 如果有图片，需要构建多模态 content 数组
            let finalUserMsg;
            if (images.length > 0) {
                const contentArray = [
                    { type: 'text', text: userContent }
                ];
                images.forEach(img => {
                    contentArray.push({
                        type: 'image_url',
                        image_url: { url: img }
                    });
                });
                finalUserMsg = contentArray;
            } else {
                finalUserMsg = userContent;
            }

            // 存到本地会话（仅存文本和图片base64用于展示）
            const localMsg = { role: 'user', content: text || '📎 文件上传请求' };
            if (images.length > 0) localMsg.images = images;
            session.messages.push(localMsg);
            // 对于纯文本历史，我们只保留文本；但API调用时用上面的 apiMessages + 当前消息
            saveSessions();
            renderChat();

            // 清空输入和附件
            promptInput.value = '';
            promptInput.style.height = 'auto';
            pendingAttachments = [];
            renderAttachmentBar();

            // 加载占位
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'msg assistant';
            loadingDiv.textContent = '🤔 思考中...';
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            sendBtn.disabled = true;

            try {
                // 构建 API 请求体
                const requestBody = {
                    model: 'deepseek-chat',
                    messages: [
                        ...apiMessages,
                        { role: 'user', content: finalUserMsg }
                    ],
                    stream: false,
                    max_tokens: 4096
                };
                // 如果有文档 file_ids，添加到根级
                if (fileIds.length > 0) {
                    requestBody.file_ids = fileIds;
                }

                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${key}`
                    },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(`API错误(${response.status}): ${errData.error?.message || '请检查Key或网络'}`);
                }

                const data = await response.json();
                const reply = data.choices?.[0]?.message?.content || '无回复内容';

                chatBox.removeChild(loadingDiv);
                session.messages.push({ role: 'assistant', content: reply });
                saveSessions();
                renderChat();

            } catch (error) {
                loadingDiv.textContent = `❌ ${error.message}`;
                loadingDiv.style.color = '#dc2626';
            } finally {
                sendBtn.disabled = false;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        // 事件绑定
        sendBtn.addEventListener('click', sendMessage);
        promptInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
        promptInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // 启动
        loadData();
        renderChat();
    </script>
</body>
</html>
