                // 重新发送 (复用用户消息)
                const apiKey = data.apiKey || localStorage.getItem('deepseek_api_key') || '';
                if (!apiKey) {
                    showToast('请设置 API Key');
                    return;
                }

                const msgs = tab.messages || [];

                    const vv = getCurrentVersion(m);

                        if (vv.user) history.push({ role: 'user', content: vv.user });
                        if (vv.assistant) history.push({ role: 'assistant', content: vv.assistant });

                try {
                    const model = data.model || 'deepseek-v4-flash';
                    const deepThink = data.deepThink || false;
                    const resp = await fetch(DEEPSEEK_API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify({
                            model: model,
                            messages: history,
                            stream: true,
                            max_tokens: 4096,
                            temperature: 0.7,
                            reasoning_effort: deepThink ? 'high' : 'medium',
                        }),
                        signal: abortController.signal
                    });

                    if (!resp.ok) {
                        const errText = await resp.text();
                        throw new Error(`API 错误 (${resp.status}): ${errText}`);
                    }

                    const reader = resp.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';
                    let assistantText = '';
                    let reasoningText = '';

                    const latestTurn = getTurn(tab, turnId);
                    if (!latestTurn) throw new Error('Turn not found');
                    const vIdx = latestTurn.currentVersion || 0;
                    const currentVer = latestTurn.versions[vIdx];
                    if (!currentVer) throw new Error('Version not found');

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop() || '';
                        for (let line of lines) {
                            if (line.startsWith('data: ')) {
                                const payload = line.slice(6).trim();
                                if (payload === '[DONE]') continue;
                                try {
                                    const json = JSON.parse(payload);
                                    const delta = json.choices?.[0]?.delta;
                                    if (delta) {
                                        if (delta.content) {
                                            assistantText += delta.content;
                                            currentVer.assistant = assistantText;
                                            updateTurnDisplay(tab, turnId);
                                        }
                                        if (delta.reasoning_content) {
                                            reasoningText += delta.reasoning_content;
                                            currentVer.reasoning = reasoningText;
                                            updateTurnDisplay(tab, turnId);
                                        }
                                    }
                                } catch (e) { /* ignore */ }
                            }
                        }
                        scrollToBottom();
                    }

                    currentVer.assistant = assistantText;
                    currentVer.reasoning = reasoningText;
                    currentVer.timestamp = Date.now();
                    saveData();
                    renderChat();

                } catch (err) {
                    if (err.name === 'AbortError') {
                        showToast('已停止生成');
                    } else {
                        showToast('错误: ' + err.message);
                        const latestTurn = getTurn(tab, turnId);
                        if (latestTurn) {
                            const vv = getCurrentVersion(latestTurn);
                            if (vv) {
                                vv.assistant = '❌ ' + err.message;
                                saveData();
                                renderChat();
                            }
                        }
                    }
                } finally {
                    isStreaming = false;
                    sendBtn.textContent = '➤';
                    sendBtn.classList.remove('stop');
                    abortController = null;
                    saveData();
                    renderChat();
                }
            }

            // ---------- 版本切换 ----------
            function switchVersion(turnId, delta) {
                const tab = getActiveTab();
                if (!tab) return;
                const turn = getTurn(tab, turnId);
                if (!turn) return;
                const total = turn.versions.length;
                let idx = (turn.currentVersion || 0) + delta;
                if (idx < 0) idx = 0;
                if (idx >= total) idx = total - 1;
                if (idx === (turn.currentVersion || 0)) return;
                turn.currentVersion = idx;
                saveData();
                renderChat();
                showToast(`版本 ${idx+1}/${total}`);
                scrollToBottom();
            }

            // ---------- 编辑消息 ----------
            function showEditMessage(turnId, versionIdx) {
                const tab = getActiveTab();
                if (!tab) return;
                const turn = getTurn(tab, turnId);
                if (!turn) return;
                const v = turn.versions[versionIdx];
                if (!v) return;
                editingTurnId = turnId;
                editingVersionIdx = versionIdx;
                $('#editMsgInput').value = v.user || '';
                editMsgPanel.classList.remove('hidden');
            }

            function saveEditedMessage() {
                const newText = $('#editMsgInput').value.trim();
                if (!newText) {
                    showToast('消息不能为空');
                    return;
                }
                const tab = getActiveTab();
                if (!tab) return;
                const turn = getTurn(tab, editingTurnId);
                if (!turn) return;
                // 创建新版本
                const oldV = turn.versions[editingVersionIdx || 0];
                const newVersion = {
                    user: newText,
                    assistant: '',
                    reasoning: '',
                    timestamp: Date.now()
                };
                turn.versions.push(newVersion);
                turn.currentVersion = turn.versions.length - 1;
                saveData();
                editMsgPanel.classList.add('hidden');
                renderChat();
                // 自动重新生成
                regenerateTurn(editingTurnId);
            }

            // ---------- 收藏 ----------
            function toggleFavorite(turnId, versionIdx) {
                const tab = getActiveTab();
                if (!tab) return;
                const idx = data.favorites.findIndex(f => f.turnId === turnId && f.versionIdx === versionIdx);
                if (idx >= 0) {
                    data.favorites.splice(idx, 1);
                } else {
                    const turn = getTurn(tab, turnId);
                    if (!turn) return;
                    const v = turn.versions[versionIdx];
                    if (!v) return;
                    data.favorites.push({
                        turnId,
                        versionIdx,
                        content: v.user || '',
                        tabId: tab.id,
                        timestamp: Date.now()
                    });
                }
                saveData();
                renderChat();
                renderFavorites();
            }

            function renderFavorites() {
                const list = $('#favoritesList');
                if (!list) return;
                if (data.favorites.length === 0) {
                    list.innerHTML = '<div class="text-gray-500 text-sm text-center">暂无收藏</div>';
                    return;
                }
                let html = '';
                for (let f of data.favorites) {
                    const tab = getTab(f.tabId);
                    const tabName = tab ? getDisplayName(tab) : '已删除';
                    html += `<div class="favorite-item" data-turn="${f.turnId}" data-version="${f.versionIdx}" data-tab="${f.tabId}">
                        <span class="fav-preview">${escapeHtml(f.content.slice(0, 50))}${f.content.length > 50 ? '…' : ''}</span>
                        <span class="fav-meta">${tabName}</span>
                        <button class="fav-remove" data-turn="${f.turnId}" data-version="${f.versionIdx}">✕</button>
                    </div>`;
                }
                list.innerHTML = html;
                list.querySelectorAll('.favorite-item').forEach(el => {
                    el.addEventListener('click', (e) => {
                        if (e.target.closest('.fav-remove')) return;
                        const tabId = el.dataset.tab;
                        const turnId = el.dataset.turn;
                        const vIdx = parseInt(el.dataset.version);
                        // 切换到对应会话
                        if (tabId && getTab(tabId)) {
                            switchTab(tabId);
                            // 高亮对应的 turn
                            setTimeout(() => {
                                const target = document.querySelector(
                                    `.message-group[data-turn-id="${turnId}"]`);
                                if (target) {
                                    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                    target.style.border = '2px solid var(--accent)';
                                    setTimeout(() => { target.style.border = ''; }, 2000);
                                }
                            }, 300);
                        }
                    });
                    el.querySelector('.fav-remove').addEventListener('click', (e) => {
                        e.stopPropagation();
                        const turnId = el.dataset.turn;
                        const vIdx = parseInt(el.dataset.version);
                        data.favorites = data.favorites.filter(f => !(f.turnId === turnId && f
                        .versionIdx === vIdx));
                        saveData();
                        renderFavorites();
                        renderChat();
                    });
                });
            }

            // ---------- 搜索 ----------
            let searchResults = [];
            let searchIndex = -1;

            function performSearch(query) {
                if (!query.trim()) {
                    clearSearch();
                    return;
                }
                const q = query.trim().toLowerCase();
                searchResults = [];
                const tabs = data.tabs || [];
                for (let tab of tabs) {
                    for (let turn of (tab.messages || [])) {
                        for (let vi = 0; vi < turn.versions.length; vi++) {
                            const v = turn.versions[vi];
                            if (v && (v.user.toLowerCase().includes(q) || v.assistant.toLowerCase().includes(q))) {
                                searchResults.push({ tabId: tab.id, turnId: turn.turnId, versionIdx: vi });
                            }
                        }
                    }
                }
                if (searchResults.length === 0) {
                    showToast('未找到匹配结果');
                    return;
                }
                searchIndex = 0;
                navigateSearch(0);
                showToast(`找到 ${searchResults.length} 条结果`);
            }

            function navigateSearch(delta) {
                if (searchResults.length === 0) return;
                searchIndex = (searchIndex + delta + searchResults.length) % searchResults.length;
                const r = searchResults[searchIndex];
                if (r && getTab(r.tabId)) {
                    switchTab(r.tabId);
                    setTimeout(() => {
                        const target = document.querySelector(`.message-group[data-turn-id="${r.turnId}"]`);
                        if (target) {
                            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            target.style.border = '2px solid #f59e0b';
                            setTimeout(() => { target.style.border = ''; }, 2000);
                            // 高亮关键词
                            const q = prompt('搜索关键词 (用于高亮)') || '';
                            if (q) {
                                const texts = target.querySelectorAll('.msg-text');
                                texts.forEach(el => {
                                    const html = el.innerHTML;
                                    const regex = new RegExp(q, 'gi');
                                    el.innerHTML = html.replace(regex, match =>
                                        `<span class="search-highlight">${match}</span>`);
                                });
                            }
                        }
                    }, 300);
                }
            }

            function clearSearch() {
                searchResults = [];
                searchIndex = -1;
                // 清除高亮
                document.querySelectorAll('.search-highlight').forEach(el => {
                    el.replaceWith(el.textContent);
                });
            }

            // ---------- TOC ----------
            function renderToc() {
                const list = $('#tocList');
                if (!list) return;
                const tab = getActiveTab();
                if (!tab || !tab.messages || tab.messages.length === 0) {
                    list.innerHTML = '<div class="text-gray-500 text-sm text-center">暂无消息</div>';
                    return;
                }
                let html = '';
                let idx = 0;
                for (let turn of tab.messages) {
                    const v = getCurrentVersion(turn);
                    if (v && v.user) {
                        const preview = v.user.slice(0, 30) + (v.user.length > 30 ? '…' : '');
                        html += `<div class="toc-item" data-turn="${turn.turnId}">
                            <span class="toc-idx">#${idx+1}</span> ${escapeHtml(preview)}
                        </div>`;
                        idx++;
                    }
                }
                list.innerHTML = html || '<div class="text-gray-500 text-sm text-center">暂无消息</div>';
                list.querySelectorAll('.toc-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const turnId = el.dataset.turn;
                        const target = document.querySelector(`.message-group[data-turn-id="${turnId}"]`);
                        if (target) {
                            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            tocPanel.classList.add('hidden');
                        }
                    });

            }

            // ---------- 导出 ----------
            function exportChat(includeReasoning, mode) {
                const tab = getActiveTab();
                if (!tab || !tab.messages || tab.messages.length === 0) {
                    showToast('没有可导出的内容');
                    return;
                }
                let lines = [];
                const title = getDisplayName(tab);
                lines.push(`对话: ${title}`);
                lines.push(`导出时间: ${new Date().toLocaleString()}`);
                lines.push('='.repeat(50));

                for (let turn of tab.messages) {
                    const v = getCurrentVersion(turn);
                    if (!v) continue;
                    if (mode === 'ai' || mode === 'all') {
                        if (v.user && (mode === 'all' || mode === 'ai')) {
                            lines.push(`[用户] ${v.user}`);
                        }
                        if (v.assistant) {
                            let text = v.assistant;
                            if (includeReasoning && v.reasoning) {
                                text = `[思考]\n${v.reasoning}\n[回复]\n${text}`;
                            }
                            lines.push(`[AI] ${text}`);
                        }
                        lines.push('');
                    } else if (mode === 'user') {
                        if (v.user) lines.push(`[用户] ${v.user}`);
                        lines.push('');
                    }
                }

                const content = lines.join('\n');
                downloadFile(content, `对话_${title}_${Date.now()}.txt`, 'text/plain');
                showToast('导出成功');
            }

            // ---------- 备份 ----------
            function backupData() {
                const json = JSON.stringify(data, null, 2);
                downloadFile(json, `mydeepseek_backup_${new Date().toISOString().slice(0,10)}.json`, 'application/json');
                showToast('备份已下载');
            }

            function restoreData(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const restored = JSON.parse(e.target.result);
                        // 合并
                        const def = getDefaultData();
                        for (let k in def) {
                            if (!(k in restored)) restored[k] = def[k];
                        }
                        data = restored;
                        currentTabId = data.activeTabId || null;
                        saveData();
                        renderSidebar();
                        renderChat();
                        renderFavorites();
                        showToast('数据恢复成功');
                    } catch (err) {
                        showToast('恢复失败: ' + err.message);
                    }
                };
                reader.readAsText(file);
            }

            // ---------- 工具函数 ----------
            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function downloadFile(content, filename, mime) {
                const blob = new Blob([content], { type: mime });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            function showToast(msg) {
                const el = document.createElement('div');
                el.style.cssText =
                    'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--border-color);border-radius:8px;padding:8px 20px;font-size:14px;color:var(--text-primary);z-index:100;box-shadow:var(--shadow);max-width:90%;text-align:center;';
                el.textContent = msg;
                document.body.appendChild(el);
                setTimeout(() => {
                    el.style.opacity = '0';
                    el.style.transition = 'opacity 0.3s';
                    setTimeout(() => el.remove(), 400);
                }, 2000);
            }

                deepThinkToggle.checked = data.deepThink || false;

                // 确保 activeTab 有效

                    currentTabId = data.tabs.length > 0 ? data.tabs[0].id : null;
                    data.activeTabId = currentTabId;
                }
                if (!currentTabId && data.tabs.length > 0) {
                    currentTabId = data.tabs[0].id;
                    data.activeTabId = currentTabId;
                }
                if (!currentTabId) {
                    createTab();
                }
                renderSidebar();
                renderChat();
                renderFavorites();
                updateStorageBar();
                updateInputCounter();
                // 自动滚动到底部
                setTimeout(scrollToBottom, 200);
                // 检查API Key
                if (!data.apiKey && !localStorage.getItem('deepseek_api_key')) {
                    setTimeout(() => {

                            openSettings();

                }
            }

            // 暴露一些函数给全局 (用于调试)
            window.__debug = {
                data,
                switchTab,
                createTab,
                deleteTab,
                renameTab,
                sendMessage,
                regenerateTurn,
                switchVersion,
                toggleFavorite,
                backupData,
                restoreData,
                exportChat,
            };

            init();

            // 监听存储变化 (多标签同步)
            window.addEventListener('storage', (e) => {
                if (e.key === STORAGE_KEY) {
                    data = loadData();
                    currentTabId = data.activeTabId || null;
                    renderSidebar();
                    renderChat();
                    renderFavorites();
                    updateStorageBar();
                }
            });

        })();
    </script>

</body>
</html>
