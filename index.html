<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeepSeek 移动助手</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 12px;
        }
        #header {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        #apiKey {
            flex: 1;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 25px;
            font-size: 14px;
            background: white;
            outline: none;
        }
        #apiKey:focus { border-color: #4a6cf7; box-shadow: 0 0 0 3px rgba(74,108,247,0.2); }
        #saveBtn {
            padding: 0 20px;
            background: #4a6cf7;
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }
        #saveBtn:active { background: #3a5cd5; }
        #chatBox {
            flex: 1;
            overflow-y: auto;
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            word-break: break-word;
            font-size: 15px;
            animation: fadeIn 0.2s ease;
        }
        .user { align-self: flex-end; background: #4a6cf7; color: white; border-bottom-right-radius: 4px; }
        .assistant { align-self: flex-start; background: #f1f3f5; color: #1e293b; border-bottom-left-radius: 4px; }
        .loading { align-self: flex-start; background: #f1f3f5; color: #64748b; padding: 12px 20px; border-radius: 18px; font-size: 14px; }
        #inputArea {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            padding-bottom: 6px;
        }
        #prompt {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid #d1d5db;
            border-radius: 28px;
            font-size: 15px;
            resize: none;
            outline: none;
            background: white;
            font-family: inherit;
            min-height: 50px;
            max-height: 120px;
        }
        #prompt:focus { border-color: #4a6cf7; box-shadow: 0 0 0 3px rgba(74,108,247,0.2); }
        #sendBtn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #4a6cf7;
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
        }
        #sendBtn:active { background: #3a5cd5; transform: scale(0.95); }
        #sendBtn:disabled { opacity: 0.5; pointer-events: none; }
        .status-bar {
            font-size: 12px;
            color: #94a3b8;
            text-align: center;
            padding: 4px 0;
            flex-shrink: 0;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .clear-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 12px;
            text-decoration: underline;
            cursor: pointer;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div id="header">
        <input type="password" id="apiKey" placeholder="输入你的 DeepSeek API Key">
        <button id="saveBtn">保存</button>
        <button class="clear-btn" id="clearChatBtn">清空</button>
    </div>
    <div id="chatBox"></div>
    <div id="inputArea">
        <textarea id="prompt" rows="1" placeholder="输入你的问题..."></textarea>
        <button id="sendBtn">➤</button>
    </div>
    <div class="status-bar" id="statusBar">就绪</div>

    <script>
        // ---- DOM 元素 ----
        const apiKeyInput = document.getElementById('apiKey');
        const saveBtn = document.getElementById('saveBtn');
        const chatBox = document.getElementById('chatBox');
        const promptInput = document.getElementById('prompt');
        const sendBtn = document.getElementById('sendBtn');
        const statusBar = document.getElementById('statusBar');
        const clearChatBtn = document.getElementById('clearChatBtn');

        // ---- 初始化加载本地 Key ----
        const savedKey = localStorage.getItem('deepseek_api_key');
        if (savedKey) apiKeyInput.value = savedKey;

        // ---- 保存 Key ----
        saveBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem('deepseek_api_key', key);
                statusBar.textContent = '✅ Key 已保存至本地';
                setTimeout(() => statusBar.textContent = '就绪', 2000);
            } else {
                alert('请输入有效的 API Key');
            }
        });

        // ---- 清空聊天 ----
        clearChatBtn.addEventListener('click', () => {
            chatBox.innerHTML = '';
            statusBar.textContent = '已清空对话';
        });

        // ---- 发送消息 ----
        async function sendMessage() {
            const apiKey = localStorage.getItem('deepseek_api_key');
            if (!apiKey) {
                alert('请先在顶部输入并保存你的 API Key');
                return;
            }

            const userMsg = promptInput.value.trim();
            if (!userMsg) return;
            promptInput.value = '';
            // 自动调整高度
            promptInput.style.height = 'auto';

            // 显示用户消息
            appendMessage('user', userMsg);

            // 显示占位（loading）
            const assistantDiv = document.createElement('div');
            assistantDiv.className = 'msg assistant';
            assistantDiv.textContent = '🤔 思考中...';
            chatBox.appendChild(assistantDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            sendBtn.disabled = true;
            statusBar.textContent = '⏳ 请求中...';

            try {
                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [
                            { role: 'system', content: '你是一个有用的AI助手，请用简洁清晰的中文回答。' },
                            { role: 'user', content: userMsg }
                        ],
                        stream: false,  // 非流式，兼容性更好
                        max_tokens: 2048
                    })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(`API 错误 (${response.status}): ${errData.error?.message || '请检查 Key 或网络'}`);
                }

                const data = await response.json();
                const reply = data.choices?.[0]?.message?.content || '无回复内容';
                assistantDiv.textContent = reply;
                statusBar.textContent = '✅ 回复成功';

            } catch (error) {
                assistantDiv.textContent = `❌ 出错：${error.message}`;
                assistantDiv.style.color = '#dc2626';
                statusBar.textContent = '⚠️ 请求失败';
            } finally {
                sendBtn.disabled = false;
                chatBox.scrollTop = chatBox.scrollHeight;
                // 恢复状态
                setTimeout(() => {
                    if (statusBar.textContent !== '✅ 回复成功') statusBar.textContent = '就绪';
                }, 3000);
            }
        }

        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.textContent = content;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // ---- 事件绑定 ----
        sendBtn.addEventListener('click', sendMessage);
        promptInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        // 自动伸缩 textarea
        promptInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // 加一个初始欢迎语
        window.onload = () => {
            if (!chatBox.children.length) {
                const welcome = document.createElement('div');
                welcome.className = 'msg assistant';
                welcome.textContent = '👋 你好！输入问题即可开始对话 (Key已保存在本地)';
                chatBox.appendChild(welcome);
            }
        };
    </script>
</body>
</html>
