<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeepSeek V4 创作版</title>
    <style>
        :root {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --bg-input: #f8fafc;
            --bg-msg-user: #4a6cf7;
            --bg-msg-ai: #f1f3f5;
            --text-primary: #0f172a;
            --text-secondary: #1e293b;
            --text-muted: #64748b;
            --border-color: #e9edf2;
            --shadow-color: rgba(0,0,0,0.06);
            --highlight-bg: #fef08a;
            --folder-color: #8b5cf6;
            --font-size-msg: 14px;
        }
        body.dark {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-input: #1c2333;
            --bg-msg-user: #3b5fd9;
            --bg-msg-ai: #2d333b;
            --text-primary: #e6edf3;
            --text-secondary: #c9d1d9;
            --text-muted: #8b949e;
            --border-color: #30363d;
            --shadow-color: rgba(0,0,0,0.4);
            --highlight-bg: #664d00;
            --folder-color: #a78bfa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        /* ---------- 顶部栏（精简） ---------- */
        #topbar {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 10px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        #menuBtn { font-size: 22px; background: none; border: none; cursor: pointer; color: var(--text-primary); padding: 0 4px; }
        #titleArea { flex: 1; text-align: center; font-weight: 600; font-size: 15px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 30%; }
        #modelIndicator { font-size: 11px; font-weight: 600; color: var(--text-muted); background: var(--bg-primary); padding: 2px 8px; border-radius: 20px; border: 1px solid var(--border-color); white-space: nowrap; }
        .topbar-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted); padding: 2px 6px; }
        .topbar-btn:active { color: var(--text-primary); }
        #newChatBtn { font-size: 20px; background: #4a6cf7; color: white; border: none; width: 34px; height: 34px; border-radius: 50%; font-weight: 300; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* ---------- API Key 快捷栏（保留在顶部方便输入） ---------- */
        #keyBar {
            display: flex; gap: 4px; padding: 4px 10px; background: var(--bg-primary); border-bottom: 1px solid var(--border-color); flex-shrink: 0; align-items: center;
        }
        #apiKey { flex: 1; padding: 4px 10px; border: 1px solid var(--border-color); border-radius: 20px; font-size: 11px; background: var(--bg-secondary); color: var(--text-primary); outline: none; }
        #apiKey:focus { border-color: #4a6cf7; }
        #saveKeyBtn { padding: 3px 12px; background: #4a6cf7; color: white; border: none; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; }

        /* ---------- 附件 ---------- */
        #attachmentBar { display: none; gap: 4px; padding: 3px 10px; background: var(--bg-primary); border-bottom: 1px solid var(--border-color); flex-shrink: 0; flex-wrap: wrap; }
        #attachmentBar.show { display: flex; }
        .attach-tag { background: var(--bg-secondary); border-radius: 16px; padding: 1px 8px 1px 12px; font-size: 11px; display: flex; align-items: center; gap: 4px; border: 1px solid var(--border-color); color: var(--text-secondary); }

        /* ---------- 聊天区域 ---------- */
        #chatBox {
            flex: 1; overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 8px;
            background: var(--bg-primary);
        }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 92%; animation: fadeIn 0.2s ease; }
        .msg-wrapper.user { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.assistant { align-self: flex-start; align-items: flex-start; width: 100%; }
        .msg { padding: 8px 12px; border-radius: 16px; line-height: 1.5; word-break: break-word; font-size: var(--font-size-msg); position: relative; white-space: pre-wrap; width: 100%; }
        .user .msg { background: var(--bg-msg-user); color: white; border-bottom-right-radius: 4px; max-width: 100%; }
        .assistant .msg { background: var(--bg-msg-ai); color: var(--text-secondary); border-bottom-left-radius: 4px; max-width: 100%; }
        .msg img { max-width: 100%; border-radius: 6px; margin-top: 3px; max-height: 180px; }
        .cursor-blink::after { content: '▊'; animation: blink 0.9s step-end infinite; color: #4a6cf7; margin-left: 2px; }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
        .msg-actions { display: flex; gap: 6px; margin-top: 3px; font-size: 12px; opacity: 0.7; flex-wrap: wrap; align-items: center; }
        .msg-actions button { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 1px 5px; border-radius: 10px; font-size: 11px; }
        .msg-actions button:active { background: var(--border-color); }
        .version-control { display: inline-flex; align-items: center; gap: 2px; background: var(--bg-primary); border-radius: 14px; padding: 0 4px; border: 1px solid var(--border-color); }
        .version-control button { background: none; border: none; font-size: 12px; cursor: pointer; padding: 0 3px; color: var(--text-muted); }
        .version-control button:active { color: var(--text-primary); }
        .version-control span { font-size: 11px; color: var(--text-muted); min-width: 24px; text-align: center; }
        .reasoning-box { width: 100%; background: var(--bg-primary); border-radius: 10px; padding: 6px 10px; margin-bottom: 4px; border-left: 3px solid #4a6cf7; font-size: calc(var(--font-size-msg) - 2px); color: var(--text-muted); }
        .reasoning-box summary { cursor: pointer; font-weight: 500; color: var(--text-secondary); padding: 2px 0; }
        .reasoning-box summary:active { opacity: 0.6; }
        .reasoning-content { white-space: pre-wrap; margin-top: 4px; padding-top: 4px; border-top: 1px dashed var(--border-color); max-height: 150px; overflow-y: auto; }

        /* ---------- 输入区域（含深度思考开关、字数统计） ---------- */
        #inputArea {
            display: flex; flex-direction: column; gap: 4px;
            padding: 6px 10px 8px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        #inputRow {
            display: flex; gap: 4px; align-items: flex-end;
        }
        #attachBtn { font-size: 20px; background: none; border: none; cursor: pointer; color: var(--text-muted); height: 38px; display: flex; align-items: center; }
        #prompt {
            flex: 1; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 20px;
            font-size: 14px; resize: none; outline: none; background: var(--bg-input); color: var(--text-primary);
            font-family: inherit; min-height: 38px; max-height: 90px; line-height: 1.3;
        }
        #prompt:focus { border-color: #4a6cf7; }
        #deepThinkingInputBtn {
            background: none; border: none; font-size: 18px; cursor: pointer; padding: 0 4px;
            opacity: 0.4; pointer-events: none; transition: 0.2s; height: 38px; display: flex; align-items: center;
        }
        #deepThinkingInputBtn.enabled { opacity: 1; pointer-events: auto; }
        #deepThinkingInputBtn.active { color: #4a6cf7; opacity: 1; }
        #sendBtn { width: 42px; height: 42px; border-radius: 50%; background: #4a6cf7; color: white; border: none; font-size: 18px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        #sendBtn:disabled { opacity: 0.4; pointer-events: none; }
        #stopBtn { width: 42px; height: 42px; border-radius: 50%; background: #ef4444; color: white; border: none; font-size: 14px; cursor: pointer; flex-shrink: 0; display: none; align-items: center; justify-content: center; }
        #stopBtn:active { background: #dc2626; }
        #fileInput { display: none; }

        /* 字数统计 */
        #charCounter {
            font-size: 11px; color: var(--text-muted); text-align: right; padding-right: 4px;
            user-select: none;
        }

        /* ---------- 状态栏 ---------- */
        #statusBar {
            display: flex; justify-content: space-between; padding: 3px 14px; font-size: 10px;
            color: var(--text-muted); background: var(--bg-primary); border-top: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        /* ---------- 抽屉（左侧菜单） ---------- */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; display: none; }
        #overlay.active { display: block; }
        #drawer {
            position: fixed; top: 0; left: -85%; width: 85%; max-width: 360px; height: 100%;
            background: var(--bg-secondary); z-index: 1001; padding: 16px 12px;
            box-shadow: 4px 0 20px var(--shadow-color);
            transition: left 0.25s ease;
            display: flex; flex-direction: column; overflow: hidden;
            color: var(--text-primary);
        }
        #drawer.open { left: 0; }
        #drawerTitle {
            font-size: 18px; font-weight: 700; padding-bottom: 10px; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
        }
        #drawerTitle button { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-muted); }

        /* 设置折叠面板 */
        #settingsPanel {
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        #settingsSummary {
            display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 6px 0;
            font-weight: 600; font-size: 14px; color: var(--text-primary);
            user-select: none;
        }
        #settingsSummary:active { opacity: 0.6; }
        #settingsContent {
            display: none;
            padding: 6px 0 12px 0;
            flex-direction: column;
            gap: 10px;
        }
        #settingsContent.open { display: flex; }
        .setting-row {
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
            font-size: 13px;
        }
        .setting-row label { flex: 1; color: var(--text-secondary); }
        .setting-row input[type="number"] { width: 60px; padding: 4px 6px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-input); color: var(--text-primary); }
        .setting-row select { padding: 4px 8px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-input); color: var(--text-primary); font-size: 13px; }
        .setting-row button { padding: 4px 14px; border: none; border-radius: 8px; background: #4a6cf7; color: white; font-size: 12px; cursor: pointer; }
        .setting-row button:active { background: #3a5cd5; }
        .setting-row .toggle-btn { background: none; border: 1px solid var(--border-color); border-radius: 16px; padding: 2px 12px; font-size: 12px; cursor: pointer; color: var(--text-muted); }
        .setting-row .toggle-btn.active { background: #4a6cf7; color: white; border-color: #4a6cf7; }
        .setting-row .file-input-wrapper { position: relative; overflow: hidden; }
        .setting-row .file-input-wrapper input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        /* 对话列表 */
        #sessionListContainer {
            flex: 1; overflow-y: auto; margin-top: 6px;
        }
        .drawer-section-title {
            font-size: 12px; font-weight: 600; color: var(--text-muted); margin: 8px 0 4px 8px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .folder-item, .session-item {
            display: flex; align-items: center; padding: 8px 10px; border-radius: 10px;
            margin-bottom: 2px; cursor: pointer; background: var(--bg-primary); gap: 6px;
        }
        .folder-item.active, .session-item.active { background: #4a6cf7; color: white; }
        .folder-item.active .session-name, .session-item.active .session-name { color: white; }
        .folder-item .folder-icon { font-size: 16px; margin-right: 2px; }
        .session-name { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        .item-actions { display: flex; gap: 2px; flex-shrink: 0; }
        .item-actions button { background: none; border: none; font-size: 14px; cursor: pointer; color: var(--text-muted); padding: 1px 4px; }
        .item-actions button:active { color: var(--text-primary); }
        .folder-children { padding-left: 20px; border-left: 2px solid var(--border-color); margin-left: 6px; }
        .pinned-badge { font-size: 10px; color: var(--text-muted); margin-left: 4px; }
        .folder-item .session-name { font-weight: 600; color: var(--folder-color); }
        .folder-item.active .session-name { color: white; }

        #newSessionBtn, #newFolderBtn {
            width: 100%; padding: 10px; background: #4a6cf7; color: white; border: none;
            border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 6px; flex-shrink: 0;
        }
        #newFolderBtn { background: var(--folder-color); }

        /* ---------- 导出/搜索模态框 ---------- */
        #exportModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; display: none; justify-content: center; align-items: center; }
        #exportModal.active { display: flex; }
        #exportBox { background: var(--bg-secondary); padding: 24px 20px; border-radius: 20px; max-width: 300px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; color: var(--text-primary); }
        #exportBox h3 { margin-bottom: 14px; font-size: 17px; }
        .export-options { display: flex; flex-direction: column; gap: 10px; }
        .export-options button { padding: 12px; border: none; border-radius: 14px; font-size: 14px; font-weight: 600; cursor: pointer; background: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border-color); }
        .export-options button:active { background: #4a6cf7; color: white; }
        #closeExportBtn { margin-top: 14px; background: none; border: none; color: var(--text-muted); font-size: 13px; cursor: pointer; }

        #searchModal { position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg-secondary);z-index:2000;display:none;flex-direction:column;padding:16px;color:var(--text-primary); }
        #searchModal.active { display: flex; }
        #closeSearchBtn { align-self:flex-end;font-size:24px;background:none;border:none;color:var(--text-muted); }
        #searchInput { width:100%;padding:12px;border:2px solid #4a6cf7;border-radius:28px;font-size:14px;outline:none;margin-bottom:10px;background:var(--bg-input);color:var(--text-primary); }
        #searchResults { flex:1;overflow-y:auto; }
        .search-result-item { padding:12px;border-bottom:1px solid var(--border-color);cursor:pointer; }
        .search-result-item:active { background:var(--bg-primary); }

        #backupFileInput { display: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 480px) {
            .msg-wrapper { max-width: 96%; }
            #drawer { left: -100%; width: 88%; }
            #topbar { gap: 3px; padding: 4px 6px; }
            #titleArea { max-width: 25%; }
            #modelIndicator { font-size: 10px; padding: 1px 6px; }
        }
    </style>
</head>
<body>

    <!-- 顶部栏（精简） -->
    <div id="topbar">
        <button id="menuBtn">☰</button>
        <span id="titleArea">新对话</span>
        <span id="modelIndicator">⚡ 快速</span>
        <button class="topbar-btn" id="searchBtn">🔍</button>
        <button id="newChatBtn">+</button>
    </div>

    <!-- API Key 快捷栏 -->
    <div id="keyBar">
        <input type="password" id="apiKey" placeholder="输入 API Key">
        <button id="saveKeyBtn">保存</button>
    </div>

    <!-- 附件栏 -->
    <div id="attachmentBar"></div>

    <!-- 聊天区域 -->
    <div id="chatBox"></div>

    <!-- 输入区域（含深度思考、字数统计） -->
    <div id="inputArea">
        <div id="inputRow">
            <button id="attachBtn">📎</button>
            <input type="file" id="fileInput" multiple accept="image/*,.pdf,.doc,.docx,.txt,.xls,.xlsx,.ppt,.pptx">
            <textarea id="prompt" rows="1" placeholder="输入问题..."></textarea>
            <button id="deepThinkingInputBtn" title="深度思考 (仅专家模式)">🧠</button>
            <button id="sendBtn">➤</button>
            <button id="stopBtn">⏹</button>
        </div>
        <div id="charCounter">0 字符</div>
    </div>

    <!-- 状态栏 -->
    <div id="statusBar">
        <span id="statusText">就绪</span>
        <span id="tokenCounter">📊 ~0 tokens</span>
    </div>

    <!-- 导出模态框（保留，用于导出当前对话） -->
    <div id="exportModal">
        <div id="exportBox">
            <h3>📤 导出当前对话</h3>
            <div class="export-options">
                <button id="exportAI">🤖 仅导出 AI 回复</button>
                <button id="exportUser">👤 仅导出我的提问</button>
                <button id="exportAll">📋 导出全部</button>
            </div>
            <button id="closeExportBtn">取消</button>
        </div>
    </div>

    <!-- 搜索模态框 -->
    <div id="searchModal">
        <button id="closeSearchBtn">✕</button>
        <input type="text" id="searchInput" placeholder="搜索所有对话...">
        <div id="searchResults"></div>
    </div>

    <!-- 遮罩 -->
    <div id="overlay"></div>

    <!-- 左侧抽屉 -->
    <div id="drawer">
        <div id="drawerTitle">
            <span>📂 我的对话</span>
            <button id="closeDrawerBtn">✕</button>
        </div>

        <!-- 设置面板（折叠） -->
        <div id="settingsPanel">
            <div id="settingsSummary">
                <span>⚙️ 设置</span>
                <span id="settingsArrow">▸</span>
            </div>
            <div id="settingsContent">
                <!-- 深色/浅色 -->
                <div class="setting-row">
                    <label>🌓 深色模式</label>
                    <button id="settingsDarkToggle" class="toggle-btn">关闭</button>
                </div>
                <!-- 模型模式 -->
                <div class="setting-row">
                    <label>🧠 模型模式</label>
                    <select id="settingsModeSelect">
                        <option value="flash">快速 (Flash)</option>
                        <option value="pro">专家 (Pro)</option>
                    </select>
                </div>
                <!-- API Key（快捷栏已有，但设置中也放一个方便） -->
                <div class="setting-row">
                    <label>🔑 API Key</label>
                    <input type="password" id="settingsApiKey" placeholder="输入 Key" style="flex:1; padding:4px 8px; border:1px solid var(--border-color); border-radius:8px; background:var(--bg-input); color:var(--text-primary);">
                </div>
                <!-- 字号 -->
                <div class="setting-row">
                    <label>🔤 字号 (px)</label>
                    <input type="number" id="settingsFontSize" value="14" min="12" max="24" step="1">
                </div>
                <!-- 记忆摘要 -->
                <div class="setting-row">
                    <label>📋 记忆摘要</label>
                    <select id="settingsMemoryMode">
                        <option value="full">全量发送</option>
                        <option value="window">滑动窗口 (最近20条)</option>
                    </select>
                </div>
                <!-- 显示思考过程 -->
                <div class="setting-row">
                    <label>📝 显示思考过程</label>
                    <button id="settingsShowReasoning" class="toggle-btn active">显示</button>
                </div>
                <!-- 备份 / 恢复 -->
                <div class="setting-row">
                    <label>💾 备份数据</label>
                    <button id="settingsBackupBtn">备份</button>
                </div>
                <div class="setting-row">
                    <label>📂 恢复数据</label>
                    <div class="file-input-wrapper">
                        <button id="settingsRestoreBtn">选择文件</button>
                        <input type="file" id="settingsBackupFileInput" accept=".json">
                    </div>
                </div>
            </div>
        </div>

        <!-- 对话列表 -->
        <div id="sessionListContainer"></div>

        <!-- 新建按钮 -->
        <button id="newSessionBtn">➕ 新对话</button>
        <button id="newFolderBtn">📁 新建文件夹</button>
    </div>

    <script>
        // ============================================================
        //  数据层
        // ============================================================
        let sessions = [];
        let folders = [];
        let currentId = null;
        let currentKey = '';
        let pendingAttachments = [];
        let isStreaming = false;
        let abortController = null;

        // 状态变量（设置）
        let mode = 'flash';           // 'flash' | 'pro'
        let deepThinking = false;     // 仅专家模式有效
        let showReasoning = true;
        let fontSize = 14;
        let memoryMode = 'full';      // 'full' | 'window'

        const STORAGE_SESSIONS_KEY = 'deepseek_sessions_v4';
        const STORAGE_FOLDERS_KEY = 'deepseek_folders_v4';
        const KEY_STORAGE = 'deepseek_api_key';
        const THEME_KEY = 'deepseek_theme';
        const MODE_KEY = 'deepseek_mode';
        const DEEP_THINKING_KEY = 'deepseek_deep_thinking';
        const SHOW_REASONING_KEY = 'deepseek_show_reasoning';
        const FONT_SIZE_KEY = 'deepseek_font_size';
        const MEMORY_MODE_KEY = 'deepseek_memory_mode';

        // DOM 引用
        const chatBox = document.getElementById('chatBox');
        const promptInput = document.getElementById('prompt');
        const sendBtn = document.getElementById('sendBtn');
        const stopBtn = document.getElementById('stopBtn');
        const apiKeyInput = document.getElementById('apiKey');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const titleArea = document.getElementById('titleArea');
        const modelIndicator = document.getElementById('modelIndicator');
        const menuBtn = document.getElementById('menuBtn');
        const newChatBtn = document.getElementById('newChatBtn');
        const drawer = document.getElementById('drawer');
        const overlay = document.getElementById('overlay');
        const sessionListContainer = document.getElementById('sessionListContainer');
        const newSessionBtn = document.getElementById('newSessionBtn');
        const newFolderBtn = document.getElementById('newFolderBtn');
        const closeDrawerBtn = document.getElementById('closeDrawerBtn');
        const attachBtn = document.getElementById('attachBtn');
        const fileInput = document.getElementById('fileInput');
        const attachmentBar = document.getElementById('attachmentBar');
        const statusText = document.getElementById('statusText');
        const tokenCounter = document.getElementById('tokenCounter');
        const searchBtn = document.getElementById('searchBtn');
        const searchModal = document.getElementById('searchModal');
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        const closeSearchBtn = document.getElementById('closeSearchBtn');
        const exportBtn = document.getElementById('exportBtn'); // 顶部已移除，但保留用于模态框
        const exportModal = document.getElementById('exportModal');
        const closeExportBtn = document.getElementById('closeExportBtn');
        const exportAI = document.getElementById('exportAI');
        const exportUser = document.getElementById('exportUser');
        const exportAll = document.getElementById('exportAll');
        const charCounter = document.getElementById('charCounter');
        const deepThinkingInputBtn = document.getElementById('deepThinkingInputBtn');

        // 设置面板元素
        const settingsSummary = document.getElementById('settingsSummary');
        const settingsContent = document.getElementById('settingsContent');
        const settingsArrow = document.getElementById('settingsArrow');
        const settingsDarkToggle = document.getElementById('settingsDarkToggle');
        const settingsModeSelect = document.getElementById('settingsModeSelect');
        const settingsApiKey = document.getElementById('settingsApiKey');
        const settingsFontSize = document.getElementById('settingsFontSize');
        const settingsMemoryMode = document.getElementById('settingsMemoryMode');
        const settingsShowReasoning = document.getElementById('settingsShowReasoning');
        const settingsBackupBtn = document.getElementById('settingsBackupBtn');
        const settingsRestoreBtn = document.getElementById('settingsRestoreBtn');
        const settingsBackupFileInput = document.getElementById('settingsBackupFileInput');

        // ============================================================
        //  工具函数
        // ============================================================
        function generateId() { return Date.now() + '_' + Math.random().toString(36).slice(2, 7); }

        function saveSessions() {
            localStorage.setItem(STORAGE_SESSIONS_KEY, JSON.stringify(sessions));
            localStorage.setItem(STORAGE_FOLDERS_KEY, JSON.stringify(folders));
            updateTokenCounter();
        }

        function getCurrentSession() { return sessions.find(s => s.id === currentId) || sessions[0]; }

        // ============================================================
        //  加载数据 & 设置
        // ============================================================
        function loadData() {
            // Key
            const savedKey = localStorage.getItem(KEY_STORAGE);
            if (savedKey) { currentKey = savedKey; apiKeyInput.value = savedKey; settingsApiKey.value = savedKey; }
            // Theme
            const theme = localStorage.getItem(THEME_KEY);
            if (theme === 'dark') { document.body.classList.add('dark'); settingsDarkToggle.textContent = '开启'; }
            else { settingsDarkToggle.textContent = '关闭'; }
            // Mode
            const savedMode = localStorage.getItem(MODE_KEY);
            if (savedMode === 'pro' || savedMode === 'flash') mode = savedMode;
            modeSelect.value = mode;
            settingsModeSelect.value = mode;
            updateModeUI();
            // Deep Thinking
            const dt = localStorage.getItem(DEEP_THINKING_KEY);
            if (dt === 'true') deepThinking = true;
            updateDeepThinkingUI();
            // Show Reasoning
            const sr = localStorage.getItem(SHOW_REASONING_KEY);
            if (sr === 'false') showReasoning = false;
            updateShowReasoningUI();
            // Font Size
            const fs = localStorage.getItem(FONT_SIZE_KEY);
            if (fs) { fontSize = parseInt(fs); if (isNaN(fontSize) || fontSize < 12) fontSize = 14; }
            settingsFontSize.value = fontSize;
            document.documentElement.style.setProperty('--font-size-msg', fontSize + 'px');
            // Memory Mode
            const mm = localStorage.getItem(MEMORY_MODE_KEY);
            if (mm === 'window' || mm === 'full') memoryMode = mm;
            settingsMemoryMode.value = memoryMode;

            // Folders
            const rawFolders = localStorage.getItem(STORAGE_FOLDERS_KEY);
            if (rawFolders) { try { folders = JSON.parse(rawFolders); } catch { folders = []; } }
            // Sessions
            const rawSessions = localStorage.getItem(STORAGE_SESSIONS_KEY);
            if (rawSessions) { try { sessions = JSON.parse(rawSessions); } catch { sessions = []; } }
            if (!sessions.length) {
                sessions.push({ id: generateId(), name: '新对话', messages: [], folderId: null, pinned: false });
                saveSessions();
            }
            const active = sessions.find(s => s.active) || sessions[0];
            currentId = active.id;
            sessions.forEach(s => delete s.active);
            const cur = sessions.find(s => s.id === currentId);
            if (cur) cur.active = true;
            saveSessions();
        }

        function saveSetting(key, value) { localStorage.setItem(key, value); }

        // ============================================================
        //  UI 更新函数
        // ============================================================
        function updateModeUI() {
            if (mode === 'flash') {
                modelIndicator.textContent = '⚡ 快速';
                deepThinkingInputBtn.classList.remove('enabled');
                deepThinkingInputBtn.classList.remove('active');
                deepThinkingInputBtn.style.opacity = '0.4';
                deepThinkingInputBtn.style.pointerEvents = 'none';
            } else {
                modelIndicator.textContent = '🧠 专家';
                deepThinkingInputBtn.classList.add('enabled');
                deepThinkingInputBtn.style.opacity = '1';
                deepThinkingInputBtn.style.pointerEvents = 'auto';
                if (deepThinking) deepThinkingInputBtn.classList.add('active');
                else deepThinkingInputBtn.classList.remove('active');
            }
            settingsModeSelect.value = mode;
        }

        function updateDeepThinkingUI() {
            if (mode === 'pro') {
                if (deepThinking) {
                    deepThinkingInputBtn.classList.add('active');
                    deepThinkingInputBtn.textContent = '🧠';
                } else {
                    deepThinkingInputBtn.classList.remove('active');
                    deepThinkingInputBtn.textContent = '🧠';
                }
            }
        }

        function updateShowReasoningUI() {
            if (showReasoning) {
                settingsShowReasoning.textContent = '显示';
                settingsShowReasoning.classList.add('active');
            } else {
                settingsShowReasoning.textContent = '隐藏';
                settingsShowReasoning.classList.remove('active');
            }
        }

        function updateTokenCounter() {
            const session = getCurrentSession();
            if (!session) { tokenCounter.textContent = '📊 ~0 tokens'; return; }
            let total = 0;
            session.messages.forEach(m => {
                total += estimateTokens(m.content || '');
                if (m.images) total += 50;
                if (m.reasoning) total += estimateTokens(m.reasoning);
            });
            tokenCounter.textContent = `📊 ~${total} tokens`;
        }

        function estimateTokens(text) { if (!text) return 0; return Math.ceil(text.length / 1.8); }

        // ============================================================
        //  渲染聊天 (支持字号)
        // ============================================================
        function renderChat() {
            const session = getCurrentSession();
            if (!session) return;
            titleArea.textContent = session.name || '未命名';
            chatBox.innerHTML = '';

            const msgs = session.messages || [];
            if (msgs.length === 0) {
                const wrap = document.createElement('div');
                wrap.className = 'msg-wrapper assistant';
                wrap.innerHTML = `<div class="msg">👋 开始新对话吧！支持上传图片和文档。</div>`;
                chatBox.appendChild(wrap);
            } else {
                for (let i = 0; i < msgs.length; i++) {
                    const msg = msgs[i];
                    if (msg._loading && !msg.content && !msg.reasoning) continue;
                    const wrap = document.createElement('div');
                    wrap.className = `msg-wrapper ${msg.role}`;
                    wrap.dataset.index = i;

                    if (msg.role === 'assistant' && msg.reasoning && showReasoning) {
                        const details = document.createElement('details');
                        details.className = 'reasoning-box';
                        details.open = false;
                        const summary = document.createElement('summary');
                        summary.textContent = '🧠 思考过程 (点击展开)';
                        details.appendChild(summary);
                        const contentDiv = document.createElement('div');
                        contentDiv.className = 'reasoning-content';
                        contentDiv.textContent = msg.reasoning;
                        details.appendChild(contentDiv);
                        wrap.appendChild(details);
                    }

                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'msg';
                    if (msg.role === 'user' && msg.images && msg.images.length) {
                        const textSpan = document.createElement('div');
                        textSpan.textContent = msg.content || '📷 图片';
                        msgDiv.appendChild(textSpan);
                        msg.images.forEach(imgData => {
                            const img = document.createElement('img');
                            img.src = imgData;
                            msgDiv.appendChild(img);
                        });
                    } else {
                        msgDiv.textContent = msg.content || '(空消息)';
                    }
                    wrap.appendChild(msgDiv);

                    const actions = document.createElement('div');
                    actions.className = 'msg-actions';

                    if (msg.role === 'user' && msg.history && msg.history.length > 0) {
                        const verControl = createVersionControl(msg, i);
                        actions.appendChild(verControl);
                    }

                    if (msg.role === 'user') {
                        const editBtn = document.createElement('button');
                        editBtn.textContent = '✏️ 编辑';
                        editBtn.addEventListener('click', (e) => { e.stopPropagation(); editUserMessage(i); });
                        actions.appendChild(editBtn);
                    }

                    if (msg.role === 'assistant' && !msg._loading) {
                        const regenBtn = document.createElement('button');
                        regenBtn.textContent = '🔄 重新生成';
                        regenBtn.addEventListener('click', (e) => { e.stopPropagation(); regenerateMessage(i); });
                        actions.appendChild(regenBtn);
                    }

                    if (actions.children.length > 0) wrap.appendChild(actions);
                    chatBox.appendChild(wrap);
                }
            }
            chatBox.scrollTop = chatBox.scrollHeight;
            renderDrawer();
            updateTokenCounter();
        }

        function createVersionControl(msg, msgIndex) {
            const container = document.createElement('span');
            container.className = 'version-control';
            const leftBtn = document.createElement('button');
            leftBtn.textContent = '◀';
            leftBtn.addEventListener('click', (e) => { e.stopPropagation(); changeVersion(msgIndex, -1); });
            const rightBtn = document.createElement('button');
            rightBtn.textContent = '▶';
            rightBtn.addEventListener('click', (e) => { e.stopPropagation(); changeVersion(msgIndex, 1); });
            const label = document.createElement('span');
            const total = (msg.history ? msg.history.length : 0) + 1;
            const current = msg.historyIndex !== undefined ? msg.historyIndex : 0;
            label.textContent = `${current+1}/${total}`;
            container.appendChild(leftBtn); container.appendChild(label); container.appendChild(rightBtn);
            return container;
        }

        function changeVersion(userMsgIndex, direction) {
            const session = getCurrentSession();
            if (!session) return;
            const msg = session.messages[userMsgIndex];
            if (!msg || msg.role !== 'user') return;
            if (!msg.history || msg.history.length === 0) return;
            let idx = msg.historyIndex !== undefined ? msg.historyIndex : 0;
            const total = msg.history.length + 1;
            idx = (idx + direction + total) % total;
            msg.historyIndex = idx;
            if (idx === 0) { /* current */ } else {
                const histItem = msg.history[idx - 1];
                if (histItem) {
                    msg.content = histItem.user;
                    let assistantIdx = userMsgIndex + 1;
                    while (assistantIdx < session.messages.length && session.messages[assistantIdx].role !== 'assistant') assistantIdx++;
                    if (assistantIdx < session.messages.length) session.messages[assistantIdx].content = histItem.assistant;
                }
            }
            saveSessions();
            renderChat();
        }

        // ============================================================
        //  编辑 & 重新生成 (沿用)
        // ============================================================
        function editUserMessage(index) {
            const session = getCurrentSession();
            if (!session) return;
            const msg = session.messages[index];
            if (!msg || msg.role !== 'user') return;
            const newText = prompt('修改你的消息：', msg.content);
            if (newText === null || newText.trim() === '') return;

            let assistantIdx = index + 1;
            let assistantMsg = null;
            while (assistantIdx < session.messages.length && session.messages[assistantIdx].role !== 'assistant') assistantIdx++;
            if (assistantIdx < session.messages.length) assistantMsg = session.messages[assistantIdx];

            if (!msg.history) msg.history = [];
            if (msg.content && (!msg.history.length || msg.history[msg.history.length-1].user !== msg.content)) {
                msg.history.push({ user: msg.content, assistant: assistantMsg ? assistantMsg.content : '' });
            }
            msg.content = newText.trim();
            session.messages = session.messages.slice(0, index + 1);
            msg.historyIndex = 0;
            saveSessions();
            renderChat();
            promptInput.value = newText.trim();
            promptInput.focus();
            statusText.textContent = '消息已修改，按发送键重新生成';
        }

        async function regenerateMessage(index) {
            const session = getCurrentSession();
            if (!session) return;
            const msg = session.messages[index];
            if (!msg || msg.role !== 'assistant') return;
            let userIdx = index - 1;
            let userMsg = null;
            while (userIdx >= 0 && session.messages[userIdx].role !== 'user') userIdx--;
            if (userIdx < 0) { alert('找不到对应的用户消息'); return; }
            userMsg = session.messages[userIdx];

            const key = localStorage.getItem(KEY_STORAGE);
            if (!key) { alert('请先保存 API Key'); return; }

            if (!userMsg.history) userMsg.history = [];
            const lastHist = userMsg.history.length ? userMsg.history[userMsg.history.length-1] : null;
            if (!lastHist || lastHist.user !== userMsg.content || lastHist.assistant !== msg.content) {
                userMsg.history.push({ user: userMsg.content, assistant: msg.content });
            }
            userMsg.historyIndex = 0;

            session.messages = session.messages.slice(0, index);
            const loadingMsg = { role: 'assistant', content: '🤔 重新生成中...', _loading: true };
            session.messages.push(loadingMsg);
            saveSessions();
            renderChat();

            try {
                const history = session.messages.slice(0, index);
                const model = mode === 'flash' ? 'deepseek-v4-flash' : 'deepseek-v4-pro';
                const requestBody = {
                    model: model,
                    messages: history.map(m => ({ role: m.role, content: m.content })),
                    stream: false,
                    max_tokens: 4096
                };
                if (mode === 'pro' && deepThinking) requestBody.reasoning_effort = 'high';
                else if (mode === 'pro') requestBody.reasoning_effort = 'low';

                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify(requestBody)
                });
                if (!response.ok) throw new Error('API Error');
                const data = await response.json();
                const reply = data.choices?.[0]?.message?.content || '无回复';
                session.messages.pop();
                session.messages.push({ role: 'assistant', content: reply });
                saveSessions();
                renderChat();
                statusText.textContent = '✅ 重新生成完成';
            } catch (e) {
                session.messages.pop();
                session.messages.push({ role: 'assistant', content: `❌ 失败: ${e.message}` });
                saveSessions();
                renderChat();
            }
        }

        // ============================================================
        //  发送消息 (支持记忆摘要)
        // ============================================================
        async function sendMessage() {
            if (isStreaming) return;
            const key = localStorage.getItem(KEY_STORAGE);
            if (!key) { alert('请先保存 API Key'); return; }
            const text = promptInput.value.trim();
            if (!text && pendingAttachments.length === 0) { alert('请输入问题或上传文件'); return; }

            const session = getCurrentSession();
            if (!session) { createNewSession(); }

            let userContent = text || '请分析上传的文件内容';
            const images = [], fileIds = [];
            for (const att of pendingAttachments) {
                if (att.type === 'image') images.push(att.data);
                else if (att.type === 'file') fileIds.push(att.data);
            }
            let finalUserMsg;
            if (images.length > 0) {
                const contentArray = [{ type: 'text', text: userContent }];
                images.forEach(img => contentArray.push({ type: 'image_url', image_url: { url: img } }));
                finalUserMsg = contentArray;
            } else {
                finalUserMsg = userContent;
            }

            const localMsg = { role: 'user', content: text || '📎 文件上传请求' };
            if (images.length > 0) localMsg.images = images;
            session.messages.push(localMsg);
            saveSessions();
            renderChat();

            promptInput.value = '';
            promptInput.style.height = 'auto';
            pendingAttachments = [];
            renderAttachmentBar();
            sendBtn.disabled = true;
            stopBtn.style.display = 'flex';
            isStreaming = true;
            statusText.textContent = '⏳ 流式生成中...';
            abortController = new AbortController();

            const aiMsgIndex = session.messages.length;
            session.messages.push({ role: 'assistant', content: '', reasoning: '', _loading: true });
            saveSessions();

            // 构建显示用的 DOM
            const wrap = document.createElement('div');
            wrap.className = 'msg-wrapper assistant';
            let details = null, reasoningDiv = null, summary = null;
            if (showReasoning) {
                details = document.createElement('details');
                details.className = 'reasoning-box';
                details.open = false;
                summary = document.createElement('summary');
                summary.textContent = '🧠 思考过程中...';
                details.appendChild(summary);
                reasoningDiv = document.createElement('div');
                reasoningDiv.className = 'reasoning-content';
                reasoningDiv.textContent = '';
                details.appendChild(reasoningDiv);
                wrap.appendChild(details);
            }
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg';
            msgDiv.textContent = '';
            msgDiv.classList.add('cursor-blink');
            wrap.appendChild(msgDiv);
            chatBox.appendChild(wrap);
            chatBox.scrollTop = chatBox.scrollHeight;

            let fullReasoning = '', fullContent = '';

            try {
                // 根据记忆摘要模式构建消息列表
                let apiMessages;
                if (memoryMode === 'window') {
                    // 只取最近20条消息（包括当前用户消息之前的所有消息，但截取最后20条）
                    const allMsgs = session.messages.filter(m => !m._loading && m.content);
                    // 排除当前刚加入的用户消息（已经在 allMsgs 中），但我们要取包括当前用户消息在内的最近20条
                    // 当前用户消息是最后一条，我们取最后20条
                    const recent = allMsgs.slice(-20);
                    apiMessages = recent.map(m => ({ role: m.role, content: m.content }));
                } else {
                    // 全量发送
                    apiMessages = session.messages.filter(m => !m._loading && m.content).map(m => ({ role: m.role, content: m.content }));
                }

                const model = mode === 'flash' ? 'deepseek-v4-flash' : 'deepseek-v4-pro';
                const requestBody = {
                    model: model,
                    messages: apiMessages,
                    stream: true,
                    max_tokens: 4096
                };
                if (mode === 'pro' && deepThinking) requestBody.reasoning_effort = 'high';
                else if (mode === 'pro') requestBody.reasoning_effort = 'low';
                if (fileIds.length > 0) requestBody.file_ids = fileIds;

                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify(requestBody),
                    signal: abortController.signal
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(`API错误(${response.status}): ${errData.error?.message || '请检查Key'}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const payload = line.slice(6).trim();
                            if (payload === '[DONE]') continue;
                            try {
                                const json = JSON.parse(payload);
                                const delta = json.choices?.[0]?.delta;
                                if (delta) {
                                    if (delta.reasoning_content && showReasoning && reasoningDiv) {
                                        fullReasoning += delta.reasoning_content;
                                        reasoningDiv.textContent = fullReasoning;
                                        reasoningDiv.scrollTop = reasoningDiv.scrollHeight;
                                        if (details && !details.open) { details.open = true; if (summary) summary.textContent = '🧠 思考过程 (点击折叠)'; }
                                    }
                                    if (delta.content) {
                                        fullContent += delta.content;
                                        msgDiv.textContent = fullContent;
                                        chatBox.scrollTop = chatBox.scrollHeight;
                                    }
                                }
                            } catch (e) {}
                        }
                    }
                }

                const savedMsg = session.messages[aiMsgIndex];
                if (savedMsg) {
                    savedMsg.content = fullContent || '(空回复)';
                    savedMsg.reasoning = showReasoning ? fullReasoning : '';
                    savedMsg._loading = false;
                }
                saveSessions();
                if (details && summary && fullReasoning) summary.textContent = '🧠 思考过程 (点击折叠)';
                msgDiv.classList.remove('cursor-blink');
                renderChat();
                statusText.textContent = '✅ 回复完成';

            } catch (error) {
                if (error.name === 'AbortError') {
                    const savedMsg = session.messages[aiMsgIndex];
                    if (savedMsg) {
                        savedMsg.content = fullContent || '(已停止)';
                        savedMsg.reasoning = showReasoning ? fullReasoning : '';
                        savedMsg._loading = false;
                    }
                    saveSessions();
                    renderChat();
                    statusText.textContent = '⏹ 已停止生成';
                } else {
                    session.messages.pop();
                    session.messages.push({ role: 'assistant', content: `❌ 出错：${error.message}`, reasoning: showReasoning ? (fullReasoning || '出错前思考') : '' });
                    saveSessions();
                    renderChat();
                    statusText.textContent = '⚠️ 请求失败';
                }
            } finally {
                sendBtn.disabled = false;
                stopBtn.style.display = 'none';
                isStreaming = false;
                abortController = null;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        stopBtn.addEventListener('click', () => {
            if (abortController) { abortController.abort(); statusText.textContent = '⏹ 正在停止...'; }
        });

        // ============================================================
        //  附件管理
        // ============================================================
        function renderAttachmentBar() {
            attachmentBar.innerHTML = '';
            if (pendingAttachments.length === 0) { attachmentBar.classList.remove('show'); return; }
            attachmentBar.classList.add('show');
            pendingAttachments.forEach((att, index) => {
                const tag = document.createElement('span');
                tag.className = 'attach-tag';
                const icon = att.type === 'image' ? '🖼️' : '📄';
                tag.innerHTML = `${icon} ${att.name}`;
                const removeBtn = document.createElement('button');
                removeBtn.textContent = '✕';
                removeBtn.style.background = 'none';
                removeBtn.style.border = 'none';
                removeBtn.style.cursor = 'pointer';
                removeBtn.addEventListener('click', () => {
                    pendingAttachments.splice(index, 1);
                    renderAttachmentBar();
                });
                tag.appendChild(removeBtn);
                attachmentBar.appendChild(tag);
            });
        }

        attachBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            fileInput.value = '';
            for (const file of files) {
                const isImage = file.type.startsWith('image/');
                if (isImage) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        pendingAttachments.push({ type: 'image', data: ev.target.result, name: file.name });
                        renderAttachmentBar();
                    };
                    reader.readAsDataURL(file);
                } else {
                    try {
                        const key = localStorage.getItem(KEY_STORAGE);
                        if (!key) { alert('请先保存 API Key'); return; }
                        const formData = new FormData();
                        formData.append('file', file);
                        formData.append('purpose', 'file-extract');
                        const uploadRes = await fetch('https://api.deepseek.com/files', {
                            method: 'POST', headers: { 'Authorization': `Bearer ${key}` }, body: formData
                        });
                        if (!uploadRes.ok) {
                            const err = await uploadRes.json().catch(() => ({}));
                            throw new Error(`上传失败 (${uploadRes.status})`);
                        }
                        const result = await uploadRes.json();
                        pendingAttachments.push({ type: 'file', data: result.id, name: file.name });
                        renderAttachmentBar();
                    } catch (err) { alert(`文档上传出错：${err.message}`); }
                }
            }
        });

        // ============================================================
        //  文件夹 & 会话管理
        // ============================================================
        function createFolder() {
            const name = prompt('请输入文件夹名称：', '新文件夹');
            if (!name || name.trim() === '') return;
            const folder = { id: generateId(), name: name.trim(), pinned: false };
            folders.push(folder);
            saveSessions();
            renderDrawer();
        }

        function renameFolder(folderId) {
            const folder = folders.find(f => f.id === folderId);
            if (!folder) return;
            const newName = prompt('重命名文件夹：', folder.name);
            if (newName && newName.trim() !== '') {
                folder.name = newName.trim();
                saveSessions();
                renderDrawer();
            }
        }

        function toggleFolderPin(folderId) {
            const folder = folders.find(f => f.id === folderId);
            if (folder) { folder.pinned = !folder.pinned; saveSessions(); renderDrawer(); }
        }

        function deleteFolder(folderId) {
            const folder = folders.find(f => f.id === folderId);
            if (!folder) return;
            const confirmText = prompt(`⚠️ 确定要删除文件夹“${folder.name}”吗？\n其中的对话将移至“未分类”。\n请输入“确认删除”以继续：`);
            if (confirmText !== '确认删除') { alert('删除已取消'); return; }
            sessions.forEach(s => { if (s.folderId === folderId) s.folderId = null; });
            folders = folders.filter(f => f.id !== folderId);
            saveSessions();
            renderDrawer();
        }

        function toggleSessionPin(sessionId) {
            const session = sessions.find(s => s.id === sessionId);
            if (session) { session.pinned = !session.pinned; saveSessions(); renderDrawer(); }
        }

        function deleteSessionWithConfirm(sessionId) {
            const session = sessions.find(s => s.id === sessionId);
            if (!session) return;
            if (sessions.length <= 1) { alert('至少保留一个对话'); return; }
            const confirmText = prompt(`⚠️ 确定要删除对话“${session.name}”吗？\n请输入“确认删除”以继续：`);
            if (confirmText !== '确认删除') { alert('删除已取消'); return; }
            sessions = sessions.filter(s => s.id !== sessionId);
            if (currentId === sessionId) { currentId = sessions[0].id; sessions[0].active = true; }
            saveSessions();
            renderChat();
            renderDrawer();
        }

        function moveSessionToFolder(sessionId, folderId) {
            const session = sessions.find(s => s.id === sessionId);
            if (session) { session.folderId = folderId; saveSessions(); renderDrawer(); }
        }

        // 导出单个对话（新增）
        function exportSingleSession(sessionId) {
            const session = sessions.find(s => s.id === sessionId);
            if (!session) return;
            if (!session.messages.length) { alert('该对话为空，无法导出'); return; }
            let text = `导出时间: ${new Date().toLocaleString()}\n对话: ${session.name}\n${'='.repeat(30)}\n\n`;
            session.messages.forEach(m => {
                const label = m.role === 'user' ? '👤 我' : '🤖 AI';
                text += `[${label}]\n${m.content}\n\n---\n\n`;
            });
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${session.name}_${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(a.href);
        }

        // ============================================================
        //  渲染抽屉（含导出按钮、设置折叠）
        // ============================================================
        function renderDrawer() {
            sessionListContainer.innerHTML = '';

            const currentSessionId = currentId;
            const pinnedFolders = folders.filter(f => f.pinned);
            const unpinnedFolders = folders.filter(f => !f.pinned);
            const pinnedSessions = sessions.filter(s => s.pinned && !s.folderId);
            const unpinnedSessions = sessions.filter(s => !s.pinned && !s.folderId);

            function createSessionItem(session) {
                const div = document.createElement('div');
                div.className = 'session-item' + (session.id === currentSessionId ? ' active' : '');
                const nameSpan = document.createElement('span');
                nameSpan.className = 'session-name';
                nameSpan.textContent = session.name || '未命名';
                if (session.pinned) {
                    const badge = document.createElement('span');
                    badge.className = 'pinned-badge';
                    badge.textContent = '📌';
                    nameSpan.appendChild(badge);
                }
                const actions = document.createElement('div');
                actions.className = 'item-actions';

                // 导出按钮
                const exportBtn = document.createElement('button');
                exportBtn.textContent = '📤';
                exportBtn.title = '导出此对话';
                exportBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    exportSingleSession(session.id);
                });
                actions.appendChild(exportBtn);

                const moveBtn = document.createElement('button');
                moveBtn.textContent = '📂';
                moveBtn.title = '移动到文件夹';
                moveBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const folderOptions = folders.map(f => `${f.name} (${f.id})`).join('\n');
                    const choice = prompt(`选择目标文件夹 (输入文件夹ID，留空则移到未分类)：\n${folderOptions}\n\n当前对话: ${session.name}`);
                    if (choice === null) return;
                    const targetFolder = folders.find(f => f.id === choice.trim());
                    moveSessionToFolder(session.id, targetFolder ? targetFolder.id : null);
                });
                actions.appendChild(moveBtn);

                const pinBtn = document.createElement('button');
                pinBtn.textContent = session.pinned ? '📌' : '📍';
                pinBtn.title = '切换置顶';
                pinBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleSessionPin(session.id); });
                actions.appendChild(pinBtn);

                const delBtn = document.createElement('button');
                delBtn.textContent = '🗑️';
                delBtn.title = '删除对话';
                delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteSessionWithConfirm(session.id); });
                actions.appendChild(delBtn);

                div.appendChild(nameSpan);
                div.appendChild(actions);
                div.addEventListener('click', () => { switchSession(session.id); });
                return div;
            }

            function createFolderItem(folder) {
                const container = document.createElement('div');
                container.className = 'folder-container';

                const folderDiv = document.createElement('div');
                folderDiv.className = 'folder-item';
                const icon = document.createElement('span');
                icon.className = 'folder-icon';
                icon.textContent = '📁';
                const nameSpan = document.createElement('span');
                nameSpan.className = 'session-name';
                nameSpan.textContent = folder.name;
                if (folder.pinned) {
                    const badge = document.createElement('span');
                    badge.className = 'pinned-badge';
                    badge.textContent = '📌';
                    nameSpan.appendChild(badge);
                }
                const actions = document.createElement('div');
                actions.className = 'item-actions';
                const renameBtn = document.createElement('button');
                renameBtn.textContent = '✏️';
                renameBtn.title = '重命名文件夹';
                renameBtn.addEventListener('click', (e) => { e.stopPropagation(); renameFolder(folder.id); });
                actions.appendChild(renameBtn);
                const pinBtn = document.createElement('button');
                pinBtn.textContent = folder.pinned ? '📌' : '📍';
                pinBtn.title = '切换置顶';
                pinBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleFolderPin(folder.id); });
                actions.appendChild(pinBtn);
                const delBtn = document.createElement('button');
                delBtn.textContent = '🗑️';
                delBtn.title = '删除文件夹';
                delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteFolder(folder.id); });
                actions.appendChild(delBtn);

                folderDiv.appendChild(icon);
                folderDiv.appendChild(nameSpan);
                folderDiv.appendChild(actions);
                container.appendChild(folderDiv);

                const childSessions = sessions.filter(s => s.folderId === folder.id);
                if (childSessions.length > 0) {
                    const childrenDiv = document.createElement('div');
                    childrenDiv.className = 'folder-children';
                    const sorted = [...childSessions].sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));
                    sorted.forEach(s => { childrenDiv.appendChild(createSessionItem(s)); });
                    container.appendChild(childrenDiv);
                } else {
                    const empty = document.createElement('div');
                    empty.style.cssText = 'color:var(--text-muted);font-size:12px;padding:4px 12px;';
                    empty.textContent = '（空文件夹）';
                    container.appendChild(empty);
                }
                return container;
            }

            // 置顶
            if (pinnedFolders.length) {
                const title = document.createElement('div');
                title.className = 'drawer-section-title';
                title.textContent = '📌 置顶文件夹';
                sessionListContainer.appendChild(title);
                pinnedFolders.forEach(f => { sessionListContainer.appendChild(createFolderItem(f)); });
            }
            if (pinnedSessions.length) {
                const title = document.createElement('div');
                title.className = 'drawer-section-title';
                title.textContent = '📌 置顶对话';
                sessionListContainer.appendChild(title);
                pinnedSessions.forEach(s => { sessionListContainer.appendChild(createSessionItem(s)); });
            }
            if (unpinnedFolders.length) {
                const title = document.createElement('div');
                title.className = 'drawer-section-title';
                title.textContent = '📁 文件夹';
                sessionListContainer.appendChild(title);
                unpinnedFolders.forEach(f => { sessionListContainer.appendChild(createFolderItem(f)); });
            }
            if (unpinnedSessions.length) {
                const title = document.createElement('div');
                title.className = 'drawer-section-title';
                title.textContent = '💬 对话';
                sessionListContainer.appendChild(title);
                unpinnedSessions.forEach(s => { sessionListContainer.appendChild(createSessionItem(s)); });
            }
            if (sessions.length === 0 && folders.length === 0) {
                const empty = document.createElement('div');
                empty.style.cssText = 'color:var(--text-muted);text-align:center;padding:30px 0;';
                empty.textContent = '暂无对话和文件夹，点击下方创建';
                sessionListContainer.appendChild(empty);
            }
        }

        // ============================================================
        //  会话切换、创建
        // ============================================================
        function switchSession(id) {
            if (id === currentId) { closeDrawer(); return; }
            sessions.forEach(s => delete s.active);
            const target = sessions.find(s => s.id === id);
            if (target) {
                target.active = true;
                currentId = id;
                saveSessions();
                renderChat();
                closeDrawer();
            }
        }

        function createNewSession() {
            const count = sessions.length + 1;
            const newSession = { id: generateId(), name: `对话 ${count}`, messages: [], folderId: null, pinned: false, active: true };
            sessions.forEach(s => delete s.active);
            sessions.push(newSession);
            currentId = newSession.id;
            saveSessions();
            renderChat();
            closeDrawer();
            promptInput.focus();
        }

        function openDrawer() { renderDrawer(); overlay.classList.add('active'); drawer.classList.add('open'); }
        function closeDrawer() { overlay.classList.remove('active'); drawer.classList.remove('open'); }

        // 事件绑定
        menuBtn.addEventListener('click', openDrawer);
        closeDrawerBtn.addEventListener('click', closeDrawer);
        overlay.addEventListener('click', closeDrawer);
        newSessionBtn.addEventListener('click', createNewSession);
        newFolderBtn.addEventListener('click', createFolder);
        newChatBtn.addEventListener('click', createNewSession);
        titleArea.addEventListener('click', () => {
            const cur = getCurrentSession();
            if (cur) {
                const newName = prompt('重命名对话：', cur.name);
                if (newName && newName.trim() !== '') {
                    cur.name = newName.trim();
                    saveSessions();
                    renderChat();
                }
            }
        });

        // ============================================================
        //  设置面板交互
        // ============================================================
        // 折叠展开
        let settingsOpen = false;
        settingsSummary.addEventListener('click', () => {
            settingsOpen = !settingsOpen;
            settingsContent.classList.toggle('open', settingsOpen);
            settingsArrow.textContent = settingsOpen ? '▾' : '▸';
        });

        // 深色模式
        settingsDarkToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            settingsDarkToggle.textContent = isDark ? '开启' : '关闭';
            localStorage.setItem(THEME_KEY, isDark ? 'dark' : 'light');
        });

        // 模型模式
        settingsModeSelect.addEventListener('change', () => {
            mode = settingsModeSelect.value;
            localStorage.setItem(MODE_KEY, mode);
            updateModeUI();
            if (mode === 'flash') {
                deepThinking = false;
                localStorage.setItem(DEEP_THINKING_KEY, 'false');
                updateDeepThinkingUI();
            } else {
                const dt = localStorage.getItem(DEEP_THINKING_KEY);
                if (dt === 'true') deepThinking = true;
                else deepThinking = false;
                updateDeepThinkingUI();
            }
            statusText.textContent = `已切换为 ${mode === 'flash' ? '快速' : '专家'} 模式`;
            setTimeout(() => { if (statusText.textContent.includes('切换')) statusText.textContent = '就绪'; }, 1500);
        });

        // API Key（同步快捷栏）
        settingsApiKey.addEventListener('input', () => {
            apiKeyInput.value = settingsApiKey.value;
        });
        apiKeyInput.addEventListener('input', () => {
            settingsApiKey.value = apiKeyInput.value;
        });
        saveKeyBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) { localStorage.setItem(KEY_STORAGE, key); currentKey = key; settingsApiKey.value = key; alert('✅ Key 已保存'); } else { alert('请输入 Key'); }
        });

        // 字号
        settingsFontSize.addEventListener('change', () => {
            let val = parseInt(settingsFontSize.value);
            if (isNaN(val) || val < 12) val = 12;
            if (val > 24) val = 24;
            fontSize = val;
            localStorage.setItem(FONT_SIZE_KEY, String(fontSize));
            document.documentElement.style.setProperty('--font-size-msg', fontSize + 'px');
            // 重新渲染聊天（更新已有消息的字号）
            renderChat();
        });

        // 记忆摘要
        settingsMemoryMode.addEventListener('change', () => {
            memoryMode = settingsMemoryMode.value;
            localStorage.setItem(MEMORY_MODE_KEY, memoryMode);
            statusText.textContent = `记忆摘要模式: ${memoryMode === 'full' ? '全量发送' : '滑动窗口(最近20条)'}`;
            setTimeout(() => { if (statusText.textContent.includes('记忆摘要')) statusText.textContent = '就绪'; }, 2000);
        });

        // 显示思考过程
        settingsShowReasoning.addEventListener('click', () => {
            showReasoning = !showReasoning;
            localStorage.setItem(SHOW_REASONING_KEY, String(showReasoning));
            updateShowReasoningUI();
            renderChat();
            statusText.textContent = showReasoning ? '📝 思考过程已显示' : '📝 思考过程已隐藏';
            setTimeout(() => { if (statusText.textContent.includes('思考过程')) statusText.textContent = '就绪'; }, 1500);
        });

        // 备份 & 恢复（使用设置中的按钮）
        function backupData() {
            try {
                const data = {
                    version: '4.0',
                    exportedAt: new Date().toISOString(),
                    sessions: sessions,
                    folders: folders,
                    apiKey: localStorage.getItem(KEY_STORAGE) || '',
                    theme: localStorage.getItem(THEME_KEY) || 'light',
                    mode: mode,
                    deepThinking: deepThinking,
                    showReasoning: showReasoning,
                    fontSize: fontSize,
                    memoryMode: memoryMode
                };
                const json = JSON.stringify(data, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const dateStr = new Date().toISOString().slice(0,10);
                a.download = `DeepSeek_备份_${dateStr}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                statusText.textContent = '✅ 数据备份成功！';
                setTimeout(() => { if (statusText.textContent === '✅ 数据备份成功！') statusText.textContent = '就绪'; }, 3000);
            } catch (e) { alert('备份失败：' + e.message); }
        }

        function restoreData(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.sessions || !Array.isArray(data.sessions)) {
                        throw new Error('无效的备份文件：缺少 sessions 数据');
                    }
                    sessions = data.sessions;
                    folders = data.folders || [];
                    if (data.apiKey) { localStorage.setItem(KEY_STORAGE, data.apiKey); apiKeyInput.value = data.apiKey; settingsApiKey.value = data.apiKey; }
                    if (data.theme) {
                        localStorage.setItem(THEME_KEY, data.theme);
                        if (data.theme === 'dark') { document.body.classList.add('dark'); settingsDarkToggle.textContent = '开启'; }
                        else { document.body.classList.remove('dark'); settingsDarkToggle.textContent = '关闭'; }
                    }
                    if (data.mode) {
                        mode = data.mode;
                        localStorage.setItem(MODE_KEY, mode);
                        settingsModeSelect.value = mode;
                        updateModeUI();
                    }
                    if (data.deepThinking !== undefined) {
                        deepThinking = data.deepThinking;
                        localStorage.setItem(DEEP_THINKING_KEY, String(deepThinking));
                        updateDeepThinkingUI();
                    }
                    if (data.showReasoning !== undefined) {
                        showReasoning = data.showReasoning;
                        localStorage.setItem(SHOW_REASONING_KEY, String(showReasoning));
                        updateShowReasoningUI();
                    }
                    if (data.fontSize) {
                        fontSize = data.fontSize;
                        localStorage.setItem(FONT_SIZE_KEY, String(fontSize));
                        settingsFontSize.value = fontSize;
                        document.documentElement.style.setProperty('--font-size-msg', fontSize + 'px');
                    }
                    if (data.memoryMode) {
                        memoryMode = data.memoryMode;
                        localStorage.setItem(MEMORY_MODE_KEY, memoryMode);
                        settingsMemoryMode.value = memoryMode;
                    }
                    const active = sessions.find(s => s.active) || sessions[0];
                    if (active) { currentId = active.id; }
                    else if (sessions.length > 0) { sessions[0].active = true; currentId = sessions[0].id; }
                    else {
                        sessions.push({ id: generateId(), name: '新对话', messages: [], folderId: null, pinned: false, active: true });
                        currentId = sessions[0].id;
                    }
                    saveSessions();
                    renderChat();
                    statusText.textContent = '✅ 数据恢复成功！';
                    alert('✅ 数据恢复成功！所有对话、文件夹及设置已还原。');
                } catch (err) {
                    alert('恢复失败：' + err.message + '\n请确认选择的是正确的备份文件。');
                }
            };
            reader.readAsText(file);
        }

        settingsBackupBtn.addEventListener('click', backupData);
        settingsRestoreBtn.addEventListener('click', () => { settingsBackupFileInput.click(); });
        settingsBackupFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                if (confirm('⚠️ 恢复数据将覆盖当前所有对话、文件夹和设置，确定继续吗？')) {
                    restoreData(file);
                }
            }
            settingsBackupFileInput.value = '';
        });

        // ============================================================
        //  输入框深度思考按钮交互
        // ============================================================
        deepThinkingInputBtn.addEventListener('click', () => {
            if (mode !== 'pro') {
                alert('深度思考仅在专家模式下可用');
                return;
            }
            deepThinking = !deepThinking;
            localStorage.setItem(DEEP_THINKING_KEY, String(deepThinking));
            updateDeepThinkingUI();
            statusText.textContent = deepThinking ? '🧠 深度思考已开启 (高费用)' : '🧠 深度思考已关闭 (低费用)';
            setTimeout(() => { if (statusText.textContent.includes('深度思考')) statusText.textContent = '就绪'; }, 2000);
        });

        // ============================================================
        //  搜索功能
        // ============================================================
        function performSearch(query) {
            if (!query.trim()) { searchResults.innerHTML = '<div style="color:var(--text-muted);padding:20px;">输入关键词搜索</div>'; return; }
            const q = query.trim().toLowerCase();
            let results = [];
            sessions.forEach(s => {
                s.messages.forEach((m, idx) => {
                    if (m.content && m.content.toLowerCase().includes(q)) {
